<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Notifications | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #0093b5; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; padding: 0 20px; justify-content: space-between; position: sticky; top: 0; z-index: 1000; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); }

        /* Sidebar matching the image */
        .sidebar { width: 220px; background: #f4f4f4; border-right: 1px solid var(--border); flex-shrink: 0; display: flex; flex-direction: column; }
        .side-header { background: var(--th-blue); color: white; padding: 10px 15px; font-weight: bold; font-size: 14px; }
        .side-user { padding: 10px; border-bottom: 1px solid var(--border); display: flex; align-items: center; gap: 10px; }
        .side-avatar { width: 40px; height: 40px; background: #eee; border-radius: 4px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 10px 15px; color: var(--th-blue); text-decoration: none; font-size: 13px; border-bottom: 1px solid var(--border); }
        .side-nav a:hover { background: #eee; }
        .side-nav a.active { background: #e0e0e0; font-weight: bold; color: #333; border-left: 3px solid var(--th-blue); }

        /* Main Area */
        .main { flex: 1; padding: 20px; }
        .breadcrumb { background: #f9f9f9; padding: 10px; border: 1px solid var(--border); border-radius: 4px; font-size: 13px; margin-bottom: 20px; }
        .page-title { font-size: 20px; border-bottom: 1px solid var(--border); padding-bottom: 10px; margin-bottom: 20px; }

        /* Transfer Card */
        .transfer-card { border: 1px solid var(--border); border-radius: 4px; display: flex; padding: 15px; margin-bottom: 15px; background: white; }
        .transfer-img { width: 150px; height: 150px; background: #eee; border-radius: 4px; margin-right: 20px; flex-shrink: 0; background-size: cover; background-position: center; border: 1px solid var(--border); }
        .transfer-body { flex: 1; }
        .transfer-time { font-size: 11px; color: #777; margin-bottom: 5px; }
        .transfer-text { font-size: 14px; margin-bottom: 10px; }
        .char-badge { background: var(--th-blue); color: white; padding: 2px 8px; border-radius: 4px; text-decoration: none; font-size: 13px; }
        .transfer-reason { border: 1px solid var(--border); border-radius: 4px; padding: 15px; font-size: 13px; margin-bottom: 15px; background: #fafafa; min-height: 60px; }
        
        .btn-accept { background: #5cb85c; color: white; border: none; }
        .btn-decline { background: #d9534f; color: white; border: none; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="fw-bold">OCARMY</div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-header">Inbox</div>
        <div class="side-user">
            <div class="side-avatar" id="side-pfp"></div>
            <a href="#" id="side-username" style="color:var(--th-blue); text-decoration:none; font-size:13px;">User</a>
        </div>
        <div class="side-nav">
            <a href="#">Inbox</a>
            <a href="#">Outbox</a>
            <a href="#">Message Folders</a>
            <a href="#" class="active">Character Transfers <span id="notif-count">(0)</span></a>
            <a href="#">World Requests</a>
            <a href="#">Notifications</a>
        </div>
    </aside>

    <main class="main">
        <div class="breadcrumb">
            <span style="color: var(--th-blue);">Account Management</span> / Notifications
        </div>
        
        <h2 class="page-title">Transfers</h2>
        
        <div id="transfer-list">
            <div class="text-muted">Loading notifications...</div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const db = getFirestore(initializeApp(firebaseConfig));
    const auth = getAuth();
    let currentUser = null;

    onAuthStateChanged(auth, async (user) => {
        if (!user) return window.location.href = "index.html";
        currentUser = user;

        // Set up sidebar profile
        const userSnap = await getDoc(doc(db, "users", user.uid));
        if (userSnap.exists()) {
            document.getElementById('side-username').innerText = userSnap.data().username;
            if(userSnap.data().pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${userSnap.data().pfp}')`;
        }

        loadTransfers();
    });

    async function loadTransfers() {
        const list = document.getElementById('transfer-list');
        list.innerHTML = "";

        // Find transfers where the recipient is the logged in user, and it hasn't been accepted/declined yet
        const q = query(collection(db, "transfers"), where("toUserId", "==", currentUser.uid), where("status", "==", "pending"));
        const snap = await getDocs(q);

        document.getElementById('notif-count').innerText = `(${snap.size})`;

        if (snap.empty) {
            list.innerHTML = "<div class='text-muted p-3'>You have no pending transfers.</div>";
            return;
        }

        snap.forEach(d => {
            const transfer = d.data();
            const dateStr = transfer.createdAt ? transfer.createdAt.toDate().toLocaleString() : "Just now";

            list.innerHTML += `
                <div class="transfer-card" id="transfer-${d.id}">
                    <div class="transfer-img" style="background-image: url('${transfer.characterAvatar || ''}');"></div>
                    <div class="transfer-body">
                        <div class="transfer-time">${dateStr}</div>
                        <div class="transfer-text">
                            <i class="fa fa-user"></i> <strong>${transfer.fromUsername}</strong> would like to transfer you <a href="character.html?id=${transfer.characterId}" class="char-badge">${transfer.characterName}</a>.
                        </div>
                        <div class="transfer-reason">
                            ${transfer.reason || 'No reason provided.'}
                        </div>
                        <div class="text-end">
                            <button class="btn btn-sm btn-accept" onclick="resolveTransfer('${d.id}', '${transfer.characterId}', 'accept')"><i class="fa fa-check"></i> Accept</button>
                            <button class="btn btn-sm btn-decline" onclick="resolveTransfer('${d.id}', '${transfer.characterId}', 'decline')"><i class="fa fa-times"></i> Decline</button>
                        </div>
                    </div>
                </div>
            `;
        });
    }

    // Handle Accepting or Declining
    window.resolveTransfer = async (transferId, charId, action) => {
        try {
            if (action === 'accept') {
                // 1. Update the character's owner to the new user
                await updateDoc(doc(db, "characters", charId), {
                    ownerId: currentUser.uid,
                    folderId: "" // Resets folder to Unsorted so it doesn't break
                });
                
                // 2. Mark transfer as accepted
                await updateDoc(doc(db, "transfers", transferId), { status: "accepted" });
                alert("Character accepted! It is now in your Unsorted folder.");
                
            } else {
                // Just mark as declined
                await updateDoc(doc(db, "transfers", transferId), { status: "declined" });
                alert("Transfer declined.");
            }

            // Remove the card from the screen
            document.getElementById(`transfer-${transferId}`).remove();
            
            // Update the counter
            let countSpan = document.getElementById('notif-count');
            let currentCount = parseInt(countSpan.innerText.replace(/\D/g,''));
            countSpan.innerText = `(${currentCount - 1})`;

        } catch (error) {
            console.error(error);
            alert("Error processing request.");
        }
    };
</script>
</body>
</html>
