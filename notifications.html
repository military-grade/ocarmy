<!DOCTYPE html>
<html>
<head>
    <title>OCARMY | Notifications</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #008eb0; --th-border: #dcdcdc; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #f7f7f7; color: #333; }
        .navbar { background: #212529; color: white; padding: 15px 20px; font-weight: bold; }
        .container { max-width: 800px; margin: 40px auto; background: white; border: 1px solid var(--th-border); border-radius: 4px; overflow: hidden; }
        .card-header { padding: 15px; border-bottom: 2px solid var(--th-blue); font-weight: bold; font-size: 1.2rem; color: #555; background: #f9f9f9; }
        .notif-item { padding: 15px; border-bottom: 1px solid #eee; display: flex; align-items: center; gap: 15px; }
        .notif-item:last-child { border-bottom: none; }
        .notif-body { padding: 20px; }
        .alert-text { font-size: 18px; color: #888; text-align: center; padding: 40px; }
        .back-link { display: block; text-align: center; color: var(--th-blue); text-decoration: none; padding-bottom: 20px; }
    </style>
</head>
<body>
    <div class="navbar">OCARMY | Inbox</div>
    <div class="container">
        <div class="card-header">Recent Activity</div>
        <div id="notif-list">
            <div class="alert-text" id="alert-display">Loading alerts...</div>
        </div>
        <a href="dashboard.html" class="back-link">← Back to Profile</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    onAuthStateChanged(auth, (user) => {
        if (user) {
            const q = query(collection(db, "notifications"), where("to", "==", user.uid), orderBy("timestamp", "desc"));
            
            onSnapshot(q, (snap) => {
                const list = document.getElementById('notif-list');
                if (snap.empty) {
                    list.innerHTML = '<div class="alert-text">You have (0) new alerts.</div>';
                    return;
                }
                
                list.innerHTML = "";
                snap.forEach(doc => {
                    const n = doc.data();
                    list.innerHTML += `
                        <div class="notif-item">
                            <i class="fa ${n.type === 'favorite' ? 'fa-star text-warning' : 'fa-user text-primary'}"></i>
                            <div>
                                <strong>${n.fromName || 'Someone'}</strong> ${n.type === 'favorite' ? 'favorited' : 'subscribed to'} 
                                <strong>${n.charName || 'you'}</strong>
                            </div>
                        </div>`;
                });
            });
        }
    });
</script>
</body>
</html>
