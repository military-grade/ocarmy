<!DOCTYPE html>
<html>
<head>
    <title>Profile Content | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); display: flex; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--th-blue); color: white; display: flex; flex-direction: column; }
        .back-link { display: block; padding: 12px 15px; color: white; text-decoration: none; font-weight: bold; border-bottom: 1px solid rgba(255,255,255,0.2); }
        .side-nav a { display: block; padding: 8px 15px; color: white; text-decoration: none; font-size: 13px; }
        .main { flex: 1; padding: 30px; }
        .editor-card { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 25px; }
        .label-group { font-size: 11px; font-weight: bold; text-transform: uppercase; color: #666; margin: 25px 0 10px; border-bottom: 1px solid #eee; padding-bottom: 5px; }
        .css-box { width: 100%; height: 120px; font-family: monospace; border: 1px solid #ddd; padding: 10px; box-sizing: border-box; }
        .btn-save { background: #7cc1d8; color: white; border: none; padding: 15px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <a href="dashboard.html" class="back-link"><i class="fa fa-arrow-left"></i> Back to Profile</a>
    <div class="side-nav">
        <a href="profile_content.html" style="background:rgba(0,0,0,0.1);">Profile Content</a>
    </div>
</div>

<div class="main">
    <h2 style="color: #444;">Edit Profile Content</h2>
    <div class="editor-card">
        <div class="label-group">Profile Blurb (HTML Supported)</div>
        <textarea id="profile-editor"></textarea>
        <div class="label-group">Custom Profile CSS</div>
        <textarea class="css-box" id="profile-css"></textarea>
        <button class="btn-save" onclick="updateProfile()">Update Profile</button>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    tinymce.init({
        selector: '#profile-editor',
        height: 400,
        menubar: false,
        plugins: 'code link image lists',
        toolbar: 'undo redo | bold italic | alignleft aligncenter alignright | code link image',
        branding: false
    });

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                // THIS KEEPS THE CONTENT SAVED IN THE BOX
                if(data.profileCSS) document.getElementById('profile-css').value = data.profileCSS;
                
                // Wait for TinyMCE to be ready before putting the text back in
                const editor = tinymce.get('profile-editor');
                if (editor) {
                    editor.setContent(data.profileHTML || "");
                } else {
                    tinymce.on('init', () => tinymce.get('profile-editor').setContent(data.profileHTML || ""));
                }
            }
        }
    });

    window.updateProfile = async () => {
        const newHTML = tinymce.get('profile-editor').getContent();
        const newCSS = document.getElementById('profile-css').value;
        await setDoc(doc(db, "users", auth.currentUser.uid), {
            profileHTML: newHTML,
            profileCSS: newCSS
        }, { merge: true });
        alert("Saved!");
        window.location.href = "dashboard.html";
    };
</script>
</body>
</html>
