<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #008eb0; --th-teal: #5bc0de; --th-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; display: flex; }

        /* Sidebar: White & Blue */
        .sidebar { width: 240px; background: #fff; min-height: 100vh; border-right: 1px solid var(--th-border); position: sticky; top: 0; }
        .side-header { padding: 15px; background: var(--th-blue); color: white; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .nav-link { display: block; padding: 12px 20px; color: #555; text-decoration: none; font-size: 13px; border-bottom: 1px solid #eee; }
        .nav-link.active { background: #f0f0f0; border-left: 4px solid var(--th-blue); font-weight: bold; color: #333; }

        .main { flex-grow: 1; padding: 30px; max-width: 1100px; margin: 0 auto; }
        .card { background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 20px; margin-top: 20px; }
        
        .btn-save { background: var(--th-blue); color: white; border: none; padding: 15px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-header">
        <div id="side-pfp" style="width:30px; height:30px; background:#eee; background-size:cover; border-radius:2px;"></div>
        <span id="side-user">User</span>
    </div>
    <a href="dashboard.html" class="nav-link"><i class="fa fa-arrow-left"></i> Back to Profile</a>
    <a href="settings.html" class="nav-link">Account Settings</a>
    <a href="#" class="nav-link active">Profile Content</a>
</div>

<div class="main">
    <h2 style="color: #444;">Edit Profile Content</h2>

    <div style="border: 1px solid #ccc; border-radius: 4px; overflow: hidden;">
        <textarea id="editor-body">
            hello! I am the owner of ocarmy.
        </textarea>
    </div>

    <div class="card">
        <div style="font-size: 12px; font-weight: bold; color: #666; margin-bottom: 15px; text-transform: uppercase;">Profile Page Blocks</div>
        <select id="block-recent" style="width: 100%; padding: 10px; border-radius: 4px; border: 1px solid #ccc;">
            <option value="all">Display recent characters and designs</option>
            <option value="none">Hide</option>
        </select>
    </div>

    <button class="btn-save" onclick="saveChanges()">Save Changes</button>
</div>

<script>
    tinymce.init({
        selector: '#editor-body',
        height: 500,
        plugins: 'lists link image charmap emoticons table code fullscreen hr',
        // All 27 functions requested
        toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | subscript superscript | forecolor backcolor | emoticons charmap | alignleft aligncenter alignright alignjustify | numlist bullist outdent indent | blockquote hr | link image table | removeformat | code fullscreen',
        menubar: false,
        content_style: 'body { font-family:Arial; font-size:14px; text-align:center; white-space: pre-wrap; }',
        branding: false
    });
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
        authDomain: "ocarmy-db.firebaseapp.com",
        projectId: "ocarmy-db",
        storageBucket: "ocarmy-db.firebasestorage.app",
        messagingSenderId: "848883355194",
        appId: "1:848883355194:web:361e9fe8eb9e01f350af03"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('side-user').innerText = data.username;
                if(data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
                
                tinymce.get('editor-body').on('init', () => {
                    if(data.profileHTML) tinymce.get('editor-body').setContent(data.profileHTML);
                });
            }
        }
    });

    window.saveChanges = async () => {
        const user = auth.currentUser;
        const content = tinymce.get('editor-body').getContent();
        await updateDoc(doc(db, "users", user.uid), {
            profileHTML: content,
            blockRecent: document.getElementById('block-recent').value
        });
        alert("Profile saved!");
    };
</script>
</body>
</html>
