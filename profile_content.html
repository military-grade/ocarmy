<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile Content | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #008eb0; --th-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); display: flex; }

        .sidebar { width: 250px; background: white; min-height: 100vh; border-right: 1px solid var(--th-border); position: sticky; top: 0; padding: 20px; box-sizing: border-box; }
        .side-header { font-weight: bold; color: var(--th-blue); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .back-link { display: block; margin-bottom: 20px; color: blue; text-decoration: underline; font-weight: bold; font-size: 15px; }

        .main { flex-grow: 1; padding: 40px; max-width: 1100px; margin: 0 auto; }
        .btn-wysiwyg { background: #333; color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; float: right; font-size: 12px; }
        .btn-save { background: var(--th-blue); color: white; border: none; padding: 15px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold; margin-top: 20px; font-size: 16px; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-header">
        <div id="side-pfp" style="width:30px; height:30px; background:#eee; background-size:cover;"></div>
        <span id="display-user">User</span>
    </div>
    <a href="dashboard.html" class="back-link">← Back to Profile</a>
    <div style="border-top: 1px solid #eee; padding-top: 10px;">
        <a href="settings.html" style="display:block; padding:10px 0; color:#555; text-decoration:none;">Account Settings</a>
        <a href="profile_content.html" style="display:block; padding:10px 0; color:var(--th-blue); font-weight:bold; text-decoration:none;">Profile Content</a>
    </div>
</div>

<div class="main">
    <button class="btn-wysiwyg" onclick="toggleEditor()">Disable WYSIWYG</button>
    <h2 style="color: #444; margin-top: 0;">Edit Profile Content</h2>

    <div style="border: 1px solid #ccc; border-radius: 4px; overflow: hidden; background: white;">
        <textarea id="editor-body"></textarea>
    </div>

    <button class="btn-save" onclick="saveProfile()">Save Changes</button>
</div>

<script>
    tinymce.init({
        selector: '#editor-body',
        height: 500,
        plugins: 'lists link image charmap emoticons table code fullscreen hr',
        toolbar: 'undo redo | blocks fontfamily fontsize | bold italic underline strikethrough | subscript superscript | forecolor backcolor | emoticons charmap | alignleft aligncenter alignright alignjustify | numlist bullist outdent indent | blockquote hr | link image table | removeformat | code fullscreen',
        toolbar_mode: 'wrap', // Layers buttons downwards
        menubar: false,
        branding: false,
        content_style: 'body { font-family:Arial; font-size:14px; text-align:center; } p { margin: 16px 0; }'
    });

    function toggleEditor() {
        const btn = document.querySelector('.btn-wysiwyg');
        if (tinymce.get('editor-body').isHidden()) {
            tinymce.get('editor-body').show();
            btn.innerText = "Disable WYSIWYG";
        } else {
            tinymce.get('editor-body').hide();
            btn.innerText = "Enable WYSIWYG";
        }
    }
</script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
        authDomain: "ocarmy-db.firebaseapp.com",
        projectId: "ocarmy-db",
        appId: "1:848883355194:web:361e9fe8eb9e01f350af03"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('display-user').innerText = data.username || "User";
                if(data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
                
                tinymce.get('editor-body').on('init', () => {
                    if(data.profileHTML) tinymce.get('editor-body').setContent(data.profileHTML);
                });
            }
        }
    });

    window.saveProfile = async () => {
        const user = auth.currentUser;
        if (!user) return;
        
        // CRITICAL FIX: Forces TinyMCE to update the textarea
        tinymce.triggerSave();
        const content = tinymce.get('editor-body').getContent();
        
        await setDoc(doc(db, "users", user.uid), {
            profileHTML: content
        }, { merge: true });
        
        alert("Saved! Refresh your dashboard to see your new bio.");
    };
</script>
</body>
</html>
