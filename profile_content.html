<!DOCTYPE html>
<html>
<head>
    <title>Edit Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-teal: #5bc0de; --th-dark: #212529; --th-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--th-bg); color: #333; display: flex; }

        /* Left Sidebar - Teal Theme */
        .sidebar { width: 230px; background: #fff; min-height: 100vh; border-right: 1px solid var(--th-border); position: sticky; top: 0; }
        .side-header { padding: 15px; background: var(--th-teal); color: white; display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .nav-link { display: block; padding: 12px 20px; color: #555; text-decoration: none; font-size: 13px; border-bottom: 1px solid #eee; }
        .nav-link:hover { background: #f9f9f9; }
        .nav-link.active { background: #f0f0f0; border-left: 4px solid var(--th-teal); font-weight: bold; }

        /* Main Area */
        .main { flex-grow: 1; padding: 30px; max-width: 1000px; }
        .header-flex { display: flex; justify-content: space-between; align-items: center; margin-bottom: 20px; }
        .page-title { font-size: 1.5rem; margin: 0; color: #444; }

        .btn-wysiwyg { background: #333; color: white; border: none; padding: 6px 12px; border-radius: 4px; font-size: 12px; cursor: pointer; }

        /* The Editor Toolbar Style */
        .editor-container { background: white; border: 1px solid var(--th-border); border-radius: 4px; overflow: hidden; margin-bottom: 25px; }
        .toolbar { background: #fdfdfd; padding: 10px; border-bottom: 1px solid #eee; display: flex; flex-wrap: wrap; gap: 15px; color: #666; }
        .toolbar i { cursor: pointer; font-size: 14px; }
        .toolbar i:hover { color: var(--th-teal); }

        textarea { 
            width: 100%; 
            height: 300px; 
            border: none; 
            padding: 20px; 
            font-size: 14px; 
            resize: vertical; 
            box-sizing: border-box; 
            text-align: center; /* Matches your screenshot example */
            font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif;
        }
        textarea:focus { outline: none; }

        /* Page Blocks Section */
        .card { background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 20px; margin-bottom: 20px; }
        .card-header { font-size: 14px; font-weight: bold; color: #666; margin-bottom: 15px; border-bottom: 1px solid #eee; padding-bottom: 10px; text-transform: uppercase; }

        .block-row { display: flex; justify-content: space-between; align-items: center; margin-bottom: 15px; gap: 20px; }
        .block-label { font-size: 13px; color: #555; font-weight: bold; }
        
        select { background: #212529; color: white; border: 1px solid #444; padding: 8px; border-radius: 4px; width: 350px; cursor: pointer; }

        .btn-update { background: var(--th-teal); color: white; border: none; padding: 15px; border-radius: 4px; width: 100%; cursor: pointer; font-weight: bold; font-size: 14px; }
        .btn-update:hover { background: #46b8da; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-header">
        <div id="side-pfp" style="width:30px; height:30px; background:#eee; background-size:cover; border-radius:2px;"></div>
        <span id="side-user">User</span>
    </div>
    <a href="dashboard.html" class="nav-link"><i class="fa fa-arrow-left"></i> Back to Archive</a>
    <a href="settings.html" class="nav-link">General Settings</a>
    <a href="interactions.html" class="nav-link">Interaction & Alerts</a>
    <a href="#" class="nav-link active">Profile Content</a>
</div>

<div class="main">
    <div class="header-flex">
        <h2 class="page-title">Edit Profile</h2>
        <button class="btn-wysiwyg">Disable WYSIWYG</button>
    </div>

    <div class="editor-container">
        <div class="toolbar">
            <i class="fa fa-bold"></i> <i class="fa fa-italic"></i> <i class="fa fa-underline"></i> <i class="fa fa-strikethrough"></i>
            <span>|</span>
            <i class="fa fa-subscript"></i> <i class="fa fa-superscript"></i>
            <span>|</span>
            <i class="fa fa-font"></i> <i class="fa fa-text-height"></i> <i class="fa fa-palette"></i>
            <span>|</span>
            <i class="fa fa-link"></i> <i class="fa fa-image"></i> <i class="fa fa-undo"></i> <i class="fa fa-redo"></i>
            <span>|</span>
            <i class="fa fa-align-center"></i> <i class="fa fa-list"></i> <i class="fa fa-quote-right"></i> <i class="fa fa-code"></i>
        </div>
        <textarea id="profile-blurb" placeholder="Enter your profile description here..."></textarea>
    </div>

    <div class="card">
        <div class="card-header">Profile Page Blocks</div>
        
        <div class="block-row">
            <span class="block-label">Display recent characters</span>
            <select id="block-recent">
                <option value="both">Display recent characters and designs</option>
                <option value="chars">Only characters</option>
                <option value="none">Hide</option>
            </select>
        </div>

        <div class="block-row">
            <span class="block-label">Display featured characters</span>
            <select id="block-featured">
                <option value="random">Display random featured character</option>
                <option value="first">Display first featured character</option>
                <option value="none">Hide</option>
            </select>
        </div>

        <div class="block-row">
            <span class="block-label">Display recent bulletin</span>
            <select id="block-bulletin">
                <option value="recent">Display most recent bulletin</option>
                <option value="none">Hide</option>
            </select>
        </div>

        <div class="block-row">
            <span class="block-label">Number of comments on front page</span>
            <select id="block-comments">
                <option value="10">10</option>
                <option value="20">20</option>
                <option value="50">50</option>
            </select>
        </div>
    </div>

    <button class="btn-update" onclick="updateProfile()">Update Profile</button>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) window.location.href = "index.html";
    
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
        const data = userDoc.data();
        document.getElementById('side-user').innerText = data.username;
        if(data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
        
        // Load Profile Content
        document.getElementById('profile-blurb').value = data.blurb || "";
        document.getElementById('block-recent').value = data.blockRecent || "both";
        document.getElementById('block-featured').value = data.blockFeatured || "random";
        document.getElementById('block-bulletin').value = data.blockBulletin || "recent";
    }
  });

  window.updateProfile = async () => {
    const user = auth.currentUser;
    await updateDoc(doc(db, "users", user.uid), {
        blurb: document.getElementById('profile-blurb').value,
        blockRecent: document.getElementById('block-recent').value,
        blockFeatured: document.getElementById('block-featured').value,
        blockBulletin: document.getElementById('block-bulletin').value
    });
    alert("Profile successfully updated!");
  };
</script>
</body>
</html>
