<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Upload Image | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; }
        body { background: var(--th-bg); padding: 40px; }
        .upload-card { background: white; border: 1px solid #ddd; padding: 25px; border-radius: 4px; }
        .btn-th { background: var(--th-blue); color: white; border: none; padding: 10px 20px; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 1000px;">
        <h3>Upload Image</h3>
        <div class="upload-card">
            <div class="row">
                <div class="col-md-7 border-end">
                    <label class="fw-bold mb-2">Basics</label>
                    <input type="file" id="img-file" class="form-control mb-3">
                    <textarea id="caption" class="form-control mb-3" placeholder="Caption (optional)"></textarea>
                    
                    <label class="fw-bold mb-2">Privacies</label>
                    <select class="form-control mb-3"><option>Public</option></select>
                </div>
                <div class="col-md-5 ps-4">
                    <div class="form-check mb-3">
                        <input class="form-check-input" type="checkbox" id="set-avatar">
                        <label class="form-check-label">Set as Character Avatar</label>
                    </div>
                    <button class="btn-th w-100" onclick="uploadImg()">Upload Image</button>
                </div>
            </div>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, updateDoc, arrayUnion } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const charId = new URLSearchParams(window.location.search).get('id');

    window.uploadImg = () => {
        const file = document.getElementById('img-file').files[0];
        const reader = new FileReader();
        reader.onload = async (e) => {
            const updates = { gallery: arrayUnion(e.target.result) };
            if(document.getElementById('set-avatar').checked) updates.avatar = e.target.result;
            
            await updateDoc(doc(db, "characters", charId), updates);
            window.location.href = `character.html?id=${charId}`;
        };
        reader.readAsDataURL(file);
    };
</script>
</body>
</html>
