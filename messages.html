<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Compose Message | OCARMY</title>
    <style>
        body { font-family: sans-serif; background: #f7f7f7; padding: 50px; }
        .compose-card { max-width: 600px; margin: 0 auto; background: white; padding: 30px; border: 1px solid #ddd; border-radius: 4px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 15px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #4e92ac; color: white; border: none; padding: 10px 20px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>
    <div class="compose-card">
        <h2>New Message</h2>
        <input type="text" id="to-user" placeholder="Recipient Username">
        <input type="text" id="subject" placeholder="Subject">
        <textarea id="message-body" style="height: 150px;" placeholder="Write your message..."></textarea>
        <button onclick="sendMessage()">Send Message</button>
        <a href="messages.html" style="margin-left: 10px; font-size: 13px; color: #666;">Cancel</a>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);

    window.sendMessage = async () => {
        const username = document.getElementById('to-user').value;
        const subject = document.getElementById('subject').value;
        const body = document.getElementById('message-body').value;

        // 1. Find the recipient UID by username
        const userQuery = query(collection(db, "users"), where("username", "==", username));
        const userSnap = await getDocs(userQuery);

        if (userSnap.empty) { alert("User not found!"); return; }
        
        const recipientId = userSnap.docs[0].id;
        const senderDoc = await getDoc(doc(db, "users", auth.currentUser.uid));
        const senderName = senderDoc.data().username || "Unknown";

        // 2. Add message to Firebase
        await addDoc(collection(db, "messages"), {
            senderId: auth.currentUser.uid,
            senderName: senderName,
            receiverId: recipientId,
            subject: subject,
            body: body,
            isRead: false,
            timestamp: serverTimestamp()
        });

        alert("Message Sent!");
        window.location.href = "messages.html";
    };
</script>
</body>
</html>
