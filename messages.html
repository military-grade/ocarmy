<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbox | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: sans-serif; background: #f7f7f7; padding: 20px; }
        .container { max-width: 800px; margin: 0 auto; background: white; padding: 20px; border: 1px solid #ddd; }
        .tabs { border-bottom: 2px solid #eee; margin-bottom: 20px; display: flex; gap: 20px; }
        .tab { cursor: pointer; padding: 10px 0; font-weight: bold; color: #888; }
        .tab.active { border-bottom: 2px solid #4e92ac; color: #4e92ac; }
        .msg-item { border: 1px solid #eee; padding: 15px; margin-bottom: 10px; border-radius: 4px; }
        input, textarea { width: 100%; padding: 10px; margin-bottom: 10px; border: 1px solid #ddd; box-sizing: border-box; }
        button { background: #4e92ac; color: white; border: none; padding: 10px 20px; cursor: pointer; }
    </style>
</head>
<body>
    <div class="container">
        <div class="tabs">
            <div class="tab active" onclick="showTab('inbox')">Inbox</div>
            <div class="tab" onclick="showTab('compose')">Compose</div>
        </div>

        <div id="inbox-view">
            <div id="message-list">Loading inbox...</div>
        </div>

        <div id="compose-view" style="display:none;">
            <input type="text" id="to-user" placeholder="Recipient Username">
            <input type="text" id="subject" placeholder="Subject">
            <textarea id="message-body" style="height: 150px;" placeholder="Message..."></textarea>
            <button onclick="sendMessage()">Send Message</button>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, query, where, getDocs, getDoc, doc, onSnapshot, serverTimestamp, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    window.showTab = (tab) => {
        document.getElementById('inbox-view').style.display = tab === 'inbox' ? 'block' : 'none';
        document.getElementById('compose-view').style.display = tab === 'compose' ? 'block' : 'none';
        document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.innerText.toLowerCase() === tab));
    };

    onAuthStateChanged(auth, (user) => {
        if (!user) return;
        const q = query(collection(db, "messages"), where("receiverId", "==", user.uid), orderBy("timestamp", "desc"));
        onSnapshot(q, (snap) => {
            const list = document.getElementById('message-list');
            list.innerHTML = snap.empty ? "No messages yet." : "";
            snap.forEach(d => {
                const m = d.data();
                list.innerHTML += `<div class="msg-item"><strong>From: ${m.senderName}</strong><br><strong>${m.subject}</strong><p>${m.body}</p></div>`;
            });
        });
    });

    window.sendMessage = async () => {
        const username = document.getElementById('to-user').value;
        const userQuery = query(collection(db, "users"), where("username", "==", username));
        const userSnap = await getDocs(userQuery);
        if (userSnap.empty) return alert("User not found!");
        
        const recipientId = userSnap.docs[0].id;
        const sender = await getDoc(doc(db, "users", auth.currentUser.uid));
        
        await addDoc(collection(db, "messages"), {
            senderId: auth.currentUser.uid, senderName: sender.data().username, receiverId: recipientId,
            subject: document.getElementById('subject').value, body: document.getElementById('message-body').value,
            timestamp: serverTimestamp()
        });

        await addDoc(collection(db, "notifications"), {
            toUserId: recipientId, fromUsername: sender.data().username, type: "message", read: false, createdAt: serverTimestamp()
        });
        alert("Message sent!");
    };
</script>
</body>
</html>
