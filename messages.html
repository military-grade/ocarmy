<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Inbox | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }

        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; gap: 20px; align-items: center; }
        .nav-left a { color: #ccc; text-decoration: none; font-size: 13px; }
        
        .nav-right { position: relative; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; height: 100%; }
        .nav-pfp { width: 30px; height: 30px; background: #eee; border-radius: 2px; background-size: cover; }
        .dropdown-menu { display: none; position: absolute; top: 50px; right: 0; background: white; border: 1px solid var(--border); width: 160px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dropdown-menu a { display: block; padding: 10px 15px; color: #333; text-decoration: none; font-size: 13px; border-bottom: 1px solid #eee; }

        .container { display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 50px); }
        .sidebar { width: 180px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-nav a:hover, .side-nav a.active { background: rgba(0,0,0,0.1); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .main { flex: 1; padding: 25px; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        
        /* Messenger Table */
        .msg-controls { margin-bottom: 20px; display: flex; gap: 10px; }
        .btn-msg { background: #eee; border: 1px solid #ccc; padding: 5px 12px; font-size: 12px; cursor: pointer; border-radius: 3px; }
        .btn-msg:hover { background: #e0e0e0; }

        .message-table { width: 100%; border-collapse: collapse; }
        .message-table th { text-align: left; background: #f5f5f5; padding: 10px; border: 1px solid var(--border); font-size: 12px; color: #666; }
        .message-table td { padding: 10px; border: 1px solid var(--border); font-size: 13px; }
        .msg-unread { background: #fffdf0; font-weight: bold; }
        .msg-link { color: var(--th-blue); text-decoration: none; }
        .msg-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white;">OCARMY</a>
        <a href="dashboard.html"><i class="fa fa-home"></i> Profile</a>
        <a href="#"><i class="fa fa-plus"></i> Submit</a>
        <a href="#"><i class="fa fa-info-circle"></i> Info</a>
        <a href="#"><i class="fa fa-search"></i> Search</a>
        <a href="#"><i class="fa fa-newspaper"></i> Blogs</a>
    </div>
    <div class="nav-right" onclick="toggleDropdown()">
        <span id="nav-username">User</span>
        <div class="nav-pfp" id="nav-pfp-img"></div>
        <div class="dropdown-menu" id="nav-dropdown">
            <a href="dashboard.html"><i class="fa fa-user"></i> My Profile</a>
            <a href="settings.html"><i class="fa fa-cog"></i> Settings</a>
            <a href="#" id="logout-btn"><i class="fa fa-sign-out"></i> Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-user"></i> Profile</a>
            <a href="#"><i class="fa fa-users"></i> Characters</a>
            <a href="#"><i class="fa fa-folder"></i> Folders</a>
            
            <div class="side-label">Interaction</div>
            <a href="messages.html" class="active"><i class="fa fa-envelope"></i> Inbox</a>
            <a href="#"><i class="fa fa-comment"></i> Bulletins</a>
            
            <div class="side-label">Settings</div>
            <a href="profile_content.html"><i class="fa fa-edit"></i> Edit Profile</a>
            <a href="settings.html"><i class="fa fa-cog"></i> Account Settings</a>
        </div>
    </aside>

    <main class="main">
        <h2 style="margin-top:0;">Inbox</h2>
        
        <div class="msg-controls">
            <button class="btn-msg"><i class="fa fa-pencil"></i> Compose</button>
            <button class="btn-msg">Mark Read</button>
            <button class="btn-msg">Delete</button>
        </div>

        <table class="message-table">
            <thead>
                <tr>
                    <th width="30"><input type="checkbox"></th>
                    <th>Subject</th>
                    <th>From</th>
                    <th>Date</th>
                </tr>
            </thead>
            <tbody id="inbox-list">
                <tr class="msg-unread">
                    <td><input type="checkbox"></td>
                    <td><a href="#" class="msg-link">Welcome to OCARMY</a></td>
                    <td>System</td>
                    <td>May 9, 2026</td>
                </tr>
            </tbody>
        </table>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
        authDomain: "ocarmy-db.firebaseapp.com",
        projectId: "ocarmy-db",
        appId: "1:848883355194:web:361e9fe8eb9e01f350af03"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);

    window.toggleDropdown = () => {
        const menu = document.getElementById('nav-dropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('nav-username').innerText = data.username || "User";
                if (data.pfp) document.getElementById('nav-pfp-img').style.backgroundImage = `url('${data.pfp}')`;
            }
        } else {
            window.location.href = "index.html";
        }
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>
</body>
</html>
