<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }

        /* Navbar & Dropdowns */
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 2000; }
        .nav-left { display: flex; gap: 5px; align-items: center; height: 100%; }
        .nav-left a, .nav-item-btn { color: #ccc; text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; border: none; background: none; }
        .nav-left a:hover, .nav-item-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        
        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }
        .dropdown-content { display: none; position: absolute; top: 50px; background: white; border: 1px solid var(--border); min-width: 160px; box-shadow: 0 6px 12px rgba(0,0,0,.175); z-index: 3000; padding: 5px 0; border-radius: 0 0 4px 4px; }
        .dropdown-content a { display: block; padding: 8px 20px; color: #333 !important; text-decoration: none; font-size: 13px; width: 100%; text-align: left; }
        .show { display: block !important; }

        /* Sidebar & Layout */
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); align-items: stretch; }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-user-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        /* Notif Bar Icons */
        .notif-bar { display: flex; align-items: center; gap: 2px; margin-right: 10px; }
        .notif-item { padding: 4px 8px; font-size: 11px; border-radius: 3px; color: white; display: flex; align-items: center; gap: 5px; background: #337ab7; text-decoration: none; opacity: 0.6; }
        .notif-world { background: #f0ad4e; }

        /* Character Grid Styling */
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 20px 0; }
        .char-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; text-decoration: none; color: #4e92ac; text-align: center; background: #fff; transition: 0.2s; }
        .char-card:hover { transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.1); }
        .char-thumb { width: 100%; aspect-ratio: 1/1; background-size: cover; background-position: center; background-color: #eee; }
        .char-name { padding: 8px; font-size: 12px; font-weight: bold; }

        .creator-crown { color: #ffd700; margin-left: 5px; cursor: help; }
        .main { flex: 1; padding: 30px; background: white; }
        #profile-raw-render { width: 100%; min-height: 100px; }
    </style>
    <style id="custom-profile-css"></style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white; font-size: 16px;">OCARMY</a>
        <a href="browse.html"><i class="fa fa-eye"></i> Browse</a>
        <div class="dropdown">
            <button class="nav-item-btn" onclick="toggleDrop('drop-submit')"><i class="fa fa-plus"></i> Submit <i class="fa fa-caret-down"></i></button>
            <div id="drop-submit" class="dropdown-content"><a href="create_character.html">Character</a><a href="create_folder.html">Folder</a><a href="create_bulletin.html">Bulletin</a></div>
        </div>
        <a href="search.html"><i class="fa fa-search"></i> Search</a>
    </div>

    <div class="notif-bar">
        <a href="#" class="notif-item notif-world"><i class="fa fa-globe"></i> <span id="badge-worlds">0</span></a>
        <a href="notifications.html" class="notif-item"><i class="fa fa-user"></i> <span id="badge-social">0</span></a>
        <a href="notifications.html" class="notif-item"><i class="fa fa-star"></i> <span id="badge-favs">0</span></a>
        <a href="notifications.html" class="notif-item"><i class="fa fa-envelope"></i> <span id="badge-inbox">0</span></a>
    </div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar" id="side-pfp"></div>
            <div>
                <div id="side-name-container" style="font-weight: bold; display:flex; align-items:center;">
                    <span id="side-username">Loading...</span>
                </div>
                <div style="font-size: 11px; opacity: 0.8;" id="dash-sub-count">0 subscribers</div>
            </div>
        </div>
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-user"></i> Profile</a>
            <a href="characters.html"><i class="fa fa-users"></i> Characters</a>
            <a href="notifications.html"><i class="fa fa-bell"></i> Notifications</a>
            <a href="messages.html"><i class="fa fa-envelope"></i> Inbox</a>
            <div class="side-label">Control Panel</div>
            <a href="settings.html"><i class="fa fa-cog"></i> Settings</a>
            <a href="#" id="logout-btn"><i class="fa fa-sign-out-alt"></i> Logout</a>
        </div>
    </aside>

    <main class="main">
        <div id="profile-raw-render"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 40px;">
            <span style="font-weight:bold; font-size: 18px;"><i class="fa fa-folder-open"></i> Unsorted Characters</span>
            <a href="characters.html" style="font-size:11px; font-weight:bold; color:var(--th-blue); text-decoration:none;">View All</a>
        </div>
        <div id="char-grid" class="char-grid"></div>
    </main>
</div>

<script type="module" src="navbar-notifs.js"></script>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, where, getDocs, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    // Dropdown Logic
    window.toggleDrop = (id) => {
        document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
        document.getElementById(id).classList.toggle('show');
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => window.location.href="login.html");

    onAuthStateChanged(auth, (user) => {
        if (!user) return;

        // 1. User & Profile Loading
        onSnapshot(doc(db, "users", user.uid), async (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('side-username').innerText = data.username || "User";
                if (data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;

                // 👑 Creator Crown Logic
                if (data.username?.toLowerCase() === 'militarygrade' && !document.querySelector('.creator-crown')) {
                    document.getElementById('side-name-container').innerHTML += ` <i class="fa fa-crown creator-crown" title="OCARMY Creator"></i>`;
                }

                // 👥 Subscriber Count
                const subSnap = await getDocs(collection(db, "users", user.uid, "subscribers"));
                document.getElementById('dash-sub-count').innerText = `${subSnap.size} subscribers`;

                // Render Profile HTML/CSS
                const rawHTML = data.profileHTML || "Welcome to OCARMY!";
                document.getElementById('profile-raw-render').innerHTML = rawHTML.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
                document.getElementById('custom-profile-css').innerHTML = data.profileCSS || "";
            }
        });

        // 2. CHARACTER GRID LOADING (RESTORED)
        const charQ = query(collection(db, "characters"), where("ownerId", "==", user.uid), where("folderId", "==", ""));
        onSnapshot(charQ, (snap) => {
            const grid = document.getElementById('char-grid');
            if (snap.empty) {
                grid.innerHTML = "<div class='text-muted small'>No unsorted characters found.</div>";
                return;
            }
            grid.innerHTML = snap.docs.map(d => {
                const char = d.data();
                return `
                    <a href="character.html?id=${d.id}" class="char-card">
                        <div class="char-thumb" style="background-image: url('${char.avatar || ''}')"></div>
                        <div class="char-name">${char.name || 'Unnamed'}</div>
                    </a>`;
            }).join('');
        });
    });
</script>
</body>
</html>
