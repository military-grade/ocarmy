<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }

        /* Navbar Styles */
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 2000; }
        .nav-left { display: flex; gap: 5px; align-items: center; height: 100%; }
        .nav-left a, .nav-item-btn { color: #ccc; text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; border: none; background: none; }
        .nav-left a:hover, .nav-item-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        
        /* Logo styling */
        .nav-logo-link { display: flex; align-items: center; padding-right: 15px !important; }
        .nav-logo-img { height: 32px; width: auto; display: block; }

        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }
        .dropdown-content { display: none; position: absolute; top: 50px; background: white; border: 1px solid var(--border); min-width: 160px; box-shadow: 0 6px 12px rgba(0,0,0,.175); z-index: 3000; padding: 5px 0; border-radius: 0 0 4px 4px; }
        .dropdown-content a { display: block; padding: 8px 20px; color: #333 !important; text-decoration: none; font-size: 13px; width: 100%; text-align: left; }
        .show { display: block !important; }

        .notif-bar { display: flex; align-items: center; gap: 4px; margin-right: 10px; }
        .notif-item { 
            padding: 4px 8px; 
            font-size: 11px; 
            border-radius: 3px; 
            color: #ccc; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            background: #3b5998; 
            text-decoration: none; 
            transition: 0.2s;
        }
        .notif-item:hover { color: white; }
        .notif-item.active-alert {
            background: #00ffff;
            color: #000;
            font-weight: bold;
            box-shadow: 0 0 5px rgba(0, 255, 255, 0.5);
        }

        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-user-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .creator-crown { color: #ffd700; margin-left: 5px; text-shadow: 0 0 3px rgba(0,0,0,0.2); }

        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; padding: 20px 0; }
        .char-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; text-decoration: none; background: #fff; transition: 0.2s; }
        .char-thumb { width: 100%; aspect-ratio: 1/1; background-size: cover; background-position: center; background-color: #eee; }
        .char-name { padding: 8px; font-size: 12px; font-weight: bold; color: var(--th-blue); text-align: center; }

        .main { flex: 1; padding: 30px; background: white; }
    </style>
    <style id="custom-profile-css"></style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" class="nav-logo-link">
            <img src="Illustration226.png" alt="OCARMY" class="nav-logo-img">
        </a>
        
        <a href="browse.html"><i class="fa fa-eye"></i> Browse</a>
        <div class="dropdown">
            <button class="nav-item-btn" onclick="toggleDrop('drop-submit')"><i class="fa fa-plus"></i> Submit <i class="fa fa-caret-down"></i></button>
            <div id="drop-submit" class="dropdown-content">
                <a href="create_character.html"><i class="fa fa-user"></i> Character</a>
                <a href="create_folder.html"><i class="fa fa-folder"></i> Folder</a>
                <a href="create_bulletin.html"><i class="fa fa-newspaper"></i> Bulletin</a>
            </div>
        </div>
        <a href="search.html"><i class="fa fa-search"></i> Search</a>
    </div>

    <div style="display: flex; align-items: center;">
        <div class="notif-bar">
            <a href="notifications.html" class="notif-item" id="btn-worlds"><i class="fa fa-globe"></i> <span id="badge-worlds">0</span></a>
            <a href="notifications.html" class="notif-item" id="btn-social"><i class="fa fa-user"></i> <span id="badge-social">0</span></a>
            <a href="notifications.html" class="notif-item" id="btn-favs"><i class="fa fa-star"></i> <span id="badge-favs">0</span></a>
            <a href="notifications.html" class="notif-item" id="btn-inbox"><i class="fa fa-envelope"></i> <span id="badge-inbox">0</span></a>
        </div>

        <div class="dropdown">
            <button class="nav-item-btn" onclick="toggleDrop('drop-user')">
                <span id="nav-username">Loading...</span>
                <div id="nav-avatar" style="width:30px; height:30px; background:#eee; border-radius:2px; background-size:cover; margin-left:8px;"></div>
                <i class="fa fa-caret-down" style="margin-left:5px; font-size:10px;"></i>
            </button>
            <div id="drop-user" class="dropdown-content" style="right:0;">
                <a href="dashboard.html">Dashboard</a>
                <a id="nav-public-profile" href="#">Public Profile</a>
                <a href="settings.html">Settings</a>
                <div style="border-top:1px solid #eee; margin: 5px 0;"></div>
                <a href="#" id="logout-btn">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar" id="side-pfp"></div>
            <div>
                <div style="font-weight: bold; display: flex; align-items: center;" id="side-name-container">
                    <span id="side-username">User</span>
                </div>
                <div style="font-size: 11px; opacity: 0.8;" id="dash-sub-count">0 subscribers</div>
            </div>
        </div>
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-user"></i> Dashboard</a>
            <a id="side-public-profile" href="#"><i class="fa fa-eye"></i> View Profile</a>
            <a href="bulletins.html"><i class="fa fa-comment"></i> Bulletins</a>
            <a href="characters.html"><i class="fa fa-users"></i> Characters</a>
            
            <div class="side-label">Portfolio</div>
            <a href="designs.html"><i class="fa fa-paint-brush"></i> Designs</a>
            <a href="art.html"><i class="fa fa-image"></i> Art</a>
            
            <div class="side-label">Interaction</div>
            <a href="profile_comments.html"><i class="fa fa-comments"></i> Comments</a>
            <a href="notifications.html"><i class="fa fa-bell"></i> Notifications</a>
            <a href="messages.html"><i class="fa fa-envelope"></i> Inbox</a>
        </div>
    </aside>

    <main class="main">
        <div id="profile-raw-render"></div>
        
        <div style="display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 40px;">
            <span style="font-weight:bold; font-size: 18px;"><i class="fa fa-folder-open"></i> Unsorted Characters</span>
            <a href="characters.html" style="font-size:11px; font-weight:bold; color:var(--th-blue); text-decoration:none;">View All</a>
        </div>
        <div id="char-grid" class="char-grid"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, onSnapshot, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
        authDomain: "ocarmy-db.firebaseapp.com",
        projectId: "ocarmy-db",
        storageBucket: "ocarmy-db.firebasestorage.app",
        messagingSenderId: "848883355194",
        appId: "1:848883355194:web:361e9fe8eb9e01f350af03"
    };

    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth(app);

    window.toggleDrop = (id) => {
        document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
        document.getElementById(id).classList.toggle('show');
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => window.location.href="login.html");

    async function renderDashboard(userData, dbId, authUid) {
        const username = userData.username || "User";
        document.getElementById('nav-username').innerText = username;
        document.getElementById('side-username').innerText = username;
        document.getElementById('nav-public-profile').href = `profile.html?user=${dbId}`;
        document.getElementById('side-public-profile').href = `profile.html?user=${dbId}`;

        if (userData.pfp) {
            document.getElementById('nav-avatar').style.backgroundImage = `url('${userData.pfp}')`;
            document.getElementById('side-pfp').style.backgroundImage = `url('${userData.pfp}')`;
        }

        if (username.toLowerCase() === 'militarygrade') {
            const container = document.getElementById('side-name-container');
            if (!container.querySelector('.fa-crown')) {
                container.innerHTML += ` <i class="fa fa-crown creator-crown" title="OCARMY Creator"></i>`;
            }
        }

        const subSnap = await getDocs(collection(db, "users", dbId, "subscribers"));
        document.getElementById('dash-sub-count').innerText = `${subSnap.size} subscribers`;

        const rawHTML = userData.profileHTML || "Welcome!";
        document.getElementById('profile-raw-render').innerHTML = rawHTML.replace(/&lt;/g, '<').replace(/&gt;/g, '>').replace(/&quot;/g, '"');
        document.getElementById('custom-profile-css').innerHTML = userData.profileCSS || "";

        const charQuery = query(collection(db, "characters"), where("ownerId", "in", [authUid, dbId]));
        onSnapshot(charQuery, (snap) => {
            const grid = document.getElementById('char-grid');
            const unsorted = snap.docs.filter(d => !d.data().folderId);
            if (unsorted.length === 0) {
                grid.innerHTML = "<div class='text-muted small'>No characters found.</div>";
            } else {
                grid.innerHTML = unsorted.map(d => `
                    <a href="character.html?id=${d.id}" class="char-card">
                        <div class="char-thumb" style="background-image: url('${d.data().avatar || ''}')"></div>
                        <div class="char-name">${d.data().name || 'Unnamed'}</div>
                    </a>`).join('');
            }
        });
        
        const notifQuery = query(collection(db, "notifications"), where("toUserId", "==", authUid), where("read", "==", false));
        onSnapshot(notifQuery, (snap) => {
            let socialCount = 0;
            let favsCount = 0;
            snap.forEach(doc => {
                const type = doc.data().type;
                if(type === 'subscription' || type === 'comment') socialCount++;
                if(type === 'update' || type === 'favorite') favsCount++;
            });
            document.getElementById('badge-social').innerText = socialCount;
            if(socialCount > 0) document.getElementById('btn-social').classList.add('active-alert');
            else document.getElementById('btn-social').classList.remove('active-alert');
            document.getElementById('badge-favs').innerText = favsCount;
            if(favsCount > 0) document.getElementById('btn-favs').classList.add('active-alert');
            else document.getElementById('btn-favs').classList.remove('active-alert');
        });
        
        const transferQuery = query(collection(db, "transfers"), where("toUserId", "==", authUid), where("status", "==", "pending"));
        onSnapshot(transferQuery, (snap) => {
            document.getElementById('badge-worlds').innerText = snap.size;
            if(snap.size > 0) document.getElementById('btn-worlds').classList.add('active-alert');
            else document.getElementById('btn-worlds').classList.remove('active-alert');
        });
    }

    onAuthStateChanged(auth, async (user) => {
        if (!user) { window.location.href = "login.html"; return; }
        const emailQuery = query(collection(db, "users"), where("email", "==", user.email.toLowerCase()));
        const emailSnap = await getDocs(emailQuery);
        if (!emailSnap.empty) {
            renderDashboard(emailSnap.docs[0].data(), emailSnap.docs[0].id, user.uid);
        } else {
            const uidDoc = await getDoc(doc(db, "users", user.uid));
            if (uidDoc.exists()) {
                renderDashboard(uidDoc.data(), uidDoc.id, user.uid);
            }
        }
    });
</script>
</body>
</html>
