<!DOCTYPE html>
<html>
<head>
    <title>Dashboard | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #008eb0; --th-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; display: flex; }

        /* Sidebar */
        .sidebar { width: 250px; background: white; min-height: 100vh; border-right: 1px solid var(--th-border); position: sticky; top: 0; padding: 20px; box-sizing: border-box; }
        .side-header { font-weight: bold; color: var(--th-blue); margin-bottom: 20px; display: flex; align-items: center; gap: 10px; }
        .side-nav a { display: block; padding: 10px 0; color: #555; text-decoration: none; font-size: 14px; border-bottom: 1px solid #eee; }
        .side-nav a:hover { color: var(--th-blue); }

        /* Main Profile Area */
        .main { flex-grow: 1; padding: 40px; max-width: 1000px; margin: 0 auto; }
        .profile-header { background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 30px; text-align: center; margin-bottom: 20px; }
        .avatar-main { width: 150px; height: 150px; background: #eee; border-radius: 4px; margin: 0 auto 15px; background-size: cover; border: 1px solid #ddd; }
        
        /* THE CONTENT AREA */
        .profile-content { background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 30px; line-height: 1.6; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-header">
        <div id="side-pfp" style="width:30px; height:30px; background:#eee; background-size:cover;"></div>
        <span id="display-username">Loading...</span>
    </div>
    <div class="side-nav">
        <a href="dashboard.html"><i class="fa fa-user"></i> Profile</a>
        <a href="settings.html"><i class="fa fa-cog"></i> Settings</a>
        <a href="profile_content.html"><i class="fa fa-edit"></i> Edit Profile</a>
    </div>
</div>

<div class="main">
    <div class="profile-header">
        <div class="avatar-main" id="main-pfp"></div>
        <h1 id="profile-name">User</h1>
    </div>

    <div class="profile-content" id="profile-display">
        <p style="color: #999;">Loading your profile content...</p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.firebasestorage.app",
    appId: "1:848883355194:web:361e9fe8eb9e01f350af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (user) {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        const data = userDoc.data();
        document.getElementById('display-username').innerText = data.username || "User";
        document.getElementById('profile-name').innerText = data.username || "User";
        
        if (data.pfp) {
          document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
          document.getElementById('main-pfp').style.backgroundImage = `url('${data.pfp}')`;
        }
        
        // This pulls the text saved in profile_content.html
        document.getElementById('profile-display').innerHTML = data.profileHTML || "<p>No profile content yet.</p>";
      }
    } else {
      window.location.href = "index.html";
    }
  });
</script>
</body>
</html>
