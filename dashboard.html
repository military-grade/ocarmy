<!DOCTYPE html>
<html>
<head>
    <title>OCARMY | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-dark: #212529; --th-blue: #008eb0; --th-border: #dcdcdc; --th-nav-blue: #5bc0de; }
        body { margin: 0; font-family: Arial, sans-serif; background: #fff; }
        .navbar { background: var(--th-dark); color: white; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 12px; }
        .nav-brand { font-weight: bold; font-size: 18px; color: white; text-decoration: none; }
        .nav-link { color: #aaa; text-decoration: none; font-size: 13px; cursor: pointer; position: relative; }
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: #333; min-width: 150px; z-index: 10; border: 1px solid #444; }
        .nav-link:hover .dropdown { display: block; }
        .drop-item { display: block; padding: 10px; color: #ccc; text-decoration: none; border-bottom: 1px solid #444; }
        .notif-box { background: var(--th-nav-blue); color: white; padding: 4px 10px; border-radius: 4px; font-size: 12px; text-decoration: none; }
        .container { display: flex; min-height: calc(100vh - 50px); }
        .sidebar { width: 180px; background: var(--th-blue); color: white; }
        .sidebar-user { background: rgba(0,0,0,0.1); padding: 15px; display: flex; align-items: center; }
        .avatar { width: 40px; height: 40px; background: #eee; border-radius: 2px; margin-right: 10px; background-size: cover; }
        .side-item { display: block; padding: 10px 15px; color: #e0f4f9; text-decoration: none; font-size: 13px; }
        .main-content { flex-grow: 1; padding: 30px; }
        .crown-icon { color: #f1c40f; margin-left: 5px; }
    </style>
</head>
<body>
    <nav class="navbar">
        <div class="nav-left">
            <a href="index.html" class="nav-brand">OCARMY</a>
            <a href="dashboard.html" class="nav-link"><i class="fa fa-home"></i> Profile</a>
            <div class="nav-link"><i class="fa fa-plus"></i> Submit
                <div class="dropdown">
                    <a href="submit_character.html" class="drop-item">Character</a>
                    <a href="#" class="drop-item">Folder</a>
                    <a href="#" class="drop-item">Adoptable</a>
                    <a href="#" class="drop-item">Commission</a>
                </div>
            </div>
        </div>
        <div class="nav-right" id="notif-container">
            </div>
    </nav>
    <div class="container">
        <div class="sidebar">
            <div class="sidebar-user">
                <div class="avatar" id="sidebar-avatar"></div>
                <div><b id="side-username">User</b><span id="owner-crown"></span></div>
            </div>
            <a href="#" class="side-item">Bulletins</a>
            <a href="#" class="side-item">Characters</a>
            <a href="settings.html" class="side-item">Settings</a>
        </div>
        <div class="main-content">
            <h2 style="border-bottom: 1px solid #eee; padding-bottom: 10px;">Recent Characters & Designs</h2>
            <div id="char-grid" style="display:grid; grid-template-columns: repeat(auto-fill, minmax(150px,1fr)); gap:15px;"></div>
        </div>
    </div>
</body>
</html>
