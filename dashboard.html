<!DOCTYPE html>
<html>
<head>
    <title>OCARMY | Dashboard</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-dark: #212529; --th-blue: #008eb0; --th-border: #dcdcdc; --th-nav-blue: #5bc0de; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fff; }

        /* THE TOP BANNER (Screenshot Style) */
        .navbar { background: var(--th-dark); color: white; padding: 5px 20px; display: flex; justify-content: space-between; align-items: center; height: 50px; }
        .nav-left, .nav-right { display: flex; align-items: center; gap: 15px; }
        .nav-brand { font-weight: bold; font-size: 18px; letter-spacing: 1px; color: white; text-decoration: none; }
        .nav-link { color: #aaa; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 5px; }
        .nav-link:hover { color: white; }

        /* Blue Stat Boxes */
        .nav-stat { background: var(--th-nav-blue); color: white; padding: 4px 8px; border-radius: 4px; font-size: 12px; display: flex; align-items: center; gap: 4px; font-weight: bold; }
        .crown-icon { color: #f1c40f; margin-left: 5px; text-shadow: 0 0 5px rgba(241, 196, 15, 0.5); }

        /* Sidebar & Layout */
        .container { display: flex; min-height: calc(100vh - 50px); }
        .sidebar { width: 200px; background: var(--th-blue); color: white; padding-top: 10px; }
        .side-item { display: block; padding: 10px 20px; color: #e0f4f9; text-decoration: none; font-size: 13px; }
        .side-item:hover { background: rgba(255,255,255,0.1); color: white; }

        .main-content { flex-grow: 1; padding: 30px; max-width: 1000px; }
        .card { border: 1px solid var(--th-border); border-radius: 4px; padding: 20px; margin-bottom: 20px; }
        
        /* Profile Settings Box */
        .settings-box { background: #f9f9f9; border: 1px solid #ddd; padding: 20px; border-radius: 4px; display: none; }
        textarea { width: 100%; height: 150px; font-family: monospace; margin-top: 10px; border: 1px solid #ccc; padding: 10px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="index.html" class="nav-brand">OCARMY</a>
        <a href="dashboard.html" class="nav-link"><i class="fa fa-home"></i> Profile</a>
        <a href="#" class="nav-link"><i class="fa fa-comments"></i> Forums</a>
        <a href="#" class="nav-link">Browse <i class="fa fa-caret-down"></i></a>
        <a href="submit_character.html" class="nav-link"><i class="fa fa-plus"></i> Submit <i class="fa fa-caret-down"></i></a>
    </div>

    <div class="nav-right">
        <div class="nav-stat"><i class="fa fa-heart"></i> 2</div>
        <div class="nav-stat"><i class="fa fa-star"></i> 449</div>
        <div class="nav-stat"><i class="fa fa-bars"></i> 28</div>
        <div class="nav-stat"><i class="fa fa-comment"></i> 2</div>
        <div class="nav-link" id="user-display">
            <span id="username-text">User</span>
            <span id="owner-crown"></span>
            <i class="fa fa-caret-down"></i>
        </div>
    </div>
</nav>

<div class="container">
    <div class="sidebar">
        <div style="padding: 15px; font-weight: bold; background: rgba(0,0,0,0.1);">
            <i class="fa fa-user"></i> <span id="sidebar-name">User</span>
        </div>
        <a href="#" class="side-item">Bulletins</a>
        <a href="#" class="side-item">Characters</a>
        <a href="#" class="side-item">Links</a>
        <a href="#" class="side-item">Worlds</a>
        <a href="javascript:void(0)" onclick="openSettings()" class="side-item" style="color: #fff; font-weight: bold;"><i class="fa fa-cog"></i> Profile Settings</a>
        <a href="#" id="logout-btn" class="side-item">Logout</a>
    </div>

    <div class="main-content">
        <div id="settings-area" class="settings-box">
            <h3><i class="fa fa-paint-brush"></i> Profile Customization</h3>
            <p style="font-size: 13px; color: #666;">Enter your Custom CSS or HTML below to change your profile's look.</p>
            <textarea id="custom-code" placeholder="/* CSS goes here */"></textarea>
            <button onclick="saveStyles()" style="background: var(--th-blue); color: white; border: none; padding: 10px 20px; border-radius: 4px; margin-top: 10px; cursor: pointer;">Save Settings</button>
        </div>

        <div id="activity-area">
            <h2 style="border-bottom: 1px solid #eee; padding-bottom: 10px;">Recent Characters & Designs</h2>
            <div id="char-grid" style="display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px;">
                </div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, getDoc, collection, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "index.html";
    } else {
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        const username = userDoc.data().username;
        document.getElementById('username-text').innerText = username;
        document.getElementById('sidebar-name').innerText = username;

        // OWNER CROWN CHECK
        if (username.toLowerCase() === "military grade") {
            document.getElementById('owner-crown').innerHTML = '<i class="fa fa-crown crown-icon" title="Site Owner"></i>';
        }
      }
      
      document.getElementById('logout-btn').onclick = () => signOut(auth);
      
      // Load Characters
      onSnapshot(query(collection(db, "characters"), orderBy("timestamp", "desc")), (snap) => {
        const grid = document.getElementById('char-grid');
        grid.innerHTML = '';
        snap.forEach(doc => {
          const char = doc.data();
          grid.innerHTML += `<div style="border:1px solid #ddd; border-radius:4px; text-align:center; padding:5px;"><img src="${char.image}" style="width:100%; height:150px; object-fit:cover;"><div style="background:var(--th-blue); color:white; font-size:11px; padding:5px; font-weight:bold;">${char.name}</div></div>`;
        });
      });
    }
  });

  window.openSettings = () => {
    document.getElementById('settings-area').style.display = 'block';
    document.getElementById('activity-area').style.display = 'none';
  };
</script>
</body>
</html>
