<!DOCTYPE html>
<html>
<head>
    <title>OCARMY | Profile</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #008eb0; --th-sidebar-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #fff; color: #333; }
        
        /* Top Navbar */
        .navbar { background: #222; color: white; padding: 10px 20px; display: flex; justify-content: space-between; align-items: center; font-size: 14px; }
        .navbar a { color: #ccc; text-decoration: none; margin-left: 15px; }

        .container { display: flex; min-height: calc(100vh - 40px); }

        /* Blue Sidebar (Matches your screenshot) */
        .sidebar { width: 180px; background: var(--th-blue); color: white; padding-top: 10px; }
        .sidebar-header { background: rgba(0,0,0,0.1); padding: 10px; font-weight: bold; font-size: 13px; display: flex; align-items: center; }
        .user-icon { width: 40px; height: 40px; background: #eee; margin-right: 10px; border-radius: 2px; }
        
        .nav-link { display: block; padding: 10px 15px; color: #e0f4f9; text-decoration: none; font-size: 13px; transition: 0.2s; }
        .nav-link:hover { background: rgba(255,255,255,0.1); color: white; }
        .nav-link i { width: 20px; margin-right: 5px; opacity: 0.8; }

        /* Main Content Area */
        .main-content { flex-grow: 1; padding: 20px 40px; }
        .profile-header { font-size: 14px; margin-bottom: 20px; color: #666; }
        .row { display: flex; gap: 30px; }
        
        /* Character Grid */
        .content-col { flex: 2; }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .char-card { border: 1px solid var(--th-border); border-radius: 4px; overflow: hidden; text-align: center; }
        .char-card img { width: 100%; height: 140px; object-fit: cover; }
        .char-tag { background: var(--th-blue); color: white; padding: 8px; font-size: 11px; font-weight: bold; text-transform: uppercase; }

        /* Sidebar info (Latest Comments) */
        .info-col { flex: 1; }
        .info-box h4 { margin: 0 0 10px 0; font-size: 1.2rem; }
        .empty-text { color: #999; font-size: 13px; }

        /* Settings Modal (Placeholder for Custom Code) */
        #settings-panel { display: none; background: #f9f9f9; padding: 20px; border: 1px solid #ddd; margin-top: 20px; border-radius: 4px; }
        textarea { width: 100%; height: 100px; font-family: monospace; margin-top: 10px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div style="font-weight:bold; letter-spacing:1px;">OCARMY</div>
    <div>
        <a href="index.html">Home</a>
        <a href="#" id="logout-link">Logout</a>
    </div>
</nav>

<div class="container">
    <div class="sidebar">
        <div class="sidebar-header">
            <div class="user-icon" id="user-icon-img"></div>
            <span id="display-username">User</span>
        </div>
        <a href="#" class="nav-link"><i class="fa fa-newspaper"></i> Bulletins</a>
        <a href="#" class="nav-link"><i class="fa fa-users"></i> Characters</a>
        <a href="#" class="nav-link"><i class="fa fa-link"></i> Links</a>
        <a href="#" class="nav-link"><i class="fa fa-earth-americas"></i> Worlds</a>
        <a href="#" class="nav-link"><i class="fa fa-star"></i> Favorites</a>
        <div style="height:20px;"></div>
        <a href="#" class="nav-link"><i class="fa fa-palette"></i> Designs</a>
        <a href="#" class="nav-link"><i class="fa fa-paint-brush"></i> Art</a>
        <a href="#" class="nav-link"><i class="fa fa-book"></i> Library</a>
        <div style="height:20px;"></div>
        <a href="javascript:void(0)" onclick="toggleSettings()" class="nav-link"><i class="fa fa-cog"></i> Profile Settings</a>
    </div>

    <div class="main-content">
        <div class="profile-header" id="profile-status">loading profile...</div>
        
        <div id="settings-panel">
            <h4>Profile Customization</h4>
            <p style="font-size:12px;">Paste your Custom CSS/HTML here:</p>
            <textarea placeholder="<style> body { background: pink !important; } </style>"></textarea>
            <button style="margin-top:10px;">Save Custom Code</button>
        </div>

        <div class="row">
            <div class="content-col">
                <h3 class="section-title">Recent Characters & Designs</h3>
                <div class="char-grid" id="dashboard-grid">
                    </div>
            </div>

            <div class="info-col">
                <div class="info-box">
                    <h4>Latest Comments</h4>
                    <p class="empty-text">No comments found.</p>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, query, orderBy, onSnapshot, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) {
      window.location.href = "index.html";
    } else {
      // Fetch the username we saved during registration
      const userDoc = await getDoc(doc(db, "users", user.uid));
      if (userDoc.exists()) {
        document.getElementById('display-username').innerText = userDoc.data().username;
        document.getElementById('profile-status').innerText = `Profile for ${userDoc.data().username}`;
      }
      
      document.getElementById('logout-link').onclick = () => signOut(auth);
      
      // Load Characters
      onSnapshot(query(collection(db, "characters"), orderBy("timestamp", "desc")), (snap) => {
        const grid = document.getElementById('dashboard-grid');
        grid.innerHTML = '';
        snap.forEach(doc => {
          const char = doc.data();
          grid.innerHTML += `
            <div class="char-card">
                <img src="${char.image}">
                <div class="char-tag">${char.name}</div>
            </div>`;
        });
      });
    }
  });

  window.toggleSettings = () => {
    const panel = document.getElementById('settings-panel');
    panel.style.display = panel.style.display === 'none' ? 'block' : 'none';
  };
</script>
</body>
</html>
