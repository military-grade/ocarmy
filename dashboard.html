<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; overflow-x: hidden; }

        /* Navbar & Navigation (Matches Screenshots 12.43.31 & 12.43.40) */
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; gap: 15px; align-items: center; height: 100%; }
        .nav-left a, .nav-item { color: #ccc; text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; border: none; background: none; }
        .nav-left a:hover, .nav-item:hover { color: white; background: rgba(255,255,255,0.1); }
        
        /* Dropdowns */
        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }
        .dropdown-content { display: none; position: absolute; top: 50px; left: 0; background: white; border: 1px solid var(--border); min-width: 180px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); z-index: 1001; }
        .dropdown-right { left: auto; right: 0; }
        .dropdown-content a { display: block; padding: 10px 15px; color: #333 !important; text-decoration: none; font-size: 13px; border-bottom: 1px solid #eee; height: auto; }
        .dropdown-label { background: #f9f9f9; padding: 5px 15px; font-size: 11px; font-weight: bold; color: #999; text-transform: uppercase; border-bottom: 1px solid #eee; }
        .show { display: block; }

        .nav-pfp { width: 30px; height: 30px; background: #eee; border-radius: 2px; background-size: cover; margin-left: 8px; }

        /* Wrapper - Zero Gap Flush Fix */
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); align-items: stretch; }

        /* Sidebar (Matches Screenshot 12.48.26) */
        .sidebar { width: 200px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-user-header { background: #427e95; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar-box { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; flex-shrink: 0; }
        .side-user-name { font-weight: bold; font-size: 15px; color: white; overflow: hidden; white-space: nowrap; text-overflow: ellipsis; }

        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-nav a:hover, .side-nav a.active { background: rgba(0,0,0,0.1); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .main { flex: 1; padding: 30px; background: white; }
        
        /* Characters Gallery Logic (Matches Screenshot 12.49.10) */
        .folder-header { display: flex; justify-content: space-between; align-items: center; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-top: 10px; }
        .folder-title { font-weight: bold; color: #444; font-size: 18px; display: flex; align-items: center; gap: 8px; }
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(135px, 1fr)); gap: 15px; padding: 20px 0; }
        .char-card { text-align: center; text-decoration: none; color: inherit; }
        .char-thumb { width: 135px; height: 135px; background: #eee; border: 1px solid var(--border); border-radius: 4px; background-size: cover; background-position: center; margin-bottom: 5px; position: relative; }
        .char-name-badge { background: var(--th-blue); color: white; padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; display: inline-flex; align-items: center; gap: 5px; max-width: 100%; }
        .char-stats { font-size: 10px; color: #999; margin-top: 3px; display: flex; justify-content: center; gap: 8px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white; font-size: 16px;">OCARMY</a>
        <a href="#"><i class="fa fa-eye"></i> Browse</a>
        <div class="dropdown">
            <button class="nav-item" onclick="toggleDrop('drop-submit')"><i class="fa fa-plus"></i> Submit <i class="fa fa-caret-down" style="font-size: 10px;"></i></button>
            <div id="drop-submit" class="dropdown-content">
                <a href="create_character.html"><i class="fa fa-user"></i> Character</a>
                <a href="create_bulletin.html"><i class="fa fa-newspaper"></i> Bulletin</a>
                <a href="#"><i class="fa fa-image"></i> Image</a>
            </div>
        </div>
        <a href="#"><i class="fa fa-search"></i> Search</a>
    </div>
    <div class="dropdown">
        <button class="nav-item" onclick="toggleDrop('drop-user')">
            <span id="nav-username">User</span>
            <div class="nav-pfp" id="nav-pfp-img"></div>
        </button>
        <div id="drop-user" class="dropdown-content dropdown-right">
            <a href="dashboard.html">Profile</a>
            <a href="messages.html">Inbox</a>
            <div class="dropdown-label">Manage</div>
            <a href="create_folder.html">Folders</a>
            <a href="#" id="logout-btn">Logout</a>
        </div>
    </div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar-box" id="side-pfp"></div>
            <div class="side-user-name" id="side-user-text">militarygrade</div>
        </div>
        <div class="side-nav">
            <a href="dashboard.html" class="active"><i class="fa fa-user"></i> Profile</a>
            <a href="bulletins.html"><i class="fa fa-comment"></i> Bulletins</a>
            <a href="characters.html" id="side-chars-btn"><i class="fa fa-users"></i> Characters</a>
            <div class="side-label">Portfolio</div>
            <a href="designs.html"><i class="fa fa-paint-brush"></i> Designs</a>
            <a href="art.html"><i class="fa fa-image"></i> Art</a>
            <div class="side-label">Interaction</div>
            <a href="comments.html"><i class="fa fa-comments"></i> Comments</a>
            <a href="messages.html"><i class="fa fa-envelope"></i> Inbox</a>
        </div>
    </aside>

    <main class="main" id="main-content">
        <div id="profile-blurb"></div>

        <div id="gallery-view">
            <div class="folder-header">
                <span class="folder-title"><i class="fa fa-folder-open"></i> Unsorted</span>
                <a href="characters.html" style="font-size:11px; font-weight:bold; color:var(--th-blue); text-decoration:none;"><i class="fa fa-eye"></i> View All</a>
            </div>
            <div class="char-grid" id="character-gallery">
                </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);

    window.toggleDrop = (id) => {
        document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
        document.getElementById(id).classList.toggle('show');
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('nav-username').innerText = data.username;
                document.getElementById('side-user-text').innerText = data.username;
                if (data.pfp) {
                    document.getElementById('nav-pfp-img').style.backgroundImage = `url('${data.pfp}')`;
                    document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
                }
                document.getElementById('profile-blurb').innerHTML = data.profileHTML || "";
            }

            // LOAD REAL CHARACTERS
            const q = query(collection(db, "characters"), where("ownerId", "==", user.uid));
            const snap = await getDocs(q);
            const gallery = document.getElementById('character-gallery');
            snap.forEach(d => {
                const c = d.data();
                gallery.innerHTML += `
                    <a href="character.html?id=${d.id}" class="char-card">
                        <div class="char-thumb" style="background-image: url('${c.avatar}')"></div>
                        <div class="char-name-badge">${c.name}</div>
                        <div class="char-stats">
                            <span><i class="fa fa-star"></i> ${c.favCount || 0}</span>
                            <span><i class="fa fa-image"></i> ${c.imgCount || 1}</span>
                        </div>
                    </a>`;
            });
        }
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>
</body>
</html>
