<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Dashboard | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --discord-bg: #313338; --discord-text: #dbdee1; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); display: flex; flex-direction: column; min-height: 100vh; color: #333; }

        /* Top Navbar - Left Aligned */
        .navbar { background: var(--th-dark); color: white; padding: 10px 20px; display: flex; align-items: center; gap: 30px; }
        .nav-brand { font-weight: bold; letter-spacing: 1px; color: white; text-decoration: none; }
        .nav-links { display: flex; gap: 20px; font-size: 13px; }
        .nav-links a { color: #ccc; text-decoration: none; transition: 0.2s; }
        .nav-links a:hover { color: white; }

        .container { display: flex; flex: 1; }

        /* Sidebar (Left) */
        .sidebar { width: 180px; background: var(--th-blue); color: white; padding: 15px 0; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-nav a:hover, .side-nav a.active { background: rgba(0,0,0,0.1); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        /* Main Content Area */
        .main { flex: 1; padding: 25px; display: flex; flex-direction: column; gap: 20px; }
        .content-card { background: white; border: 1px solid #ddd; border-radius: 4px; padding: 25px; }
        
        /* Message UI (Professional Discord Style) */
        .msg-container { display: none; flex-direction: column; height: 500px; background: white; border: 1px solid #ddd; border-radius: 4px; }
        .msg-history { flex: 1; overflow-y: auto; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        .msg-bubble { display: flex; gap: 12px; max-width: 80%; }
        .msg-avatar { width: 40px; height: 40px; background: #eee; border-radius: 50%; background-size: cover; flex-shrink: 0; }
        .msg-content { background: #f2f3f5; padding: 10px 15px; border-radius: 8px; font-size: 14px; position: relative; }
        .msg-content::before { content: ''; position: absolute; left: -6px; top: 12px; border-style: solid; border-width: 6px 6px 6px 0; border-color: transparent #f2f3f5 transparent transparent; }
        .msg-header { font-size: 12px; font-weight: bold; margin-bottom: 4px; color: #060607; }
        
        .msg-input-area { padding: 20px; border-top: 1px solid #eee; display: flex; gap: 10px; }
        .msg-input { flex: 1; padding: 10px; border: 1px solid #ddd; border-radius: 4px; outline: none; }
        
        /* Editor Section */
        #editor-section { display: none; }
        .btn-action { background: var(--th-blue); color: white; border: none; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<nav class="navbar">
    <a href="dashboard.html" class="nav-brand">OCARMY</a>
    <div class="nav-links">
        <a href="dashboard.html"><i class="fa fa-home"></i> Profile</a>
        <a href="#"><i class="fa fa-plus"></i> Submit</a>
        <a href="#"><i class="fa fa-info-circle"></i> Info</a>
        <a href="#"><i class="fa fa-search"></i> Search</a>
        <a href="#"><i class="fa fa-newspaper"></i> Blogs</a>
    </div>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="side-nav">
            <a href="#" onclick="showSection('profile')" class="active" id="link-profile"><i class="fa fa-user"></i> Profile</a>
            <a href="#"><i class="fa fa-users"></i> Characters</a>
            <a href="#"><i class="fa fa-star"></i> Favorites</a>
            
            <div class="side-label">Interaction</div>
            <a href="#" onclick="showSection('messages')" id="link-messages"><i class="fa fa-envelope"></i> Message</a>
            
            <div class="side-label">Settings</div>
            <a href="#" onclick="showSection('edit')"><i class="fa fa-edit"></i> Edit Profile</a>
            <a href="settings.html"><i class="fa fa-cog"></i> Account Settings</a>
        </div>
    </aside>

    <main class="main">
        <section id="profile-section" class="content-card">
            <div id="profile-display" style="text-align: center; min-height: 100px;">
                <p style="color:#999;">Loading blurb...</p>
            </div>
        </section>

        <section id="edit-section" class="content-card" style="display:none;">
            <h3 style="margin-top:0;">Edit Profile Blurb</h3>
            <textarea id="profile-editor"></textarea>
            <button class="btn-action" style="margin-top:15px;" onclick="saveBlurb()">Update Blurb</button>
        </section>

        <section id="messages-section" class="msg-container">
            <div style="padding:15px; border-bottom:1px solid #eee; font-weight:bold; font-size:14px;">
                <i class="fa fa-comments"></i> Private Messages
            </div>
            <div class="msg-history" id="msg-history">
                <div style="text-align:center; color:#999; font-size:12px; margin-top:50px;">Start a professional conversation...</div>
            </div>
            <div class="msg-input-area">
                <input type="text" id="msg-input" class="msg-input" placeholder="Message #User...">
                <button class="btn-action" onclick="sendMessage()"><i class="fa fa-paper-plane"></i></button>
            </div>
        </section>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, query, orderBy, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
        authDomain: "ocarmy-db.firebaseapp.com",
        projectId: "ocarmy-db",
        storageBucket: "ocarmy-db.firebasestorage.app",
        appId: "1:848883355194:web:361e9fe8eb9e01f350af03"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);

    let currentUserData = null;

    // --- Page Switching Logic ---
    window.showSection = (section) => {
        document.querySelectorAll('main section').forEach(s => s.style.display = 'none');
        document.getElementById(section + '-section').style.display = section === 'messages' ? 'flex' : 'block';
        
        // Handle TinyMCE initialization only when editing
        if(section === 'edit') {
            tinymce.init({
                selector: '#profile-editor',
                height: 350,
                menubar: false,
                plugins: 'link image code lists emoticons',
                toolbar: 'bold italic underline | bullist numlist | emoticons link image | code',
                setup: (ed) => {
                    ed.on('init', () => {
                        if(currentUserData?.profileHTML) ed.setContent(currentUserData.profileHTML);
                    });
                }
            });
        }
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                currentUserData = userDoc.data();
                document.getElementById('profile-display').innerHTML = currentUserData.profileHTML || "Welcome to OCARMY.";
            }
            loadMessages();
        } else {
            window.location.href = "index.html";
        }
    });

    // --- Save Blurb Logic ---
    window.saveBlurb = async () => {
        tinymce.triggerSave();
        const content = tinymce.get('profile-editor').getContent();
        await setDoc(doc(db, "users", auth.currentUser.uid), { profileHTML: content }, { merge: true });
        alert("Profile Updated!");
        location.reload();
    };

    // --- Private Messaging Logic ---
    window.sendMessage = async () => {
        const input = document.getElementById('msg-input');
        if(!input.value.trim()) return;

        await addDoc(collection(db, "messages"), {
            text: input.value,
            sender: currentUserData.username || "User",
            senderPfp: currentUserData.pfp || "",
            timestamp: Date.now()
        });
        input.value = "";
    };

    function loadMessages() {
        const q = query(collection(db, "messages"), orderBy("timestamp", "asc"));
        onSnapshot(q, (snapshot) => {
            const history = document.getElementById('msg-history');
            history.innerHTML = "";
            snapshot.forEach(doc => {
                const msg = doc.data();
                const pfpStyle = msg.senderPfp ? `style="background-image:url('${msg.senderPfp}')"` : "";
                history.innerHTML += `
                    <div class="msg-bubble">
                        <div class="msg-avatar" ${pfpStyle}></div>
                        <div class="msg-content">
                            <div class="msg-header">${msg.sender}</div>
                            ${msg.text}
                        </div>
                    </div>
                `;
            });
            history.scrollTop = history.scrollHeight;
        });
    }
</script>
</body>
</html>
