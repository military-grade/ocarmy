<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }

        /* Navbar & Dropdown */
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; gap: 20px; align-items: center; }
        .nav-left a { color: #ccc; text-decoration: none; font-size: 13px; }
        .nav-right { position: relative; cursor: pointer; display: flex; align-items: center; gap: 8px; font-size: 13px; height: 100%; }
        .nav-pfp { width: 30px; height: 30px; background: #eee; border-radius: 2px; background-size: cover; }
        .dropdown-menu { display: none; position: absolute; top: 50px; right: 0; background: white; border: 1px solid var(--border); width: 160px; box-shadow: 0 2px 5px rgba(0,0,0,0.1); }
        .dropdown-menu a { display: block; padding: 10px 15px; color: #333; text-decoration: none; font-size: 13px; border-bottom: 1px solid #eee; }

        .container { display: flex; max-width: 1200px; margin: 0 auto; min-height: calc(100vh - 50px); }
        .sidebar { width: 180px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        /* Profile Content Area */
        .main { flex: 1; padding: 20px; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); }
        #user-custom-css { display: none; }

        /* Comments */
        .section-header { background: #f9f9f9; padding: 8px 15px; border: 1px solid var(--border); border-radius: 4px 4px 0 0; font-weight: bold; font-size: 14px; margin-top: 40px; }
        .comment-box { border: 1px solid var(--border); border-top: none; padding: 15px; margin-bottom: 10px; display: flex; gap: 15px; }
        .comment-avatar { width: 50px; height: 50px; background: #eee; border-radius: 3px; background-size: cover; }
        .comment-meta { font-size: 11px; color: #999; margin-bottom: 5px; }
    </style>
    <style id="user-custom-css"></style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white;">OCARMY</a>
        <a href="dashboard.html"><i class="fa fa-home"></i> Profile</a>
    </div>
    <div class="nav-right" onclick="toggleDropdown()">
        <span id="nav-username">User</span>
        <div class="nav-pfp" id="nav-pfp-img"></div>
        <div class="dropdown-menu" id="nav-dropdown">
            <a href="dashboard.html">My Profile</a>
            <a href="settings.html">Settings</a>
            <a href="#" id="logout-btn">Logout</a>
        </div>
    </div>
</nav>

<div class="container">
    <aside class="sidebar">
        <div class="side-nav">
            <a href="dashboard.html" style="background:rgba(0,0,0,0.1);"><i class="fa fa-user"></i> Profile</a>
            <div class="side-label">Interaction</div>
            <a href="messages.html"><i class="fa fa-envelope"></i> Inbox</a>
            <div class="side-label">Settings</div>
            <a href="profile_content.html"><i class="fa fa-edit"></i> Edit Profile</a>
        </div>
    </aside>

    <main class="main">
        <div id="profile-blurb"></div>

        <div class="section-header">Comments</div>
        <div id="comment-list">
            </div>
        <textarea id="comment-input" style="width:100%; height:80px; margin-top:10px; border:1px solid #ddd;" placeholder="Write a comment..."></textarea>
        <button onclick="postComment()" style="background:var(--th-blue); color:white; border:none; padding:8px 15px; margin-top:5px; cursor:pointer;">Post Comment</button>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const auth = getAuth();
    const db = getFirestore(app);

    window.toggleDropdown = () => {
        const menu = document.getElementById('nav-dropdown');
        menu.style.display = menu.style.display === 'block' ? 'none' : 'block';
    };

    onAuthStateChanged(auth, async (user) => {
        if (user) {
            const userDoc = await getDoc(doc(db, "users", user.uid));
            if (userDoc.exists()) {
                const data = userDoc.data();
                document.getElementById('nav-username').innerText = data.username || "User";
                if (data.pfp) document.getElementById('nav-pfp-img').style.backgroundImage = `url('${data.pfp}')`;
                
                // Inject User's Custom Content
                document.getElementById('profile-blurb').innerHTML = data.profileHTML || "<p>Welcome to your profile!</p>";
                document.getElementById('user-custom-css').innerHTML = data.profileCSS || "";
            }
        } else { window.location.href = "index.html"; }
    });

    document.getElementById('logout-btn').onclick = () => signOut(auth);
</script>
</body>
</html>
