<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Browse | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }

        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; gap: 10px; align-items: center; height: 100%; }
        .nav-left a { color: #ccc; text-decoration: none; font-size: 13px; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; }
        .nav-left a:hover { color: white; background: rgba(255,255,255,0.1); }

        .wrapper { max-width: 1140px; margin: 0 auto; background: white; border: 1px solid var(--border); border-top: none; min-height: calc(100vh - 50px); padding: 30px; }

        .search-area { margin-bottom: 30px; border-bottom: 1px solid #eee; padding-bottom: 20px; }
        .search-trigger { width: 100%; padding: 12px 20px; border: 1px solid #ccc; border-radius: 4px; background: #fff; cursor: pointer; color: #999; display: flex; align-items: center; gap: 10px; text-decoration: none; }
        .search-trigger:hover { border-color: var(--th-blue); }

        .browse-section { margin-bottom: 40px; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .section-header { background: #f9f9f9; padding: 10px 15px; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; align-items: center; font-weight: bold; }
        .section-title { font-size: 18px; color: #333; display: flex; align-items: center; gap: 10px; }
        .section-body { padding: 20px; display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }

        .char-card { text-align: center; text-decoration: none; color: inherit; display: block; }
        .char-thumb { width: 140px; height: 140px; background: #eee; border: 1px solid var(--border); border-radius: 4px; background-size: cover; background-position: center; margin-bottom: 5px; position: relative; }
        .char-badge { background: var(--th-blue); color: white; padding: 3px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; display: inline-flex; align-items: center; gap: 4px; margin-bottom: 3px; max-width: 100%; text-overflow: ellipsis; overflow: hidden; white-space: nowrap; }
        .char-owner { display: inline-flex; align-items: center; gap: 4px; font-size: 11px; background: #f0f0f0; padding: 2px 6px; border-radius: 3px; color: var(--th-blue); text-decoration: none; }
        .char-owner:hover { background: #e0e0e0; }
        .char-stats { font-size: 10px; color: #999; margin-top: 4px; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white; font-size: 16px;">OCARMY</a>
        <a href="browse.html" style="background: rgba(255,255,255,0.1); color: white;"><i class="fa fa-eye"></i> Browse</a>
        <a href="create_character.html"><i class="fa fa-plus"></i> Submit</a>
        <a href="search.html"><i class="fa fa-search"></i> Search</a>
    </div>
</nav>

<div class="wrapper">
    <div class="search-area">
        <a href="search.html" class="search-trigger">
            <i class="fa fa-search"></i> Search OCARMY...
        </a>
    </div>

    <div class="browse-section">
        <div class="section-header">
            <span class="section-title"><i class="fa fa-dice"></i> Random</span>
        </div>
        <div class="section-body" id="random-grid">
            <div class="text-muted">Rolling dice...</div>
        </div>
    </div>

    <div class="browse-section">
        <div class="section-header">
            <span class="section-title"><i class="fa fa-clock"></i> Recent</span>
        </div>
        <div class="section-body" id="recent-grid">
            <div class="text-muted">Loading fresh characters...</div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, getDocs, doc, getDoc, limit, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    // FIXED: Async template function to fetch owner data correctly
    async function createCharCard(id, data) {
        // Fetch the owner's username from the users collection
        let ownerName = "User";
        try {
            if (data.ownerId) {
                const ownerSnap = await getDoc(doc(db, "users", data.ownerId));
                if (ownerSnap.exists()) {
                    ownerName = ownerSnap.data().username || "User";
                }
            }
        } catch (e) { console.error("Error fetching owner name:", e); }

        return `
            <div class="char-card">
                <a href="character.html?id=${id}">
                    <div class="char-thumb" style="background-image: url('${data.avatar || ''}')"></div>
                </a>
                <div class="char-badge">
                    ${data.visibility === 'Private' ? '<i class="fa fa-lock"></i>' : ''} ${data.name}
                </div><br>
                <a href="profile.html?user=${data.ownerId}" class="char-owner">
                    <i class="fa fa-user"></i> ${ownerName}
                </a>
                <div class="char-stats">★ ${data.favCount || 0} | ✉ ${data.imgCount || 1}</div>
            </div>`;
    }

    onAuthStateChanged(auth, async (user) => {
        // --- LOAD RANDOM ---
        const qRand = query(collection(db, "characters"), limit(6));
        const snapRand = await getDocs(qRand);
        const randomGrid = document.getElementById('random-grid');
        randomGrid.innerHTML = "";
        
        for (const characterDoc of snapRand.docs) {
            const cardHTML = await createCharCard(characterDoc.id, characterDoc.data());
            randomGrid.innerHTML += cardHTML;
        }

        // --- LOAD RECENT ---
        const qRecent = query(collection(db, "characters"), orderBy("createdAt", "desc"), limit(6));
        const snapRecent = await getDocs(qRecent);
        const recentGrid = document.getElementById('recent-grid');
        recentGrid.innerHTML = "";
        
        for (const characterDoc of snapRecent.docs) {
            const cardHTML = await createCharCard(characterDoc.id, characterDoc.data());
            recentGrid.innerHTML += cardHTML;
        }
    });
</script>
</body>
</html>
