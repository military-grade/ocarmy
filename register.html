<!DOCTYPE html>
<html>
<head>
    <title>OC ARMY | Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #2c3e50; --th-light-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-light-bg); }
        .navbar { background-color: var(--th-blue); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .nav-item { margin-right: 20px; cursor: pointer; color: #ddd; text-decoration: none; font-size: 14px; }
        .nav-item:hover { color: white; }
        .container { max-width: 1200px; margin: 30px auto; display: flex; gap: 20px; }
        .sidebar { width: 250px; background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 15px; }
        .main-wall { flex-grow: 1; background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 20px; min-height: 400px; }
        .section-header { border-bottom: 1px solid var(--th-border); padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; color: #555; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left" style="display:flex; align-items:center;">
        <a href="index.html" class="nav-item" style="font-weight: bold; color: white; font-size: 18px;">OC ARMY</a>
        <div class="nav-item"><i class="fa fa-plus"></i> Upload</div>
    </div>
    <div class="nav-right" id="auth-status">
        <a href="register.html" class="nav-item">Register</a>
    </div>
</nav>

<div class="container">
    <div class="sidebar">
        <div class="section-header">MENU</div>
        <p><i class="fa fa-user"></i> Characters</p>
        <p><i class="fa fa-folder"></i> Folders</p>
        <p><i class="fa fa-link"></i> Commissions</p>
    </div>
    <div class="main-wall">
        <div class="section-header">RECENT ACTIVITY</div>
        <p id="welcome-msg">Welcome to the army. Please register to start your archive!</p>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();

  onAuthStateChanged(auth, (user) => {
    const statusDiv = document.getElementById('auth-status');
    const welcome = document.getElementById('welcome-msg');
    if (user) {
      statusDiv.innerHTML = `<span class="nav-item">User: ${user.email}</span><a href="#" id="logout" class="nav-item">Logout</a>`;
      welcome.innerHTML = `<b>Welcome back, Commander.</b> Your archive is ready.`;
      document.getElementById('logout').onclick = () => signOut(auth);
    }
  });
</script>
</body>
</html>
