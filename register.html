<!DOCTYPE html>
<html>
<head>
    <title>Register | OCARMY</title>
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; min-height: 100vh; margin: 0; padding: 20px; }
        .register-box { background: white; padding: 40px; border-radius: 8px; width: 400px; text-align: center; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        .tos-warning { background: #fdf2f2; border: 1px solid #f98080; color: #9b1c1c; padding: 10px; border-radius: 4px; font-size: 12px; font-weight: bold; margin-bottom: 20px; text-transform: uppercase; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; margin: 8px 0; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        label { display: block; text-align: left; font-size: 11px; color: #7f8c8d; margin-top: 10px; font-weight: bold; text-transform: uppercase; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 20px; }
        .switch-link { display: block; margin-top: 20px; font-size: 13px; color: #7f8c8d; text-decoration: none; }
    </style>
</head>
<body>
<div class="register-box">
    <div class="tos-warning">Please read our TOS before joining!</div>
    <h2>Create Account</h2>
    
    <input type="text" id="username" placeholder="Username">
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    
    <label>Date of Birth (Used for age-gating content)</label>
    <input type="date" id="dob">
    
    <button id="reg-btn">Register</button>
    <p id="msg" style="color:red; font-size:13px;"></p>
    <a href="login.html" class="switch-link">Already have an account? Login here.</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  document.getElementById('reg-btn').onclick = async () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const user = document.getElementById('username').value;
    const dob = document.getElementById('dob').value;

    try {
      const res = await createUserWithEmailAndPassword(auth, email, pass);
      await setDoc(doc(db, "users", res.user.uid), {
        username: user,
        dob: dob,
        joined: new Date()
      });
      window.location.href = "index.html";
    } catch (e) { document.getElementById('msg').innerText = e.message; }
  };
</script>
</body>
</html>
