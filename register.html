<!DOCTYPE html>
<html>
<head>
    <title>Register | OC ARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .register-box { background: white; padding: 40px; border-radius: 8px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); width: 350px; text-align: center; }
        h2 { color: #2c3e50; margin-bottom: 20px; }
        input { width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; font-size: 16px; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-size: 16px; font-weight: bold; margin-top: 10px; }
        button:hover { background: #2980b9; }
        #msg { color: #e74c3c; margin-top: 15px; font-size: 14px; }
        .back-link { display: block; margin-top: 20px; color: #7f8c8d; text-decoration: none; font-size: 14px; }
    </style>
</head>
<body>

<div class="register-box">
    <h2>Join the Army</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Choose a Password">
    <button id="reg-btn">Create Account</button>
    <p id="msg"></p>
    <a href="index.html" class="back-link">← Back to Home</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // Your unique Firebase keys
  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.firebasestorage.app",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03",
    measurementId: "G-Y5KSK46H3L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();

  document.getElementById('reg-btn').addEventListener('click', () => {
    const email = document.getElementById('email').value;
    const pass = document.getElementById('password').value;
    const msg = document.getElementById('msg');
    
    msg.innerText = "Processing...";

    createUserWithEmailAndPassword(auth, email, pass)
      .then(() => { 
          // Redirect to home page on success
          window.location.href = "index.html"; 
      })
      .catch((error) => { 
          msg.innerText = error.message; 
      });
  });
</script>

</body>
</html>
