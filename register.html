<!DOCTYPE html>
<html>
<head>
    <title>Join OCARMY</title>
    <style>
        body { background: #222; color: white; font-family: Arial, sans-serif; text-align: center; padding: 50px; }
        .box { background: #333; padding: 30px; display: inline-block; border-radius: 8px; border: 1px solid #444; box-shadow: 0 4px 15px rgba(0,0,0,0.3); }
        input { display: block; margin: 15px auto; padding: 12px; width: 280px; border-radius: 4px; border: 1px solid #555; background: #222; color: white; }
        button { background: #008eb0; color: white; border: none; padding: 12px 30px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        button:hover { background: #00a8d1; }
        #msg { color: #ff6b6b; font-size: 13px; margin-top: 15px; }
    </style>
</head>
<body>
    <div class="box">
        <h2 style="margin-top:0;">Create Account</h2>
        <p style="color:#888; font-size: 13px;">Welcome to the army. Choose your username wisely!</p>
        
        <input type="text" id="reg-username" placeholder="Username (e.g. sparkelpuss_)">
        <input type="email" id="reg-email" placeholder="Email Address">
        <input type="password" id="reg-password" placeholder="Create Password">
        
        <button id="btn-reg">Register</button>
        <p id="msg"></p>
        <a href="login.html" style="color: #5bc0de; font-size: 12px; text-decoration: none;">Already have an account? Login here.</a>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, createUserWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, doc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  document.getElementById('btn-reg').onclick = async () => {
    const email = document.getElementById('reg-email').value;
    const pass = document.getElementById('reg-password').value;
    const user = document.getElementById('reg-username').value;

    if(!user || !email || !pass) {
        document.getElementById('msg').innerText = "Please fill in all fields.";
        return;
    }

    try {
        const cred = await createUserWithEmailAndPassword(auth, email, pass);
        // This creates the UNIQUE locker for this specific user ID
        await setDoc(doc(db, "users", cred.user.uid), {
            username: user,
            pfp: "",
            customCode: "",
            blurb: "Welcome to my profile!",
            alerts: 0,
            faves: 0,
            subs: 0
        });
        window.location.href = "dashboard.html";
    } catch (e) { 
        document.getElementById('msg').innerText = e.message; 
    }
  };
</script>
</body>
</html>
