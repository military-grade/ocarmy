<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 2000; }
        .nav-left { display: flex; gap: 5px; align-items: center; height: 100%; }
        .nav-left a, .nav-item-btn { color: #ccc; text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; border: none; background: none; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border: 1px solid var(--border); border-top: none; min-height: calc(100vh - 50px); align-items: stretch; }
        .sidebar { width: 200px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-user-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }
        .main { flex: 1; padding: 30px; background: white; }
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 15px; margin-top: 20px; }
        .art-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; aspect-ratio: 1/1; background: #eee; background-size: cover; background-position: center; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white; font-size: 16px;">OCARMY</a>
        <a href="browse.html"><i class="fa fa-eye"></i> Browse</a>
        <a href="search.html"><i class="fa fa-search"></i> Search</a>
        <a href="#"><i class="fa fa-info-circle"></i> Info</a>
        <a href="#"><i class="fa fa-newspaper"></i> Blogs</a>
    </div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar" id="side-pfp"></div>
            <div style="font-weight: bold;" id="side-user-text">User</div>
        </div>
        <div class="side-nav" id="sidebar-links">
            <a href="dashboard.html" data-base="profile.html"><i class="fa fa-user"></i> Profile</a>
            <a href="bulletins.html" data-base="bulletins.html"><i class="fa fa-comment"></i> Bulletins</a>
            <a href="characters.html" data-base="characters.html"><i class="fa fa-users"></i> Characters</a>
            <div class="side-label">Portfolio</div>
            <a href="designs.html" data-base="designs.html"><i class="fa fa-paint-brush"></i> Designs</a>
            <a href="art.html" data-base="art.html" style="background:rgba(0,0,0,0.1);"><i class="fa fa-image"></i> Art</a>
            <div class="side-label">Interaction</div>
            <a href="profile_comments.html" data-base="profile_comments.html"><i class="fa fa-comments"></i> Comments</a>
            <a href="subscribe.html" data-base="subscribe.html" style="color:white; font-weight:bold; background:rgba(255,255,255,0.1);"><i class="fa fa-plus"></i> Subscribe</a>
        </div>
    </aside>

    <main class="main">
        <h2 style="border-bottom: 1px solid #eee; padding-bottom: 10px;"><i class="fa fa-image"></i> Art Gallery</h2>
        <div class="art-grid" id="art-display">
            <div style="grid-column: 1 / -1; color: #999;">Loading art...</div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    const urlParams = new URLSearchParams(window.location.search);
    let targetUserId = urlParams.get('user');

    onAuthStateChanged(auth, async (authUser) => {
        if (!targetUserId && authUser) targetUserId = authUser.uid;

        if (targetUserId) {
            // Update links to stay on this user
            document.querySelectorAll('#sidebar-links a').forEach(link => {
                const base = link.getAttribute('data-base');
                if(base !== "#") link.href = base === "profile.html" ? `${base}?user=${targetUserId}` : `${base}?user=${targetUserId}`;
            });

            // Load Sidebar
            onSnapshot(doc(db, "users", targetUserId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('side-user-text').innerText = data.username;
                    if (data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
                }
            });

            // Load Art
            const q = query(collection(db, "art"), where("artistId", "==", targetUserId));
            const snap = await getDocs(q);
            const grid = document.getElementById('art-display');
            grid.innerHTML = snap.empty ? '<div style="grid-column:1/-1;">No art found.</div>' : '';
            snap.forEach(doc => {
                const art = doc.data();
                grid.innerHTML += `<div class="art-card" style="background-image:url('${art.url}')"></div>`;
            });
        }
    });
</script>
</body>
</html>
