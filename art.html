<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; overflow-x: hidden; }

        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .nav-left { display: flex; gap: 10px; align-items: center; height: 100%; }
        .nav-left a, .nav-item { color: #ccc; text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; }
        .nav-left a:hover, .nav-item:hover { color: white; background: rgba(255,255,255,0.1); }
        
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border: 1px solid var(--border); border-top: none; min-height: calc(100vh - 50px); align-items: stretch; }
        .sidebar { width: 200px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-user-header { background: #427e95; padding: 10px 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar-box { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; flex-shrink: 0; }
        .side-user-name { font-weight: bold; font-size: 15px; color: white; }

        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-nav a:hover, .side-nav a.active { background: rgba(0,0,0,0.1); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .main { flex: 1; padding: 30px; background: white; }
        .page-header { font-size: 24px; color: var(--th-blue); margin-bottom: 15px; }

        /* Pagination Bar Fix */
        .pagination { display: flex; justify-content: center; gap: 5px; margin-bottom: 25px; }
        .page-btn { padding: 5px 12px; border: 1px solid #ddd; background: white; cursor: pointer; color: var(--th-blue); text-decoration: none; font-size: 13px; }
        .page-btn.active { background: var(--th-blue); color: white; border-color: var(--th-blue); }

        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(150px, 1fr)); gap: 10px; }
        .art-item { border: 1px solid #ddd; padding: 5px; border-radius: 4px; aspect-ratio: 1/1; overflow: hidden; background: #fafafa; }
        .art-item img { width: 100%; height: 100%; object-fit: cover; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white; font-size: 16px;">OCARMY</a>
        <a href="#"><i class="fa fa-eye"></i> Browse</a>
        <a href="#"><i class="fa fa-search"></i> Search</a>
        <a href="#"><i class="fa fa-info-circle"></i> Info</a>
        <a href="#"><i class="fa fa-newspaper"></i> Blogs</a>
        <a href="#"><i class="fa fa-bullhorn"></i> News</a>
    </div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar-box" id="side-pfp"></div>
            <div class="side-user-name" id="side-user-text">militarygrade</div>
        </div>
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-user"></i> Profile</a>
            <a href="bulletins.html"><i class="fa fa-comment"></i> Bulletins</a>
            <a href="characters.html"><i class="fa fa-users"></i> Characters</a>
            <a href="#"><i class="fa fa-link"></i> Links</a>
            <a href="#"><i class="fa fa-globe"></i> Worlds</a>
            <a href="#"><i class="fa fa-star"></i> Favorites</a>
            <div class="side-label">Portfolio</div>
            <a href="designs.html"><i class="fa fa-paint-brush"></i> Designs</a>
            <a href="art.html" class="active"><i class="fa fa-image"></i> Art</a>
            <a href="#"><i class="fa fa-book"></i> Library</a>
            <div class="side-label">Interaction</div>
            <a href="profile_comments.html"><i class="fa fa-comments"></i> Comments</a>
            <a href="messages.html"><i class="fa fa-envelope"></i> Inbox</a>
        </div>
    </aside>

    <main class="main">
        <div class="page-header"><i class="fa fa-image"></i> militarygrade's Art</div>
        
        <div class="pagination">
            <a href="#" class="page-btn">«</a>
            <a href="#" class="page-btn active">1</a>
            <a href="#" class="page-btn">2</a>
            <a href="#" class="page-btn">»</a>
        </div>

        <div class="art-grid" id="art-list">
            </div>
    </main>
</div>
</body>
</html>
