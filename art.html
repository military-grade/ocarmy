<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Art Gallery | OCARMY</title>
    <style>
        /* Art Grid Styling (Screenshot 12.52.08) */
        .art-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 10px; }
        .art-item { border: 1px solid #ddd; border-radius: 4px; padding: 5px; position: relative; }
        .art-item img { width: 100%; aspect-ratio: 1/1; object-fit: cover; }
        .pagination { display: flex; justify-content: center; gap: 5px; margin-top: 20px; }
        .page-btn { padding: 5px 10px; border: 1px solid #ddd; background: white; cursor: pointer; color: var(--th-blue); }
        .page-btn.active { background: var(--th-blue); color: white; border-color: var(--th-blue); }
    </style>
</head>
<body>
    <main class="main">
        <div class="page-header"><i class="fa fa-image"></i> <span id="user-header-art">User</span>'s Art</div>
        <div class="pagination">
            <div class="page-btn active">1</div>
            <div class="page-btn">2</div>
            <div class="page-btn">»</div>
        </div>
        <div class="art-grid" id="art-list"></div>
    </main>
</body>
</html>
