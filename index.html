<style>
    :root { --th-blue: #2c3e50; --th-border: #dcdcdc; --th-text: #333; }
    body { background: #f7f7f7; font-family: Arial, sans-serif; margin: 0; }

    /* Center the whole site */
    .container { 
        max-width: 1000px; 
        margin: 30px auto; 
        display: flex; 
        gap: 20px; 
        padding: 0 15px; 
    }

    /* Sidebar Styles */
    .sidebar { width: 240px; }
    .card { background: white; border: 1px solid var(--th-border); border-radius: 4px; margin-bottom: 20px; }
    .card-header { background: #fff; padding: 10px 15px; border-bottom: 1px solid #eee; font-weight: bold; color: #555; }
    .card-body { padding: 15px; }

    /* Main Wall Styles */
    .main-wall { flex-grow: 1; }
    
    /* Policy Links Block */
    .policy-box { 
        float: right; 
        width: 200px; 
        background: #fcfcfc; 
        border: 1px solid #eee; 
        padding: 15px; 
        margin-left: 20px;
        margin-bottom: 20px;
        font-size: 13px;
    }
    .policy-box h4 { margin: 0 0 10px 0; font-size: 12px; color: #999; letter-spacing: 1px; }
    .policy-link { display: block; color: #3498db; text-decoration: none; margin-bottom: 5px; }
    .policy-link:hover { text-decoration: underline; }

    /* Character Grid */
    .char-grid { 
        display: grid; 
        grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); 
        gap: 15px; 
        clear: left;
    }
</style>
