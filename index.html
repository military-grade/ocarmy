<!DOCTYPE html>
<html>
<head>
    <title>OC ARMY | Archive</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #2c3e50; --th-light-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-light-bg); }
        
        /* THE OG NAVBAR */
        .navbar { background-color: var(--th-blue); color: white; padding: 10px 20px; display: flex; align-items: center; justify-content: space-between; }
        .nav-item { margin-right: 20px; cursor: pointer; color: #ddd; text-decoration: none; font-size: 14px; position: relative; }
        .nav-item:hover { color: white; }

        /* THE DROPDOWN */
        .dropdown { display: none; position: absolute; top: 100%; left: 0; background: white; border: 1px solid var(--th-border); min-width: 180px; z-index: 1000; box-shadow: 0 4px 10px rgba(0,0,0,0.1); border-radius: 4px; }
        .nav-item:hover .dropdown { display: block; }
        .drop-item { display: block; padding: 12px; color: #333; text-decoration: none; border-bottom: 1px solid #eee; }
        .drop-item:hover { background: #f0f0f0; }

        /* CENTERED CONTAINER */
        .container { max-width: 1200px; margin: 30px auto; display: flex; gap: 20px; padding: 0 15px; }
        
        /* SIDEBAR CARD */
        .sidebar { width: 250px; background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 15px; height: fit-content; }
        
        /* MAIN CONTENT CARD */
        .main-wall { flex-grow: 1; background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 20px; min-height: 400px; position: relative; }
        .section-header { border-bottom: 1px solid var(--th-border); padding-bottom: 10px; margin-bottom: 15px; font-weight: bold; color: #555; text-transform: uppercase; }

        /* POLICY BOX (Tucked in the corner above recent chars) */
        .policy-box { float: right; width: 200px; background: #fcfcfc; border: 1px solid #eee; padding: 15px; margin-left: 20px; margin-bottom: 20px; font-size: 13px; }
        .policy-box h4 { margin: 0 0 10px 0; font-size: 11px; color: #999; letter-spacing: 1px; }
        .policy-link { display: block; color: #3498db; text-decoration: none; margin-bottom: 5px; }
        .policy-link:hover { text-decoration: underline; }
