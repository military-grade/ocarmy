<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.firebasestorage.app",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03",
    measurementId: "G-Y5KSK46H3L"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();

  // This part updates your Toyhouse-style navbar automatically!
  onAuthStateChanged(auth, (user) => {
    const navRight = document.querySelector('.nav-right');
    if (user) {
      navRight.innerHTML = `
        <span class="nav-item">Welcome, ${user.email.split('@')[0]}</span>
        <a href="#" id="logout-link" class="nav-item">Logout</a>
      `;
      document.getElementById('logout-link').onclick = () => signOut(auth);
    } else {
      navRight.innerHTML = `
        <a href="login.html" class="nav-item">Login</a>
        <a href="register.html" class="nav-item">Register</a>
      `;
    }
  });
</script>
</body>
</html>
