<!DOCTYPE html>
<html>
<head>
    <title>OCARMY | Welcome</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #222; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        .hero { 
            background: #333; 
            padding: 60px 20px; 
            text-align: center; 
            flex-grow: 1; 
            display: flex; 
            flex-direction: column; 
            justify-content: center;
            overflow: hidden; 
        }
        
        .mascot-wrapper {
            margin: 0 auto;
            /* I drastically increased this from 20px to 110px to account for the tail! */
            transform: translateX(110px); 
        }

        .mascot-logo { 
            max-width: 550px; 
            width: 100%;
            height: auto; 
            filter: drop-shadow(0 0 20px rgba(255,255,255,0.15));
            transition: transform 0.3s ease;
        }

        .mascot-logo:hover {
            transform: scale(1.03);
        }

        .sub-text { 
            color: #888; 
            margin-top: 20px; 
            font-size: 14px; 
            text-align: center;
        }

        .auth-bar { background: #1a1a1a; padding: 25px; text-align: center; border-bottom: 4px solid #2c3e50; }
        .auth-bar a { color: #eee; text-decoration: none; margin: 0 20px; font-size: 15px; transition: 0.3s; }
        .auth-bar a:hover { color: #3498db; text-shadow: 0 0 8px #3498db; }
        .auth-bar strong { color: #fff; }

        .policy-container { background: #222; padding: 50px 20px; text-align: center; }
        .policy-title { color: #666; font-size: 12px; letter-spacing: 2px; margin-bottom: 25px; font-weight: bold; }
        .policy-grid { display: flex; justify-content: center; gap: 30px; flex-wrap: wrap; max-width: 900px; margin: 0 auto; }
        .policy-link { color: #3498db; text-decoration: none; font-size: 14px; font-weight: bold; }
        .policy-link:hover { text-decoration: underline; }
    </style>
</head>
<body>

    <div class="hero">
        <div class="mascot-wrapper">
            <img src="Illustration226.png" alt="OCARMY Mascot" class="mascot-logo">
        </div>
        <p class="sub-text">OCARMY is in invite beta. Check back later!</p>
    </div>

    <div class="auth-bar">
        <a href="info.html"><strong>Why should you join us?</strong></a>
        <a href="login.html">Have an account? <strong>Login.</strong></a>
        <a href="register.html">Have an invite code? <strong>Register here.</strong></a>
    </div>

    <div class="policy-container">
        <div class="policy-title">OUR POLICIES</div>
        <div class="policy-grid">
            <a href="tos.html" class="policy-link">Terms of service</a>
            <a href="adopts.html" class="policy-link">Adoptables</a>
            <a href="commissions.html" class="policy-link">Commissions</a>
            <a href="rights.html" class="policy-link">Character rights</a>
            <a href="extra.html" class="policy-link">Extra Information</a>
            <a href="contact.html" class="policy-link">Contact</a>
        </div>
    </div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  initializeApp(firebaseConfig);
  const auth = getAuth();

  onAuthStateChanged(auth, (user) => {
    if (user) { window.location.href = "dashboard.html"; }
  });
</script>
</body>
</html>
