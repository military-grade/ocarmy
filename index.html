<!DOCTYPE html>
<html>
<head>
    <title>OCARMY | Welcome</title>
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: #222; color: white; display: flex; flex-direction: column; min-height: 100vh; }
        
        /* The Big Dark Banner */
        .hero { background: #333; padding: 100px 20px; text-align: center; flex-grow: 1; display: flex; flex-direction: column; justify-content: center; }
        
        .glow-text { 
            font-size: 4rem; 
            letter-spacing: 8px; 
            margin: 0; 
            text-transform: uppercase; 
            color: #fff;
            text-shadow: 0 0 10px rgba(255,255,255,0.8), 0 0 20px rgba(255,255,255,0.5);
        }
        .sub-text { color: #888; margin-top: 15px; font-size: 14px; }

        /* The Button Bar */
        .auth-bar { background: #1a1a1a; padding: 20px; text-align: center; border-bottom: 4px solid #2c3e50; }
        .auth-bar a { color: #eee; text-decoration: none; margin: 0 20px; font-size: 14px; transition: 0.3s; }
        .auth-bar a:hover { color: #3498db; text-shadow: 0 0 5px #3498db; }
        .auth-bar strong { color: #fff; }

        /* Policies Section */
        .policy-container { max-width: 900px; margin: 40px auto; text-align: center; padding: 20px; }
        .policy-title { color: #666; font-size: 12px; letter-spacing: 2px; margin-bottom: 20px; }
        .policy-grid { display: flex; justify-content: center; gap: 25px; flex-wrap: wrap; }
        .policy-link { color: #3498db; text-decoration: none; font-size: 14px; font-weight: 500; }
        .policy-link:hover { text-decoration: underline; }

        /* Recent Activity Glimpse */
        .recent-section { background: #f7f7f7; color: #333; padding: 40px 20px; text-align: center; }
        .grid { max-width: 1000px; margin: 20px auto; display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 15px; }
        .mini-card { background: white; border: 1px solid #ddd; padding: 5px; border-radius: 4px; }
        .mini-card img { width: 100%; height: 120px; object-fit: cover; }
    </style>
</head>
<body>

<div id="intro-content">
    <div class="hero">
        <h1 class="glow-text">OCARMY</h1>
        <p class="sub-text">... is in private beta. Welcome to the archive.</p>
    </div>

    <div class="auth-bar">
        <a href="#">Check out our site!</a>
        <a href="login.html">Have an account? <strong>Login</strong></a>
        <a href="register.html">Read our terms of service!</a>
    </div>

    <div class="policy-container">
        <div class="policy-title">OUR POLICIES</div>
        <div class="policy-grid">
            <a href="tos.html" class="policy-link">Terms of service</a>
            <a href="adopts.html" class="policy-link">Adoptables</a>
            <a href="commissions.html" class="policy-link">Commissions</a>
            <a href="rights.html" class="policy-link">Character rights</a>
            <a href="extra.html" class="policy-link">Extra Information</a>
            <a href="contact.html" class="policy-link">Contact</a>
        </div>
    </div>

    <div class="recent-section">
        <div style="font-weight: bold; color: #666; margin-bottom: 20px;">RECENTLY UPLOADED CHARACTERS</div>
        <div class="grid" id="recent-grid">
            </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
  import { getFirestore, collection, query, orderBy, limit, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  // REDIRECT IF LOGGED IN
  onAuthStateChanged(auth, (user) => {
    if (user) {
      window.location.href = "dashboard.html";
    }
  });

  // LOAD RECENT CHARS
  onSnapshot(query(collection(db, "characters"), orderBy("timestamp", "desc"), limit(6)), (snap) => {
    const grid = document.getElementById('recent-grid');
    grid.innerHTML = '';
    snap.forEach(doc => {
      const data = doc.data();
      grid.innerHTML += `<div class="mini-card"><img src="${data.image}"><div style="font-size:10px; margin-top:5px; font-weight:bold;">${data.name}</div></div>`;
    });
  });
</script>
</body>
</html>
