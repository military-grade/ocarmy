<!DOCTYPE html>
<html>
<head>
    <title>Login | OCARMY</title>
    <style>
        body { font-family: sans-serif; background: #2c3e50; display: flex; justify-content: center; align-items: center; height: 100vh; margin: 0; }
        .login-box { background: white; padding: 40px; border-radius: 4px; width: 350px; box-shadow: 0 10px 25px rgba(0,0,0,0.2); }
        h2 { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 10px; color: #2c3e50; }
        input { width: 100%; margin: 10px 0; padding: 12px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        button { width: 100%; padding: 12px; background: #3498db; color: white; border: none; border-radius: 4px; cursor: pointer; font-weight: bold; margin-top: 10px; }
        .footer-links { text-align: center; margin-top: 20px; font-size: 13px; color: #777; }
        .footer-links a { color: #3498db; text-decoration: none; }
    </style>
</head>
<body>
<div class="login-box">
    <h2>Login</h2>
    <input type="email" id="email" placeholder="Email Address">
    <input type="password" id="password" placeholder="Password">
    <button id="login-btn">Login</button>
    <div class="footer-links">
        <a href="register.html">Register New Account</a>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getAuth, signInWithEmailAndPassword } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();

  document.getElementById('login-btn').onclick = () => {
    signInWithEmailAndPassword(auth, document.getElementById('email').value, document.getElementById('password').value)
      .then(() => { window.location.href = "index.html"; })
      .catch((err) => { alert("Login failed: " + err.message); });
  };
</script>
</body>
</html>
