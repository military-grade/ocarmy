<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCARMY | Login</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #3498db; --th-dark: #222; --th-input: #1a1a1a; --border: #444; }
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #222; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .login-card { background: #333; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid var(--border); text-align: center; }
        .mascot-logo { max-width: 220px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        h2 { margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; font-size: 1.5rem; }
        p { color: #888; font-size: 13px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; position: relative; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #666; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; padding-right: 40px; background: var(--th-input); border: 1px solid var(--border); border-radius: 4px; color: white; box-sizing: border-box; outline: none; transition: 0.3s; }
        input:focus { border-color: var(--th-blue); box-shadow: 0 0 8px rgba(52, 152, 219, 0.3); }
        .toggle-password { position: absolute; right: 12px; bottom: 12px; color: #666; cursor: pointer; }
        .btn-login { width: 100%; padding: 15px; background: var(--th-blue); border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
        .btn-login:disabled { background: #555 !important; cursor: not-allowed; }
        .footer-links { margin-top: 30px; font-size: 13px; border-top: 1px solid var(--border); padding-top: 20px; }
        .footer-links a { color: #666; text-decoration: none; }
    </style>
</head>
<body>

    <div class="login-card">
        <img src="Illustration226.jpg" alt="OCARMY Mascot" class="mascot-logo">
        <h2>Login</h2>
        <p>Access your characters and archive.</p>

        <form id="login-form">
            <div class="form-group">
                <label>Username or Email</label>
                <input type="text" id="identifier" placeholder="Enter username or email" required>
            </div>

            <div class="form-group">
                <label>Password</label>
                <input type="password" id="password" placeholder="••••••••" required>
                <i class="fa fa-eye toggle-password" id="eye-icon" onclick="togglePass()"></i>
            </div>

            <button type="submit" class="btn-login" id="login-btn">Sign In</button>
            <a style="display:block; margin-top:15px; color:#3498db; font-size:12px; cursor:pointer;" onclick="forgotPassword()">Forgot Password?</a>
        </form>

        <div class="footer-links">
            <a href="register.html">Need an account? <strong style="color: #3498db;">Register here.</strong></a>
        </div>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, signInWithEmailAndPassword, sendPasswordResetEmail, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    // UPDATED CONFIG FROM IMG_7567
    const firebaseConfig = {
        apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
        authDomain: "ocarmy-db.firebaseapp.com",
        projectId: "ocarmy-db",
        storageBucket: "ocarmy-db.firebasestorage.app",
        messagingSenderId: "848883355194",
        appId: "1:848883355194:web:361e9fe8eb9e01f350af03",
        measurementId: "G-9G2WV3NXV1"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth(app);
    const db = getFirestore(app);

    // Force redirect if already logged in
    onAuthStateChanged(auth, (user) => {
        if (user) window.location.href = "dashboard.html";
    });

    window.togglePass = () => {
        const passInput = document.getElementById('password');
        const eye = document.getElementById('eye-icon');
        if (passInput.type === "password") {
            passInput.type = "text";
            eye.classList.replace('fa-eye', 'fa-eye-slash');
        } else {
            passInput.type = "password";
            eye.classList.replace('fa-eye-slash', 'fa-eye');
        }
    };

    window.forgotPassword = async () => {
        const email = prompt("Enter your account email:");
        if (email) {
            try {
                await sendPasswordResetEmail(auth, email);
                alert("Reset email sent!");
            } catch (e) { alert(e.message); }
        }
    };

    document.getElementById('login-form').onsubmit = async (e) => {
        e.preventDefault();
        const btn = document.getElementById('login-btn');
        const identifier = document.getElementById('identifier').value.trim();
        const password = document.getElementById('password').value;
        
        btn.innerText = "Signing in...";
        btn.disabled = true;

        try {
            let email = identifier;

            // Username Lookup
            if (!identifier.includes('@')) {
                const q = query(collection(db, "users"), where("username", "==", identifier));
                const snap = await getDocs(q);
                if (!snap.empty) {
                    email = snap.docs[0].data().email;
                } else {
                    throw new Error("User not found.");
                }
            }

            await signInWithEmailAndPassword(auth, email, password);
            window.location.href = "dashboard.html";

        } catch (error) {
            console.error(error);
            alert("Incorrect username or password.");
            btn.innerText = "Sign In";
            btn.disabled = false;
        }
    };
</script>
</body>
</html>
