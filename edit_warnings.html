<!DOCTYPE html>
<html lang="en">
<head>
    <title>Edit Warnings | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; background: var(--th-bg); font-family: sans-serif; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .main { flex: 1; padding: 25px; }
        .warning-toggle { border: 1px solid #4e92ac; background: #56a0ba; color: white; padding: 5px 15px; border-radius: 4px; cursor: pointer; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar" id="sidebar-inject">
        <div style="padding: 20px; color: white;">Loading Sidebar...</div>
    </aside>

    <main class="main">
        <h4 class="border-bottom pb-2 mb-4">Mature Content Warning</h4>
        <div class="d-flex gap-4 mb-4">
            <button id="toggle-warning" class="warning-toggle" onclick="toggleWarning()">Warning On</button>
            <div class="small text-muted">This adds a warning page prior to viewing this character.</div>
        </div>
        <textarea id="warning-bio"></textarea>
        <button class="btn btn-primary w-100 mt-4" onclick="saveWarnings()">Update Warnings</button>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const charId = new URLSearchParams(window.location.search).get('id');
    let warningActive = true;

    tinymce.init({ selector: '#warning-bio', height: 300, plugins: 'code link lists', toolbar: 'bold italic | bullist numlist | code' });

    async function load() {
        const snap = await getDoc(doc(db, "characters", charId));
        const data = snap.data();
        warningActive = data.warningActive ?? true;
        
        // Manual Sidebar Restore (Simple version)
        document.getElementById('sidebar-inject').innerHTML = `
            <div style="background:#427e95; padding:10px 15px; font-weight:bold;">Character</div>
            <div style="padding:15px; background:rgba(0,0,0,0.05); border-bottom:1px solid rgba(255,255,255,0.1);">
                <a href="user.html?id=${data.ownerId}" style="color:white; text-decoration:none; font-weight:bold;">Owner Profile</a>
            </div>
            <div style="padding:10px 15px;"><a href="character.html?id=${charId}" style="color:white; text-decoration:none;">Back to Character</a></div>
        `;

        updateToggleUI();
        setTimeout(() => tinymce.get('warning-bio').setContent(data.warningContent || ""), 1000);
    }

    window.toggleWarning = () => { warningActive = !warningActive; updateToggleUI(); };
    function updateToggleUI() {
        const btn = document.getElementById('toggle-warning');
        btn.innerText = warningActive ? "Warning On" : "Warning Off";
        btn.style.background = warningActive ? "#56a0ba" : "#eee";
        btn.style.color = warningActive ? "white" : "#333";
    }

    window.saveWarnings = async () => {
        await updateDoc(doc(db, "characters", charId), {
            warningActive: warningActive,
            warningContent: tinymce.get('warning-bio').getContent()
        });
        alert("Warnings Saved!");
    };
    load();
</script>
</body>
</html>
