<!DOCTYPE html>
<html>
<head>
    <title>Settings | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-dark: #212529; --th-blue: #008eb0; --th-border: #dcdcdc; --th-bg: #f7f7f7; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--th-bg); display: flex; }

        /* Settings Sidebar */
        .settings-sidebar { width: 220px; background: #444; min-height: 100vh; color: #ccc; }
        .side-header { padding: 15px; background: rgba(0,0,0,0.2); color: white; font-weight: bold; display: flex; align-items: center; gap: 10px; }
        .side-nav { padding: 10px 0; }
        .side-link { display: block; padding: 10px 20px; color: #bbb; text-decoration: none; font-size: 13px; }
        .side-link:hover, .side-link.active { background: var(--th-blue); color: white; }

        /* Content Area */
        .main { flex-grow: 1; padding: 30px; }
        .card { background: white; border: 1px solid var(--th-border); border-radius: 4px; max-width: 900px; }
        .card-header { padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; background: #fdfdfd; }
        .card-body { padding: 20px; }

        label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #555; }
        input, textarea, select { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; box-sizing: border-box; }
        textarea { height: 150px; font-family: monospace; }
        
        .btn-update { background: var(--th-blue); color: white; border: none; padding: 10px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; }
    </style>
</head>
<body>

<div class="settings-sidebar">
    <div class="side-header"><div id="mini-avatar" style="width:30px; height:30px; background:#eee;"></div> Settings</div>
    <div class="side-nav">
        <a href="#" class="side-link active">Account</a>
        <a href="#" class="side-link">General Settings</a>
        <a href="#" class="side-link">Interaction & Alerts</a>
        <div style="padding: 10px 20px; font-size: 11px; color: #777;">PROFILE CONTENT</div>
        <a href="#" class="side-link">Profile CSS & Blurbs</a>
        <a href="#" class="side-link">Folders</a>
    </div>
</div>

<div class="main">
    <div class="card">
        <div class="card-header">Profile Content</div>
        <div class="card-body">
            <label>Profile Picture URL</label>
            <input type="text" id="pfp-url" placeholder="https://link-to-your-pfp.png">

            <label>CSS/HTML CODE</label>
            <textarea id="custom-css" placeholder="<style> body { background: #000; } </style>"></textarea>

            <label>Home Page Folders</label>
            <select>
                <option>Show All</option>
                <option>Featured Only</option>
            </select>

            <button class="btn-update" id="save-settings">Update Settings</button>
            <p id="save-msg" style="font-size:12px; color:green;"></p>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, setDoc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  // Using your existing config
  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) window.location.href = "index.html";
    
    // Load existing settings
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      if(data.pfp) document.getElementById('pfp-url').value = data.pfp;
      if(data.customCode) document.getElementById('custom-css').value = data.customCode;
    }
  });

  document.getElementById('save-settings').onclick = async () => {
    const user = auth.currentUser;
    await setDoc(doc(db, "users", user.uid), {
      pfp: document.getElementById('pfp-url').value,
      customCode: document.getElementById('custom-css').value
    }, { merge: true });
    document.getElementById('save-msg').innerText = "Settings saved successfully!";
  };
</script>
</body>
</html>
