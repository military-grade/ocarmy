<!DOCTYPE html>
<html>
<head>
    <title>Settings | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-teal: #5bc0de; --th-dark: #212529; --th-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--th-bg); color: #333; display: flex; }

        /* Left Settings Sidebar */
        .sidebar { width: 220px; background: white; min-height: 100vh; border-right: 1px solid var(--th-border); position: sticky; top: 0; }
        .side-header { padding: 15px; background: rgba(0,0,0,0.03); display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .avatar-preview { width: 35px; height: 35px; background: #eee; border-radius: 2px; background-size: cover; border: 1px solid #ddd; }
        
        .nav-group { padding: 10px 20px 5px; font-size: 11px; font-weight: bold; color: var(--th-blue); text-transform: uppercase; margin-top: 10px; }
        .nav-link { display: block; padding: 10px 20px; color: #555; text-decoration: none; font-size: 13px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: var(--th-teal); color: white; }
        .nav-link i { width: 20px; margin-right: 5px; opacity: 0.8; }

        /* Main Content */
        .main { flex-grow: 1; padding: 30px; max-width: 1000px; }
        .section-title { font-size: 1.5rem; margin-bottom: 25px; color: #444; border-bottom: 1px solid #eee; padding-bottom: 10px; }
        
        /* Account Management Card */
        .card { background: white; border: 1px solid var(--th-border); border-radius: 4px; margin-bottom: 25px; padding: 25px; }
        .card-header { padding: 15px; border-bottom: 1px solid #eee; font-weight: bold; background: #fdfdfd; margin: -25px -25px 20px -25px; color: #666; font-size: 13px; }

        .form-label { display: block; font-weight: bold; margin-bottom: 5px; font-size: 13px; color: #666; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; box-sizing: border-box; }
        textarea { height: 150px; font-family: monospace; font-size: 13px; }
        
        /* Avatar Upload Box */
        .avatar-box { border: 2px dashed #ddd; border-radius: 4px; padding: 20px; text-align: center; max-width: 200px; margin: 0 auto; }
        .big-avatar { width: 150px; height: 150px; background: #eee; margin: 0 auto 15px; border-radius: 4px; background-size: cover; border: 1px solid #ddd; }

        .btn-teal { background: var(--th-teal); color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        .btn-teal:hover { background: #46b8da; }
        
        /* Tabs Logic */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-header"><div class="avatar-preview" id="side-pfp"></div> <span id="side-user">User</span></div>
    
    <div class="side-nav">
        <div class="nav-group">Account</div>
        <div class="nav-link active" onclick="showTab('account')"><i class="fa fa-user-cog"></i> General Settings</div>
        <div class="nav-link"><i class="fa fa-bell"></i> Interactions</div>
        
        <div class="nav-group">PROFILE CONTENT</div>
        <div class="nav-link" onclick="showTab('profile')"><i class="fa fa-id-card"></i> Profile Blurb & CSS</div>
        
        <a href="dashboard.html" class="nav-link" style="margin-top: 30px; color: var(--th-blue);"><i class="fa fa-arrow-left"></i> Back to Archive</a>
    </div>
</div>

<div class="main">
    <h2 class="section-title" id="page-title">Account Management</h2>

    <div id="account" class="tab-content active">
        <div style="display: flex; gap: 30px; flex-wrap: wrap;">
            <div style="flex: 2; min-width: 300px;">
                <div class="card">
                    <div class="card-header">Account Details</div>
                    <label>Username</label>
                    <input type="text" id="set-username" readonly style="background:#eee;">
                    <label>Email Address</label>
                    <input type="text" id="set-email" readonly style="background:#eee;">
                </div>
            </div>
            <div style="flex: 1; min-width: 250px;">
                <div class="card" style="text-align: center;">
                    <div class="card-header">Avatar Management</div>
                    <div class="big-avatar" id="main-pfp-view"></div>
                    <label>Image URL</label>
                    <input type="text" id="pfp-input" placeholder="Paste link (e.g. imgur.com/xyz.png)">
                    <button class="btn-teal" onclick="saveSettings()">Upload Avatar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profile" class="tab-content">
        <div class="card">
            <div class="card-header">Edit Profile Content</div>
            <label>Profile Blurb (WYSIWYG/HTML)</label>
            <textarea id="profile-blurb" placeholder="Welcome to my profile!"></textarea>
            
            <label style="margin-top:20px;">CSS sheets (Profile Skin)</label>
            <textarea id="custom-css" placeholder="<style> body { background: #333; } </style>"></textarea>
            
            <button class="btn-teal" onclick="saveSettings()">Update Profile</button>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) { window.location.href = "index.html"; } 
    else {
      // INDEPENDENT VALUE LOAD: doc(db, "users", user.uid)
      const userRef = doc(db, "users", user.uid);
      const userDoc = await getDoc(userRef);
      if (userDoc.exists()) {
        const data = userDoc.data();
        document.getElementById('set-username').value = data.username;
        document.getElementById('set-email').value = user.email;
        document.getElementById('side-user').innerText = data.username;
        
        if (data.pfp) {
            document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
            document.getElementById('main-pfp-view').style.backgroundImage = `url('${data.pfp}')`;
            document.getElementById('pfp-input').value = data.pfp;
        }
        if (data.customCode) document.getElementById('custom-css').value = data.customCode;
        if (data.blurb) document.getElementById('profile-blurb').value = data.blurb;
      }
    }
  });

  // INDEPENDENT VALUE SAVE
  window.saveSettings = async () => {
    const user = auth.currentUser;
    if (user) {
        await setDoc(doc(db, "users", user.uid), {
            pfp: document.getElementById('pfp-input').value,
            customCode: document.getElementById('custom-css').value,
            blurb: document.getElementById('profile-blurb').value
        }, { merge: true });
        alert("Settings saved!");
        location.reload(); // Reloads to apply changes
    }
  };

  // Simple Tab Switching Logic
  window.showTab = (tabId) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
    
    // Update the main header text
    const titles = { 'account': 'Account Management', 'profile': 'Edit Profile Content' };
    document.getElementById('page-title').innerText = titles[tabId];
  };
</script>
</body>
</html>
