<!DOCTYPE html>
<html>
<head>
    <title>Settings | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-teal: #5bc0de; --th-dark: #212529; --th-purple-bg: #1a1523; --th-border: #332c3d; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--th-purple-bg); color: #eee; display: flex; }

        /* SIDEBAR (Screenshot Style) */
        .sidebar { width: 220px; background: #3b2a51; min-height: 100vh; border-right: 1px solid var(--th-border); }
        .side-header { padding: 15px; background: rgba(0,0,0,0.2); display: flex; align-items: center; gap: 10px; font-weight: bold; }
        .avatar-preview { width: 35px; height: 35px; background: #eee; border-radius: 2px; background-size: cover; }
        
        .nav-group { background: rgba(0,0,0,0.1); padding: 10px 15px; font-size: 12px; font-weight: bold; color: var(--th-teal); text-transform: uppercase; margin-top: 10px; }
        .nav-link { display: block; padding: 10px 20px; color: #bbb; text-decoration: none; font-size: 13px; cursor: pointer; }
        .nav-link:hover, .nav-link.active { background: var(--th-teal); color: white; }
        .nav-link i { width: 20px; margin-right: 5px; }

        /* MAIN CONTENT */
        .main { flex-grow: 1; padding: 30px; max-width: 1000px; }
        .section-title { font-size: 1.5rem; margin-bottom: 20px; color: white; }
        
        .card { background: #251e2e; border: 1px solid var(--th-border); border-radius: 4px; margin-bottom: 20px; padding: 20px; }
        .card-title { font-size: 14px; font-weight: bold; margin-bottom: 15px; border-bottom: 1px solid var(--th-border); padding-bottom: 10px; color: #ccc; }

        .form-row { display: flex; gap: 20px; margin-bottom: 15px; align-items: center; }
        .form-label { width: 100px; font-size: 13px; color: #aaa; }
        input, select, textarea { background: #332c3d; border: 1px solid #443c50; color: white; padding: 8px; border-radius: 4px; flex-grow: 1; }
        
        /* Avatar Upload Box */
        .avatar-upload-card { text-align: center; border-left: 1px solid var(--th-border); padding-left: 40px; }
        .big-avatar { width: 150px; height: 150px; background: #eee; margin: 0 auto 15px; border-radius: 4px; background-size: cover; }

        .btn-teal { background: var(--th-teal); color: white; border: none; padding: 12px 25px; border-radius: 4px; cursor: pointer; font-weight: bold; width: 100%; }
        
        /* Tabs Logic */
        .tab-content { display: none; }
        .tab-content.active { display: block; }
    </style>
</head>
<body>

<div class="sidebar">
    <div class="side-header"><div class="avatar-preview" id="side-pfp"></div> <span id="side-user">User</span></div>
    
    <div class="nav-group"><i class="fa fa-cog"></i> Account</div>
    <div class="nav-link active" onclick="showTab('account')"><i class="fa fa-user"></i> General Settings</div>
    <div class="nav-link" onclick="showTab('profile')"><i class="fa fa-id-card"></i> Profile Content</div>
    <div class="nav-link"><i class="fa fa-bell"></i> Interactions & Alerts</div>
    
    <div class="nav-group"><i class="fa fa-users"></i> Characters</div>
    <div class="nav-link"><i class="fa fa-th"></i> Mass Manager</div>
    <a href="dashboard.html" class="nav-link" style="margin-top: 20px; color: var(--th-teal);"><i class="fa fa-arrow-left"></i> Back to Site</a>
</div>

<div class="main">
    <h2 class="section-title" id="page-title">Account Management</h2>

    <div id="account" class="tab-content active">
        <div style="display: flex; gap: 20px;">
            <div style="flex: 2;">
                <div class="card">
                    <div class="card-title">Account Details</div>
                    <div class="form-row"><div class="form-label">Username</div><input type="text" id="set-username"></div>
                    <div class="form-row"><div class="form-label">Email</div><input type="text" id="set-email" disabled></div>
                </div>
            </div>
            <div style="flex: 1;">
                <div class="card avatar-upload-card">
                    <div class="card-title">Avatar</div>
                    <div class="big-avatar" id="main-pfp-view"></div>
                    <input type="text" id="pfp-input" placeholder="Paste Image URL..." style="margin-bottom: 10px;">
                    <button class="btn-teal" onclick="saveSettings()">Update Avatar</button>
                </div>
            </div>
        </div>
    </div>

    <div id="profile" class="tab-content">
        <div class="card">
            <div class="card-title">Edit Profile Blurb</div>
            <textarea id="profile-blurb" placeholder="Write your profile bio here..."></textarea>
            
            <div class="card-title" style="margin-top:20px;">CSS / HTML Style</div>
            <textarea id="custom-css" placeholder="<style> body { ... } </style>"></textarea>
            
            <button class="btn-teal" onclick="saveSettings()">Update Profile</button>
        </div>
    </div>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, doc, getDoc, setDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.appspot.com",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:51254de3c4992d7750af03"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  onAuthStateChanged(auth, async (user) => {
    if (!user) window.location.href = "index.html";
    const userDoc = await getDoc(doc(db, "users", user.uid));
    if (userDoc.exists()) {
      const data = userDoc.data();
      document.getElementById('set-username').value = data.username;
      document.getElementById('set-email').value = user.email;
      document.getElementById('side-user').innerText = data.username;
      if (data.pfp) {
        document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
        document.getElementById('main-pfp-view').style.backgroundImage = `url('${data.pfp}')`;
        document.getElementById('pfp-input').value = data.pfp;
      }
      if (data.customCode) document.getElementById('custom-css').value = data.customCode;
      if (data.blurb) document.getElementById('profile-blurb').value = data.blurb;
    }
  });

  window.saveSettings = async () => {
    const user = auth.currentUser;
    await setDoc(doc(db, "users", user.uid), {
      username: document.getElementById('set-username').value,
      pfp: document.getElementById('pfp-input').value,
      customCode: document.getElementById('custom-css').value,
      blurb: document.getElementById('profile-blurb').value
    }, { merge: true });
    alert("Settings Saved!");
    location.reload();
  };

  window.showTab = (tabId) => {
    document.querySelectorAll('.tab-content').forEach(t => t.classList.remove('active'));
    document.querySelectorAll('.nav-link').forEach(l => l.classList.remove('active'));
    document.getElementById(tabId).classList.add('active');
    event.currentTarget.classList.add('active');
    document.getElementById('page-title').innerText = tabId === 'account' ? 'Account Management' : 'Edit Profile Content';
  };
</script>
</body>
</html>
