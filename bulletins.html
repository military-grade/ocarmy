<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, deleteDoc, orderBy } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        
        // Show only bulletins belonging to the logged-in user
        const q = query(collection(db, "bulletins"), where("ownerId", "==", user.uid), orderBy("createdAt", "desc"));
        const snap = await getDocs(q);
        const list = document.getElementById('bulletin-list');
        list.innerHTML = "";

        snap.forEach(d => {
            const b = d.data();
            list.innerHTML += `
                <div class="bulletin-card" id="bulletin-${d.id}">
                    <div class="bulletin-header">
                        <div class="bulletin-pfp" style="background-image:url('${b.userPfp || 'https://via.placeholder.com/80'}')"></div>
                        <div>
                            <div style="font-weight:bold; color:#4e92ac; font-size:20px;"><i class="fa fa-times-circle"></i> ${b.subject}</div>
                            <div style="font-size:12px; color:#666; margin:5px 0;">Posted by <strong>${b.ownerName || 'User'}</strong></div>
                            <div style="display:flex; gap:5px;">
                                <button class="btn-action" onclick="window.location.href='edit_bulletin.html?id=${d.id}'"><i class="fa fa-pencil"></i> Edit</button>
                                <button class="btn-action" style="background:#d9534f; color:white; border:none;" onclick="deleteBulletin('${d.id}')"><i class="fa fa-trash"></i> Delete</button>
                            </div>
                        </div>
                    </div>
                    <div style="padding:20px;">${b.content}</div>
                </div>`;
        });
    });

    // THE DELETE FUNCTION
    window.deleteBulletin = async (id) => {
        if (confirm("Are you sure you want to delete this bulletin?")) {
            try {
                await deleteDoc(doc(db, "bulletins", id));
                document.getElementById(`bulletin-${id}`).remove();
                alert("Bulletin deleted.");
            } catch (error) {
                alert("Error deleting: " + error.message);
            }
        }
    };
</script>
