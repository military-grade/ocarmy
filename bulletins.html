<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulletins | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 2000; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border: 1px solid var(--border); border-top: none; min-height: calc(100vh - 50px); }
        .sidebar { width: 200px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-user-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        
        .main { flex: 1; padding: 30px; background: white; }
        .bulletin-post { display: flex; gap: 15px; border: 1px solid var(--border); margin-bottom: 20px; background: #fff; }
        .b-avatar-img { width: 150px; aspect-ratio: 1/1; background: #eee; background-size: cover; border-right: 1px solid var(--border); }
        .b-content { flex: 1; padding: 15px; }
        .b-title { font-size: 18px; color: #0088cc; font-weight: bold; text-decoration: none; }
        .btn-action { padding: 2px 8px; font-size: 11px; border-radius: 3px; border: 1px solid #ccc; background: #fff; cursor: pointer; }
    </style>
</head>
<body>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar" id="side-pfp"></div>
            <div style="font-weight: bold;" id="side-user-text">User</div>
        </div>
        <div class="side-nav" id="sidebar-links">
            <a href="dashboard.html" data-base="profile.html"><i class="fa fa-user"></i> Profile</a>
            <a href="bulletins.html" data-base="bulletins.html" style="background:rgba(0,0,0,0.1);"><i class="fa fa-comment"></i> Bulletins</a>
            <a href="characters.html" data-base="characters.html"><i class="fa fa-users"></i> Characters</a>
            <a href="art.html" data-base="art.html"><i class="fa fa-image"></i> Art</a>
        </div>
    </aside>

    <main class="main">
        <h2 id="page-title" style="border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px;">Bulletins</h2>
        <div id="bulletin-list">Loading bulletins...</div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, collection, query, where, getDocs, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    const urlParams = new URLSearchParams(window.location.search);
    let targetUserId = urlParams.get('user');

    onAuthStateChanged(auth, async (authUser) => {
        if (!targetUserId && authUser) targetUserId = authUser.uid;

        if (targetUserId) {
            // Force sidebar links to stay on this user
            document.querySelectorAll('#sidebar-links a').forEach(link => {
                const base = link.getAttribute('data-base');
                link.href = `${base}?user=${targetUserId}`;
            });

            // Load Target User Info
            onSnapshot(doc(db, "users", targetUserId), (snap) => {
                if (snap.exists()) {
                    const data = snap.data();
                    document.getElementById('side-user-text').innerText = data.username;
                    document.getElementById('page-title').innerText = `${data.username}'s Bulletins`;
                    if (data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
                }
            });

            // Load Bulletins
            const q = query(collection(db, "bulletins"), where("ownerId", "==", targetUserId));
            const snap = await getDocs(q);
            const list = document.getElementById('bulletin-list');
            list.innerHTML = snap.empty ? "No bulletins found." : "";

            snap.forEach(d => {
                const b = d.data();
                const isOwner = authUser && authUser.uid === b.ownerId;
                list.innerHTML += `
                    <div class="bulletin-post" id="b-${d.id}">
                        <div class="b-avatar-img" style="background-image:url('${b.userPfp || ''}')"></div>
                        <div class="b-content">
                            <div class="d-flex justify-content-between">
                                <a href="#" class="b-title">${b.subject}</a>
                                ${isOwner ? `<div>
                                    <button class="btn-action" onclick="window.location.href='edit_bulletin.html?id=${d.id}'"><i class="fa fa-pencil"></i> Edit</button>
                                    <button class="btn-action text-danger" onclick="deleteB('${d.id}')"><i class="fa fa-trash"></i> Delete</button>
                                </div>` : ''}
                            </div>
                            <div style="font-size:11px; color:#666; margin-bottom:10px;">Posted by <strong>${b.ownerName}</strong></div>
                            <div style="font-size:14px; border:1px solid #eee; padding:15px; border-radius:4px;">${b.content}</div>
                        </div>
                    </div>`;
            });
        }
    });

    window.deleteB = async (id) => {
        if(confirm("Delete this bulletin?")) {
            await deleteDoc(doc(db, "bulletins", id));
            document.getElementById(`b-${id}`).remove();
        }
    };
</script>
</body>
</html>
