<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Bulletins | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: sans-serif; background: var(--th-bg); }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border: 1px solid var(--border); min-height: 100vh; align-items: stretch; }
        
        .sidebar { width: 200px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .main { flex: 1; padding: 30px; }
        .bulletin-card { border: 1px solid #ddd; border-radius: 4px; margin-bottom: 20px; overflow: hidden; }
        .bulletin-header { background: #f9f9f9; padding: 15px; border-bottom: 1px solid #ddd; display: flex; gap: 15px; }
        .bulletin-pfp { width: 80px; height: 80px; border-radius: 4px; background-size: cover; border: 1px solid #eee; }
        .btn-action { padding: 4px 10px; font-size: 12px; border: 1px solid #ccc; background: #fff; cursor: pointer; border-radius: 3px; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <div class="side-header"><div id="side-pfp" style="width:40px; height:40px; background:#eee; border-radius:2px; background-size:cover;"></div><b id="side-username">militarygrade</b></div>
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-user"></i> Profile</a>
            <a href="bulletins.html" style="background:rgba(0,0,0,0.2);"><i class="fa fa-comment"></i> Bulletins</a>
            <a href="characters.html"><i class="fa fa-users"></i> Characters</a>
            <a href="#"><i class="fa fa-link"></i> Links</a>
            <a href="#"><i class="fa fa-globe"></i> Worlds</a>
            <a href="#"><i class="fa fa-star"></i> Favorites</a>
            <div class="side-label">Portfolio</div>
            <a href="designs.html"><i class="fa fa-paint-brush"></i> Designs</a>
            <a href="art.html"><i class="fa fa-image"></i> Art</a>
            <a href="#"><i class="fa fa-book"></i> Library</a>
            <div class="side-label">Interaction</div>
            <a href="profile_comments.html"><i class="fa fa-comments"></i> Comments</a>
            <a href="#"><i class="fa fa-envelope"></i> Inbox</a>
        </div>
    </aside>
    <main class="main">
        <h2 style="font-size:18px; color:var(--th-blue); border-bottom:1px solid #eee; padding-bottom:10px;">militarygrade's Bulletins</h2>
        <div id="bulletin-list"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        const q = query(collection(db, "bulletins"), where("ownerId", "==", user.uid));
        const snap = await getDocs(q);
        const list = document.getElementById('bulletin-list');
        
        snap.forEach(d => {
            const b = d.data();
            const isOwner = user.uid === b.ownerId;
            list.innerHTML += `
                <div class="bulletin-card" id="bulletin-${d.id}">
                    <div class="bulletin-header">
                        <div class="bulletin-pfp" style="background-image:url('${b.userPfp}')"></div>
                        <div>
                            <div style="font-weight:bold; color:var(--th-blue); font-size:20px;"><i class="fa fa-times-circle"></i> ${b.subject}</div>
                            <div style="font-size:12px; color:#666; margin:5px 0;">Posted by <strong>${b.ownerName}</strong></div>
                            ${isOwner ? `
                                <button class="btn-action" onclick="window.location.href='edit_bulletin.html?id=${d.id}'"><i class="fa fa-pencil"></i> Edit</button>
                                <button class="btn-action" style="background:#d9534f; color:white; border:none;" onclick="deleteB('${d.id}')"><i class="fa fa-trash"></i> Delete</button>
                            ` : ''}
                        </div>
                    </div>
                    <div style="padding:20px;">${b.content}</div>
                </div>`;
        });
    });

    window.deleteB = async (id) => {
        if(confirm("Delete this bulletin?")) {
            await deleteDoc(doc(db, "bulletins", id));
            document.getElementById(`bulletin-${id}`).remove();
        }
    };
</script>
</body>
</html>
