<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Comments | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: sans-serif; background: var(--th-bg); }
        .wrapper { max-width: 900px; margin: 30px auto; background: white; border: 1px solid var(--border); padding: 30px; border-radius: 4px; }
        .header { font-size: 18px; font-weight: bold; color: var(--th-blue); border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        .comment-item { display: flex; gap: 15px; margin-top: 20px; border: 1px solid #eee; padding: 15px; border-radius: 4px; }
        .user-thumb { width: 60px; height: 60px; background: #eee; border-radius: 4px; }
        .btn-post { background: var(--th-blue); color: white; border: none; padding: 12px; width: 100%; margin-top: 10px; cursor: pointer; font-weight: bold; border-radius: 4px; }
    </style>
</head>
<body>
<div class="wrapper">
    <div class="header"><i class="fa fa-user"></i> militarygrade's Profile Comments</div>
    <textarea id="editor"></textarea>
    <button class="btn-post">Post Comment</button>
    
    <div id="comment-list">
        <div class="comment-item">
            <div class="user-thumb"></div>
            <div>
                <div style="font-weight:bold; color:var(--th-blue); font-size:13px;">ashxer_rr</div>
                <div style="font-size:14px; margin-top:5px;">toyhouse</div>
            </div>
        </div>
    </div>
</div>
<script>
    tinymce.init({ selector: '#editor', height: 250, menubar: false, toolbar_mode: 'wrap' });
</script>
</body>
</html>
