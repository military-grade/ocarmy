<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Comments | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: sans-serif; background: var(--th-bg); }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border: 1px solid var(--border); min-height: 100vh; }
        .main { flex: 1; padding: 30px; }
        
        /* SIDE-BY-SIDE ALIGNMENT PER SCREENSHOT 1.18.27 */
        .comment-input-grid { display: flex; gap: 10px; align-items: stretch; margin-bottom: 30px; }
        textarea { flex: 1; border: 1px solid #ccc; border-radius: 4px; padding: 10px; height: 100px; }
        .btn-post { background: #eee; border: 1px solid #ccc; padding: 0 20px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .comment-item { display: flex; gap: 15px; border: 1px solid #eee; padding: 15px; margin-top: 10px; border-radius: 4px; }
        .user-avatar { width: 60px; height: 60px; background: #eee; border-radius: 4px; }
    </style>
</head>
<body>
<div class="wrapper">
    <main class="main">
        <h2 style="font-size:24px; margin-bottom:15px;">militarygrade's Profile Comments</h2>
        <div class="comment-input-grid">
            <textarea placeholder="Write a comment..."></textarea>
            <button class="btn-post">Post Comment</button>
        </div>
        <div id="comment-list">
            <div class="comment-item">
                <div style="text-align:center;"><div class="user-avatar"></div><b style="font-size:12px; color:#4e92ac;">ashxer_rr</b></div>
                <div style="font-size:14px; padding-top:5px;">toyhouse</div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
