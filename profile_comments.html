<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile Comments | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        /* ... RE-PASTE ALL CSS FROM DASHBOARD ABOVE ... */
        .comment-header { font-size: 24px; margin-bottom: 10px; color: #333; }
        .comment-input-area { display: flex; gap: 10px; align-items: flex-start; margin-bottom: 30px; }
        .comment-input-area textarea { flex: 1; height: 80px; border: 1px solid #ccc; border-radius: 4px; padding: 10px; }
        .btn-post { background: #eee; border: 1px solid #ccc; padding: 8px 15px; border-radius: 4px; cursor: pointer; font-weight: bold; }
        
        .comment-card { display: flex; gap: 15px; border: 1px solid #eee; padding: 15px; margin-top: 10px; border-radius: 4px; }
        .comm-user-box { width: 60px; text-align: center; }
        .comm-avatar { width: 60px; height: 60px; background: #eee; border-radius: 4px; }
        .comm-name { font-weight: bold; color: var(--th-blue); font-size: 12px; margin-top: 5px; }
    </style>
</head>
<body>
<div class="wrapper">
    <main class="main">
        <div class="comment-header">militarygrade's Profile Comments</div>
        <div class="comment-input-area">
            <textarea placeholder="Write a comment..."></textarea>
            <button class="btn-post">Post Comment</button>
        </div>
        <div id="comments-list">
            <div class="comment-card">
                <div class="comm-user-box">
                    <div class="comm-avatar"></div>
                    <div class="comm-name">ashxer_rr</div>
                </div>
                <div style="font-size:14px; padding-top: 5px;">toyhouse</div>
            </div>
        </div>
    </main>
</div>
</body>
</html>
