<!DOCTYPE html>
<html lang="en">
<head>
    <title>Gallery | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; background: var(--th-bg); font-family: sans-serif; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; min-height: 100vh; }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-header { background: #427e95; padding: 10px 15px; font-weight: bold; }
        .side-user-info { padding: 12px 15px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); }
        .side-avatar { width: 35px; height: 35px; background-size: cover; background-position: center; border-radius: 2px; }
        .main { flex: 1; padding: 25px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(180px, 1fr)); gap: 15px; }
        .gallery-card img { width: 100%; aspect-ratio: 1/1; object-fit: cover; border: 1px solid #ddd; padding: 4px; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <div class="side-header">Character</div>
        <div class="side-user-info">
            <div class="side-avatar" id="side-pfp"></div>
            <a href="#" id="side-user-link" style="color:white; font-weight:bold; font-size:13px; text-decoration:none;">User</a>
        </div>
        <div style="padding:15px;"><a href="#" id="back-to-profile" style="color:white; text-decoration:none; font-size:13px;"><i class="fa fa-arrow-left"></i> Back to Profile</a></div>
    </aside>

    <main class="main">
        <h2 class="border-bottom pb-2 mb-4"><i class="fa fa-image"></i> <span id="char-name">...</span>'s Gallery</h2>
        <div class="gallery-grid" id="gallery-display"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const charId = new URLSearchParams(window.location.search).get('id');

    onSnapshot(doc(db, "characters", charId), async (snap) => {
        const data = snap.data();
        document.getElementById('char-name').innerText = data.name;
        document.getElementById('back-to-profile').href = `character.html?id=${charId}`;
        
        const ownerSnap = await getDoc(doc(db, "users", data.ownerId));
        if(ownerSnap.exists()){
            const oData = ownerSnap.data();
            document.getElementById('side-user-link').innerText = oData.username;
            document.getElementById('side-user-link').href = `user.html?id=${data.ownerId}`;
            if(oData.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${oData.pfp}')`;
        }
        document.getElementById('gallery-display').innerHTML = (data.gallery || []).map(img => `<div class="gallery-card"><img src="${img}"></div>`).join('');
    });
</script>
</body>
</html>
