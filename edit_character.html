<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Edit Character | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { background: var(--th-bg); padding: 30px; font-family: sans-serif; }
        .edit-card { background: white; border: 1px solid var(--border); border-radius: 4px; margin-bottom: 20px; }
        .card-header { background: #f9f9f9; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid var(--border); }
        .card-body { padding: 20px; }
        label { font-weight: bold; font-size: 13px; color: #555; margin-bottom: 5px; }
        .btn-update { background: var(--th-blue); color: white; border: none; padding: 12px; width: 100%; border-radius: 4px; font-weight: bold; }
    </style>
</head>
<body>
    <div class="container" style="max-width: 900px;">
        <h2 class="mb-4">Edit Character</h2>

        <div class="edit-card">
            <div class="card-header">Basics</div>
            <div class="card-body row">
                <div class="col-md-12 mb-3">
                    <label>Name</label>
                    <input type="text" id="edit-name" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label>Folder</label>
                    <select id="edit-folder" class="form-control"><option>Unsorted</option></select>
                </div>
                <div class="col-md-6 mb-3">
                    <label>Worth ($)</label>
                    <input type="text" id="edit-worth" class="form-control">
                </div>
                <div class="col-md-12 mb-3">
                    <label>Tags</label>
                    <input type="text" id="edit-tags" class="form-control">
                </div>
                <div class="form-check ms-3">
                    <input class="form-check-input" type="checkbox" checked>
                    <label class="form-check-label">Enable listing (Show on front page)</label>
                </div>
            </div>
        </div>

        <div class="edit-card">
            <div class="card-header">Profile Content</div>
            <div class="card-body">
                <textarea id="edit-bio"></textarea>
            </div>
        </div>

        <button class="btn-update" onclick="saveEdits()">Update Character</button>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const db = getFirestore(initializeApp(firebaseConfig));
    const charId = new URLSearchParams(window.location.search).get('id');

    tinymce.init({ selector: '#edit-bio', height: 400, plugins: 'code link image lists', toolbar: 'undo redo | bold italic | code' });

    async function load() {
        const snap = await getDoc(doc(db, "characters", charId));
        const data = snap.data();
        document.getElementById('edit-name').value = data.name;
        document.getElementById('edit-worth').value = data.worth || "0.00";
        document.getElementById('edit-tags').value = (data.tags || []).join(', ');
        setTimeout(() => tinymce.get('edit-bio').setContent(data.description || ""), 1000);
    }

    window.saveEdits = async () => {
        await updateDoc(doc(db, "characters", charId), {
            name: document.getElementById('edit-name').value,
            worth: document.getElementById('edit-worth').value,
            tags: document.getElementById('edit-tags').value.split(',').map(t => t.trim()),
            description: tinymce.get('edit-bio').getContent()
        });
        window.location.href = `character.html?id=${charId}`;
    };
    load();
</script>
</body>
</html>
