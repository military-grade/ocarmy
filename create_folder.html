<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Folder | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
</head>
<body style="background:#f7f7f7; padding:50px;">

<div class="container" style="max-width:500px; background:white; padding:30px; border:1px solid #ddd; border-radius:8px;">
    <h3>Create New Folder</h3>
    <hr>
    <label class="form-label fw-bold">Folder Name</label>
    <input type="text" id="folder-name" class="form-control mb-3" placeholder="e.g. Primary OCs">
    
    <label class="form-label fw-bold">Parent Folder (Optional)</label>
    <select id="parent-folder" class="form-select mb-4">
        <option value="root">None (Top Level)</option>
    </select>

    <button class="btn btn-primary w-100" id="make-folder-btn" style="background:#4e92ac; border:none;">Create Folder</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        
        // Load user's existing folders for the dropdown
        const q = query(collection(db, "folders"), where("ownerId", "==", user.uid));
        const snap = await getDocs(q);
        const select = document.getElementById('parent-folder');
        snap.forEach(doc => {
            select.innerHTML += `<option value="${doc.id}">${doc.data().name}</option>`;
        });
    });

    document.getElementById('make-folder-btn').onclick = async () => {
        const user = auth.currentUser;
        const name = document.getElementById('folder-name').value;
        const parent = document.getElementById('parent-folder').value;

        if(!name) return alert("Enter a folder name.");

        await addDoc(collection(db, "folders"), {
            name: name,
            ownerId: user.uid,
            parentId: parent,
            description: ""
        });

        alert("Folder created!");
        window.location.href = "dashboard.html";
    };
</script>
</body>
</html>
