<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Subscribe | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-green: #a4c28e; --th-bg: #f7f7f7; --border: #ddd; }
        body { background: var(--th-bg); font-family: sans-serif; padding: 50px 20px; }
        .sub-container { max-width: 600px; margin: auto; background: white; border: 1px solid var(--border); padding: 40px; border-radius: 8px; box-shadow: 0 4px 15px rgba(0,0,0,0.05); }
        .sub-header { text-align: center; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; color: #4e92ac; font-size: 24px; font-weight: bold; }
        .check-card { border: 1px solid var(--border); padding: 15px; border-radius: 6px; text-align: center; background: #fafafa; }
        .btn-subscribe { background: var(--th-green); color: white; border: none; width: 100%; padding: 15px; font-weight: bold; border-radius: 6px; margin-top: 25px; text-transform: uppercase; letter-spacing: 1px; }
        .btn-subscribe:hover { background: #8fb178; }
    </style>
</head>
<body>

<div class="sub-container">
    <div class="sub-header">
        <i class="fa fa-user-plus"></i> Subscribe to <span id="target-username">...</span>
    </div>
    <p class="text-center text-muted small mb-4">Choose which updates you want to receive. You can change these at any time.</p>

    <div class="row g-3">
        <div class="col-6"><div class="check-card"><input type="checkbox" id="sub-chars" checked class="form-check-input mb-2"><br><strong>Characters</strong></div></div>
        <div class="col-6"><div class="check-card"><input type="checkbox" id="sub-imgs" checked class="form-check-input mb-2"><br><strong>Images</strong></div></div>
        <div class="col-6"><div class="check-card"><input type="checkbox" id="sub-bulletins" checked class="form-check-input mb-2"><br><strong>Bulletins</strong></div></div>
        <div class="col-6"><div class="check-card"><input type="checkbox" id="sub-ads" checked class="form-check-input mb-2"><br><strong>Ads</strong></div></div>
    </div>

    <button class="btn-subscribe" id="sub-btn">SUBSCRIBE</button>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, setDoc, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();
    const targetUid = new URLSearchParams(window.location.search).get('id');

    onAuthStateChanged(auth, async (user) => {
        if (!user || !targetUid) return;
        if (user.uid === targetUid) {
            document.querySelector('.sub-container').innerHTML = "<div class='alert alert-warning'>You cannot subscribe to yourself!</div>";
            return;
        }

        const targetSnap = await getDoc(doc(db, "users", targetUid));
        if (targetSnap.exists()) {
            document.getElementById('target-username').innerText = targetSnap.data().username;
        }

        document.getElementById('sub-btn').onclick = async () => {
            const btn = document.getElementById('sub-btn');
            btn.disabled = true; btn.innerText = "SUBSCRIBING...";

            const prefs = {
                characters: document.getElementById('sub-chars').checked,
                images: document.getElementById('sub-imgs').checked,
                bulletins: document.getElementById('sub-bulletins').checked,
                ads: document.getElementById('sub-ads').checked
            };

            try {
                // 1. Save Sub Relation
                await setDoc(doc(db, "users", targetUid, "subscribers", user.uid), {
                    fromUsername: user.displayName || "A user",
                    prefs: prefs,
                    timestamp: serverTimestamp()
                });

                // 2. TRIGGER NOTIFICATION
                await addDoc(collection(db, "notifications"), {
                    toUserId: targetUid,
                    fromUsername: user.displayName || "A user",
                    fromUserId: user.uid,
                    type: "subscription",
                    status: "unread",
                    createdAt: serverTimestamp()
                });

                alert("Subscription Successful!");
                window.location.href = `profile.html?user=${targetUid}`;
            } catch (e) { alert(e.message); btn.disabled = false; }
        };
    });
</script>
</body>
</html>
