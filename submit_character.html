<!DOCTYPE html>
<html>
<head>
    <title>Submit Character | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-teal: #5bc0de; --th-dark: #212529; --th-bg: #f7f7f7; --th-border: #dcdcdc; }
        body { margin: 0; font-family: Arial, sans-serif; background: var(--th-bg); color: #333; }
        
        .navbar { background: var(--th-dark); color: white; padding: 10px 20px; font-weight: bold; }
        .container { max-width: 600px; margin: 50px auto; background: white; border: 1px solid var(--th-border); border-radius: 4px; padding: 30px; }
        
        h2 { border-bottom: 2px solid var(--th-teal); padding-bottom: 10px; margin-bottom: 20px; color: #444; }
        
        label { display: block; font-weight: bold; margin-bottom: 8px; font-size: 14px; color: #666; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ddd; border-radius: 4px; box-sizing: border-box; }
        
        .btn-submit { background: var(--th-teal); color: white; border: none; padding: 15px; border-radius: 4px; width: 100%; font-weight: bold; cursor: pointer; font-size: 16px; }
        .btn-submit:hover { background: #46b8da; }
        
        .back-link { display: block; text-align: center; margin-top: 20px; color: #888; text-decoration: none; font-size: 13px; }
    </style>
</head>
<body>

<div class="navbar">OCARMY | Submission</div>

<div class="container">
    <h2><i class="fa fa-user-plus"></i> Submit Character</h2>
    
    <label>Character Name</label>
    <input type="text" id="char-name" placeholder="Enter character name...">
    
    <label>Character Image URL</label>
    <input type="text" id="char-img" placeholder="Paste link (Imgur, Discord, etc.)">
    
    <button class="btn-submit" onclick="submitOC()">Upload to Army</button>
    
    <a href="dashboard.html" class="back-link">← Cancel and return to profile</a>
</div>

<script type="module">
  import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
  import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
  import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

  const firebaseConfig = {
    apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
    authDomain: "ocarmy-db.firebaseapp.com",
    projectId: "ocarmy-db",
    storageBucket: "ocarmy-db.firebasestorage.app",
    messagingSenderId: "848883355194",
    appId: "1:848883355194:web:361e9fe8eb9e01f350af03",
    measurementId: "G-9G2WV3NXV1"
  };

  const app = initializeApp(firebaseConfig);
  const auth = getAuth();
  const db = getFirestore(app);

  // Ensure user is logged in
  onAuthStateChanged(auth, (user) => {
    if (!user) window.location.href = "index.html";
  });

  window.submitOC = async () => {
    const name = document.getElementById('char-name').value;
    const img = document.getElementById('char-img').value;
    const user = auth.currentUser;

    if (!name || !img) {
        alert("Please provide both a name and an image link!");
        return;
    }

    try {
        // Save character with INDEPENDENT ownerID
        await addDoc(collection(db, "characters"), {
            name: name,
            image: img,
            ownerID: user.uid,
            timestamp: serverTimestamp()
        });
        
        alert(name + " has joined the army!");
        window.location.href = "dashboard.html";
    } catch (e) {
        alert("Error: " + e.message);
    }
  };
</script>
</body>
</html>
