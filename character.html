<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { background: var(--th-bg); font-family: sans-serif; }
        .main-card { background: white; border: 1px solid var(--border); border-radius: 4px; max-width: 1000px; margin: 40px auto; padding: 30px; }
        .avatar-main { width: 250px; height: 250px; border: 1px solid var(--border); background-size: cover; background-position: center; border-radius: 4px; }
        .info-badge { background: #eee; padding: 5px 12px; border-radius: 20px; font-size: 12px; font-weight: bold; }
        .gallery-item { width: 120px; height: 120px; border: 1px solid var(--border); background-size: cover; background-position: center; position: relative; border-radius: 4px; }
        .del-img { position: absolute; top: -5px; right: -5px; background: red; color: white; border: none; border-radius: 50%; cursor: pointer; }
    </style>
</head>
<body>

<div class="main-card">
    <div class="d-flex justify-content-between mb-4">
        <a href="characters.html" class="btn btn-sm btn-outline-secondary">← Back to Characters</a>
        <div id="edit-mode-btn"></div>
    </div>

    <div class="row">
        <div class="col-md-4">
            <div class="avatar-main" id="char-pfp"></div>
            <div class="mt-3">
                <div class="fw-bold text-muted small mb-1">WORTH</div>
                <div class="mb-3">$<span id="char-worth">0.00</span></div>
                <div class="fw-bold text-muted small mb-1">TAGS</div>
                <div id="char-tags"></div>
            </div>
        </div>
        <div class="col-md-8">
            <h1 id="char-name">Loading...</h1>
            <p class="text-muted">Designed by <span id="char-designer">-</span></p>
            <hr>
            <div id="char-bio"></div>
            
            <h4 class="mt-5">Gallery</h4>
            <div class="d-flex flex-wrap gap-2" id="gallery-grid"></div>
            
            <div id="owner-gallery-tools" class="mt-4 p-3 bg-light border" style="display:none;">
                <h6>Add to Gallery</h6>
                <div class="input-group">
                    <input type="text" id="new-img-url" class="form-control" placeholder="Image URL">
                    <button class="btn btn-primary" onclick="addToGallery()">Add</button>
                </div>
            </div>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    const charId = new URLSearchParams(window.location.search).get('id');

    onAuthStateChanged(auth, (user) => {
        onSnapshot(doc(db, "characters", charId), (snap) => {
            const data = snap.data();
            document.getElementById('char-name').innerText = data.name;
            document.getElementById('char-worth').innerText = data.worth || "0.00";
            document.getElementById('char-designer').innerText = data.designer || "-";
            document.getElementById('char-pfp').style.backgroundImage = `url(${data.avatar})`;
            document.getElementById('char-bio').innerHTML = data.description;
            
            const tagsDiv = document.getElementById('char-tags');
            tagsDiv.innerHTML = data.tags.map(t => `<span class="info-badge me-1">${t}</span>`).join('');

            const galleryGrid = document.getElementById('gallery-grid');
            galleryGrid.innerHTML = data.gallery.map(img => `
                <div class="gallery-item" style="background-image:url(${img})">
                    ${user && user.uid === data.ownerId ? `<button class="del-img" onclick="deleteImg('${img}')">×</button>` : ''}
                </div>
            `).join('');

            if(user && user.uid === data.ownerId) {
                document.getElementById('owner-gallery-tools').style.display = 'block';
            }
        });
    });

    window.addToGallery = async () => {
        const url = document.getElementById('new-img-url').value;
        await updateDoc(doc(db, "characters", charId), { gallery: arrayUnion(url) });
        document.getElementById('new-img-url').value = "";
    };

    window.deleteImg = async (url) => {
        if(confirm("Remove this image?")) {
            await updateDoc(doc(db, "characters", charId), { gallery: arrayRemove(url) });
        }
    };
</script>
</body>
</html>
