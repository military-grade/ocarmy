<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OC Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); }
        .wrapper { display: flex; max-width: 1200px; margin: 0 auto; background: white; min-height: 100vh; border: 1px solid var(--border); }

        /* Character Sidebar (Image 18) */
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }

        .main { flex: 1; padding: 30px; }
        .profile-header { display: flex; gap: 25px; margin-bottom: 30px; align-items: flex-start; }
        .char-img { width: 120px; height: 120px; border: 1px solid var(--border); border-radius: 4px; background-size: cover; background-position: center; flex-shrink: 0; }
        
        .char-info { flex: 1; }
        .char-title { font-size: 32px; font-weight: bold; display: flex; align-items: center; gap: 10px; margin-bottom: 5px; }
        .char-owner { color: var(--th-blue); text-decoration: none; font-weight: bold; font-size: 14px; }

        /* Stats Box (Image 18) */
        .stats-box { width: 280px; border: 1px solid var(--border); border-radius: 4px; background: #fdfdfd; padding: 15px; font-size: 13px; }
        .stats-row { display: flex; justify-content: space-between; padding: 5px 0; border-bottom: 1px solid #eee; }
        .stats-row:last-child { border: 0; }
        .stats-label { color: #666; font-weight: bold; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <div style="padding:15px; background:rgba(0,0,0,0.1); font-weight:bold;"><i class="fa fa-user"></i> Character</div>
        <div class="side-nav">
            <a href="dashboard.html" style="background:rgba(0,0,0,0.2);"><i class="fa fa-arrow-left"></i> fourteendays</a>
            <a href="#"><i class="fa fa-folder"></i> Unsorted</a>
            <div style="font-size:10px; padding:15px 15px 5px; text-transform:uppercase; opacity:0.7;">Character</div>
            <a href="#"><i class="fa fa-image"></i> Gallery</a>
            <a href="#"><i class="fa fa-comments"></i> Comments</a>
            <div style="font-size:10px; padding:15px 15px 5px; text-transform:uppercase; opacity:0.7;">Control Panel</div>
            <a href="#" style="color:#d9f3ff;">Manage Character <i class="fa fa-caret-right" style="float:right;"></i></a>
        </div>
    </aside>

    <main class="main">
        <div class="profile-header">
            <div class="char-img" style="background-image: url('https://via.placeholder.com/150');"></div>
            <div class="char-info">
                <div class="char-title"><i class="fa fa-lock" style="font-size: 20px;"></i> DOBIE</div>
                <a href="#" class="char-owner">@fourteendays</a>
            </div>
            <div class="stats-box">
                <div class="stats-row"><span class="stats-label">Created</span> <span>8 hours ago</span></div>
                <div class="stats-row"><span class="stats-label">Creator</span> <span style="color:var(--th-blue);">@fourteendays</span></div>
                <div class="stats-row"><span class="stats-label">Favorites</span> <span>1</span></div>
            </div>
        </div>

        <h3 style="border-bottom: 1px solid #eee; padding-bottom: 10px; color: #444;">Profile</h3>
        <div id="description-area" style="text-align: center;">
            <p><strong>Dobie / pot</strong></p>
            <p>He/him/they</p>
            <p>weedpuppy</p>
        </div>
    </main>
</div>
</body>
</html>
