<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; --side-teal: #7cc1d8; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); }

        /* Left Sidebar - Toyhouse Style */
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-header { background: #427e95; padding: 10px 15px; font-weight: bold; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .side-user-info { padding: 12px 15px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); }
        .side-avatar { width: 35px; height: 35px; background: #eee; border-radius: 2px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-nav a:hover { background: rgba(0,0,0,0.1); }
        .badge-count { background: rgba(255,255,255,0.2); font-size: 10px; padding: 2px 6px; border-radius: 10px; float: right; }

        /* Control Panel Dropdown */
        .cp-header { background: var(--side-teal); color: white; padding: 10px 15px; font-weight: bold; font-size: 13px; cursor: pointer; }
        .cp-subnav { background: #f1f8fb; display: none; }
        .cp-subnav a { display: block; padding: 8px 20px; color: #4e92ac !important; font-size: 12px; border-bottom: 1px solid #e1eef2; text-decoration: none; }
        .cp-active .cp-subnav { display: block; }

        /* Main Content Area */
        .main { flex: 1; padding: 25px; border-right: 1px solid #eee; }
        .char-header-row { display: flex; gap: 20px; align-items: flex-start; margin-bottom: 25px; }
        .char-main-thumb { width: 100px; height: 100px; border: 1px solid var(--border); border-radius: 4px; background-size: cover; background-position: center; }
        .char-name-area h2 { margin: 0; font-size: 26px; font-weight: normal; color: #444; }
        .char-name-area h2 a { color: #444; text-decoration: none; }
        
        .section-title { font-size: 20px; border-bottom: 1px solid #eee; padding-bottom: 8px; margin: 30px 0 15px; font-weight: 500; }
        .bio-render { line-height: 1.6; }

        /* Right Stats Column */
        .stats-col { width: 260px; padding: 25px; background: #fafafa; flex-shrink: 0; font-size: 13px; }
        .stat-row { display: flex; justify-content: space-between; margin-bottom: 10px; padding-bottom: 5px; border-bottom: 1px solid #eee; }
        .stat-label { font-weight: bold; color: #666; }
        
        /* Warning Overlay */
        #warning-overlay { position: fixed; top: 0; left: 0; width: 100%; height: 100%; background: white; z-index: 9999; display: none; padding: 50px 20px; overflow-y: auto; text-align: center; }
    </style>
</head>
<body>

<div id="warning-overlay">
    <div style="max-width:800px; margin:auto; border:1px solid #ddd; padding:40px; background:#fff; border-radius:4px;">
        <h2 style="color:#d9534f;"><i class="fa fa-exclamation-triangle"></i> Character Warning</h2>
        <hr>
        <div id="warning-text" style="text-align:left; margin:30px 0;"></div>
        <button class="btn btn-primary px-5" id="proceed-btn" style="background:#4e92ac; border:none;">Proceed to Profile</button>
    </div>
</div>

<nav class="navbar"><div class="fw-bold">OCARMY</div></nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-header"><i class="fa fa-heart"></i> Character</div>
        <div class="side-user-info">
            <div class="side-avatar" id="side-owner-pfp"></div>
            <a href="#" id="side-owner-name" style="color:white; text-decoration:none; font-weight:bold; font-size:13px;">User</a>
        </div>
        <div class="side-nav">
            <a href="#" class="active"><i class="fa fa-file-alt"></i> Profile</a>
            <a href="#" id="link-gallery"><i class="fa fa-image"></i> Gallery <span class="badge-count" id="count-gallery">0</span></a>
            <a href="#"><i class="fa fa-book"></i> Library</a>
            <a href="#"><i class="fa fa-globe"></i> Worlds</a>
            
            <div class="p-2">
                <button class="btn btn-sm btn-outline-light w-100" id="fav-btn" onclick="toggleFavorite()"><i class="fa-regular fa-heart"></i> Favorite</button>
            </div>

            <div id="owner-panel" style="display:none; margin-top:10px;">
                <div class="cp-header" onclick="this.parentElement.classList.toggle('cp-active')">
                    <i class="fa fa-wrench"></i> Control Panel <i class="fa fa-caret-down float-end mt-1"></i>
                </div>
                <div class="cp-subnav">
                    <a href="#" id="edit-char-link"><i class="fa fa-pencil"></i> Manage Character</a>
                    <a href="#" id="edit-imgs-link"><i class="fa fa-images"></i> Manage Images</a>
                    <a href="#" id="edit-warnings-link"><i class="fa fa-exclamation-triangle"></i> Character Warnings</a>
                </div>
                <div class="p-2 text-center"><a href="javascript:void(0)" class="text-danger small fw-bold text-decoration-none" onclick="confirmDelete()"><i class="fa fa-trash"></i> Delete</a></div>
            </div>
        </div>
    </aside>

    <main class="main">
        <div class="mb-2">
            <a href="#" id="dynamic-back-btn" class="text-muted small text-decoration-none"><i class="fa fa-arrow-left"></i> Back to Profile</a>
        </div>
        <div class="char-header-row">
            <div class="char-main-thumb" id="main-thumb"></div>
            <div class="char-name-area">
                <h2><a href="#" id="refresh-link"><i class="fa fa-lock"></i> <span id="display-name">...</span></a></h2>
                <div class="small"><i class="fa fa-user"></i> <a href="#" id="creator-link" style="color:var(--th-blue); text-decoration:none; font-weight:bold;">User</a></div>
            </div>
        </div>
        <div class="section-title">Profile</div>
        <div id="bio-content" class="bio-render"></div>
        <h5 class="border-bottom pb-2 mt-4">Recent Images</h5>
        <div class="row g-2" id="gallery-preview"></div>
    </main>

    <aside class="stats-col">
        <div class="stat-row"><span class="stat-label">Created</span><span id="stat-date">-</span></div>
        <div class="stat-row"><span class="stat-label">Creator</span><span id="stat-creator">-</span></div>
        <div class="stat-row"><span class="stat-label">Favorites</span><span id="stat-favs">0</span></div>
    </aside>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDoc, updateDoc, arrayUnion, arrayRemove, deleteDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();
    const charId = new URLSearchParams(window.location.search).get('id');

    // 1. DATA LOADER - NO AUTH REQUIRED FOR BASIC VIEW
    if (charId) {
        onSnapshot(doc(db, "characters", charId), async (snap) => {
            if (!snap.exists()) {
                document.querySelector('.main').innerHTML = "<h3>Character not found.</h3>";
                return;
            }
            const data = snap.data();

            // Populate Public UI Immediately
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('refresh-link').href = `character.html?id=${charId}`;
            document.getElementById('main-thumb').style.backgroundImage = `url('${data.avatar || ''}')`;
            document.getElementById('bio-content').innerHTML = data.description || "<i>No bio.</i>";
            document.getElementById('stat-creator').innerText = data.designer || "Unknown";
            document.getElementById('stat-favs').innerText = (data.subscribers || []).length;
            document.getElementById('stat-date').innerText = data.createdAt ? new Date(data.createdAt.seconds * 1000).toLocaleDateString() : "-";
            
            // Sync Sidebar Owner
            const ownerSnap = await getDoc(doc(db, "users", data.ownerId));
            if(ownerSnap.exists()){
                const oData = ownerSnap.data();
                document.getElementById('side-owner-name').innerText = oData.username;
                document.getElementById('side-owner-name').href = `user.html?id=${data.ownerId}`;
                document.getElementById('creator-link').innerText = oData.username;
                document.getElementById('creator-link').href = `user.html?id=${data.ownerId}`;
                document.getElementById('dynamic-back-btn').href = `user.html?id=${data.ownerId}`;
                if(oData.pfp) document.getElementById('side-owner-pfp').style.backgroundImage = `url('${oData.pfp}')`;
            }

            // Gallery Preview
            const gallery = data.gallery || [];
            document.getElementById('count-gallery').innerText = gallery.length;
            document.getElementById('link-gallery').href = `character_gallery.html?id=${charId}`;
            document.getElementById('gallery-preview').innerHTML = gallery.slice(0, 6).map(img => `
                <div class="col-4 mb-2"><div style="aspect-ratio:1/1; background:url('${img}') center/cover; border:1px solid #ddd; border-radius:4px;"></div></div>
            `).join('');

            // 2. CHECK OWNER PERMISSIONS
            onAuthStateChanged(auth, (user) => {
                const ownerPanel = document.getElementById('owner-panel');
                const favBtn = document.getElementById('fav-btn');

                if (user) {
                    if (user.uid === data.ownerId) {
                        ownerPanel.style.display = "block";
                        document.getElementById('edit-char-link').href = `edit_character.html?id=${charId}`;
                        document.getElementById('edit-imgs-link').href = `manage_images.html?id=${charId}`;
                        document.getElementById('edit-warnings-link').href = `edit_warnings.html?id=${charId}`;
                    } else {
                        ownerPanel.style.display = "none";
                    }

                    if ((data.subscribers || []).includes(user.uid)) {
                        favBtn.innerHTML = '<i class="fa fa-heart text-danger"></i> Unfavorite';
                    } else {
                        favBtn.innerHTML = '<i class="fa-regular fa-heart"></i> Favorite';
                    }
                }
            });

            // 3. WARNING LOGIC
            if (data.warningActive && !sessionStorage.getItem(`warn_${charId}`)) {
                document.getElementById('warning-overlay').style.display = 'block';
                document.getElementById('warning-text').innerHTML = data.warningContent || "Warning: Content Advisory.";
                document.getElementById('proceed-btn').onclick = () => {
                    sessionStorage.setItem(`warn_${charId}`, 'true');
                    document.getElementById('warning-overlay').style.display = 'none';
                };
            }
        });
    }

    // INTERACTION LOGIC
    window.toggleFavorite = async () => {
        const user = auth.currentUser;
        if (!user) return alert("Log in to favorite!");
        const charRef = doc(db, "characters", charId);
        const charSnap = await getDoc(charRef);
        const subs = charSnap.data().subscribers || [];
        if (subs.includes(user.uid)) {
            await updateDoc(charRef, { subscribers: arrayRemove(user.uid) });
        } else {
            await updateDoc(charRef, { subscribers: arrayUnion(user.uid) });
        }
    };

    window.confirmDelete = async () => {
        if (confirm("Permanently delete character?")) {
            await deleteDoc(doc(db, "characters", charId));
            window.location.href = "characters.html";
        }
    };
</script>
</body>
</html>
