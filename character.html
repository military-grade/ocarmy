<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); }
        .sidebar { width: 200px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .main { flex: 1; padding: 30px; }
        
        .char-header { display: flex; gap: 20px; border-bottom: 1px solid #eee; padding-bottom: 20px; margin-bottom: 20px; }
        .char-avatar { width: 200px; height: 200px; background-size: cover; background-position: center; border: 1px solid var(--border); border-radius: 4px; }
        
        .credit-box { background: #f9f9f9; border: 1px solid var(--border); border-left: 5px solid var(--th-blue); padding: 15px; border-radius: 4px; margin-top: 30px; }
        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(100px, 1fr)); gap: 10px; margin-top: 15px; }
        .gallery-item { position: relative; width: 100px; height: 100px; }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; border-radius: 4px; }
        .del-btn { position: absolute; top: 0; right: 0; background: red; color: white; border: none; font-size: 10px; cursor: pointer; }
    </style>
</head>
<body>

<nav class="navbar"><div style="font-weight:bold;">OCARMY</div></nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-user"></i> Profile</a>
            <a href="characters.html"><i class="fa fa-users"></i> Characters</a>
        </div>
    </aside>

    <main class="main">
        <div class="char-header">
            <div class="char-avatar" id="display-avatar"></div>
            <div>
                <h1 id="display-name" style="margin:0;">Loading...</h1>
                <div id="display-description" style="margin-top:10px;"></div>
            </div>
        </div>

        <div class="credit-box">
            <div class="row">
                <div class="col-6"><strong>Designer:</strong> <span id="display-designer">-</span></div>
                <div class="col-6"><strong>Tradeability:</strong> <span id="display-trade">-</span></div>
            </div>
        </div>

        <div id="gallery-editor" style="display:none; margin-top: 40px; border-top: 1px solid #eee; padding-top: 20px;">
            <h3 style="font-size: 16px;"><i class="fa fa-images"></i> Gallery Editor</h3>
            <div class="gallery-grid" id="manage-grid"></div>
            <div class="mt-3 d-flex gap-2">
                <input type="text" id="add-img-url" class="form-control" placeholder="Paste Image URL">
                <button class="btn btn-primary btn-sm" onclick="addToGallery()">Add to Gallery</button>
            </div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    const charId = new URLSearchParams(window.location.search).get('id');

    async function loadChar() {
        if (!charId) return;
        const snap = await getDoc(doc(db, "characters", charId));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('display-name').innerText = data.name;
            document.getElementById('display-description').innerHTML = data.description || "No description.";
            document.getElementById('display-avatar').style.backgroundImage = `url('${data.avatar || 'https://via.placeholder.com/200'}')`;
            document.getElementById('display-designer').innerText = data.designer || "Unknown";
            document.getElementById('display-trade').innerText = data.tradeability || "Not for Trade";

            onAuthStateChanged(auth, (user) => {
                if (user && user.uid === data.ownerId) {
                    document.getElementById('gallery-editor').style.display = 'block';
                    renderGallery(data.gallery || []);
                }
            });
        }
    }

    function renderGallery(gallery) {
        const grid = document.getElementById('manage-grid');
        grid.innerHTML = "";
        gallery.forEach(img => {
            const div = document.createElement('div');
            div.className = "gallery-item";
            div.innerHTML = `<img src="${img}"><button class="del-btn" onclick="deleteImg('${img}')">×</button>`;
            grid.appendChild(div);
        });
    }

    window.addToGallery = async () => {
        const url = document.getElementById('add-img-url').value;
        if(!url) return;
        await updateDoc(doc(db, "characters", charId), { gallery: arrayUnion(url) });
        location.reload();
    };

    window.deleteImg = async (url) => {
        if(confirm("Delete image?")) {
            await updateDoc(doc(db, "characters", charId), { gallery: arrayRemove(url) });
            location.reload();
        }
    };

    loadChar();
</script>
</body>
</html>
