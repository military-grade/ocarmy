<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Character Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { background: var(--th-bg); font-family: sans-serif; }
        .main-card { background: white; border: 1px solid var(--border); border-radius: 4px; max-width: 1000px; margin: 40px auto; padding: 30px; }
        
        /* Fixed Center Avatar */
        .avatar-container { width: 250px; height: 250px; margin: 0 auto 20px; border: 1px solid var(--border); overflow: hidden; border-radius: 4px; background: #eee; display: flex; align-items: center; justify-content: center; }
        .avatar-container img { max-width: 100%; height: auto; }

        .gallery-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(120px, 1fr)); gap: 10px; margin-top: 20px; }
        .gallery-item { position: relative; width: 120px; height: 120px; border: 1px solid var(--border); }
        .gallery-item img { width: 100%; height: 100%; object-fit: cover; }
        .del-btn { position: absolute; top: 2px; right: 2px; background: red; color: white; border: none; font-size: 10px; border-radius: 2px; cursor: pointer; }
    </style>
</head>
<body>
<div class="main-card">
    <div class="avatar-container">
        <img id="char-pfp" src="">
    </div>
    
    <div class="text-center">
        <h1 id="char-name">Loading...</h1>
        <p class="text-muted">Worth: $<span id="char-worth">0.00</span></p>
    </div>

    <hr>
    <div id="char-bio"></div>

    <div id="gallery-editor" style="display:none; margin-top:50px; border-top: 2px dashed #eee; padding-top:20px;">
        <h5>Gallery Editor</h5>
        <div class="gallery-grid" id="manage-grid"></div>
        <div class="mt-3 d-flex gap-2">
            <input type="text" id="new-img-url" class="form-control" placeholder="Paste extra image URL...">
            <button class="btn btn-primary btn-sm" onclick="addToGallery()">Add Image</button>
        </div>
    </div>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, updateDoc, arrayUnion, arrayRemove } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();
    const charId = new URLSearchParams(window.location.search).get('id');

    onAuthStateChanged(auth, (user) => {
        onSnapshot(doc(db, "characters", charId), (snap) => {
            const data = snap.data();
            document.getElementById('char-name').innerText = data.name;
            document.getElementById('char-worth').innerText = data.worth || "0.00";
            document.getElementById('char-pfp').src = data.avatar;
            document.getElementById('char-bio').innerHTML = data.description;
            
            if (user && user.uid === data.ownerId) {
                document.getElementById('gallery-editor').style.display = 'block';
                renderGallery(data.gallery || []);
            }
        });
    });

    function renderGallery(gallery) {
        const grid = document.getElementById('manage-grid');
        grid.innerHTML = gallery.map(img => `
            <div class="gallery-item">
                <img src="${img}">
                <button class="del-btn" onclick="deleteImg('${img}')">×</button>
            </div>
        `).join('');
    }

    window.addToGallery = async () => {
        const url = document.getElementById('new-img-url').value;
        await updateDoc(doc(db, "characters", charId), { gallery: arrayUnion(url) });
        document.getElementById('new-img-url').value = "";
    };

    window.deleteImg = async (url) => {
        if(confirm("Remove image?")) await updateDoc(doc(db, "characters", charId), { gallery: arrayRemove(url) });
    };
</script>
</body>
</html>
