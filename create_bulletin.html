<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>New Bulletin | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: sans-serif; background: var(--th-bg); }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; padding: 0 20px; }
        .wrapper { max-width: 900px; margin: 30px auto; background: white; border: 1px solid var(--border); border-radius: 4px; overflow: hidden; }
        .header { background: #f9f9f9; padding: 15px; font-weight: bold; border-bottom: 1px solid var(--border); display: flex; justify-content: space-between; }
        .body { padding: 25px; }
        input { width: 100%; padding: 12px; margin-bottom: 20px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; }
        .btn-poll { background: #eee; border: 1px solid #ccc; padding: 8px 15px; cursor: pointer; font-weight: bold; margin-bottom: 20px; display: inline-block; }
        .active-poll { background: var(--th-blue); color: white; border-color: var(--th-blue); }
        .btn-post { background: var(--th-blue); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; font-size: 16px; border-radius: 4px; }
    </style>
</head>
<body>

<nav class="navbar"><div style="font-weight:bold;">OCARMY</div></nav>

<div class="wrapper">
    <div class="header">New Bulletin</div>
    <div class="body">
        <label style="font-size:12px; font-weight:bold; color:#666; text-transform:uppercase;">Subject</label>
        <input type="text" id="b-subject" placeholder="Enter bulletin title...">

        <textarea id="editor"></textarea>

        <div class="btn-poll" id="poll-btn" onclick="togglePoll()"><i class="fa fa-chart-bar"></i> Add Poll</div>
        
        <div id="poll-section" style="display:none; border:1px solid #eee; padding:20px; margin-bottom:20px;">
            <label style="font-size:11px; font-weight:bold;">Poll Question</label>
            <input type="text" placeholder="What is your question?">
            <button style="width:100%; padding:10px; border:1px dashed #ccc; background:none; cursor:pointer;">+ Add Option</button>
        </div>

        <button class="btn-post" onclick="submitBulletin()">Post Bulletin</button>
    </div>
</div>

<script>
    tinymce.init({
        selector: '#editor',
        height: 350,
        menubar: false,
        toolbar_mode: 'wrap',
        plugins: 'link emoticons code lists',
        toolbar: 'undo redo | bold italic underline | emoticons link | bullist numlist | code',
        branding: false
    });

    function togglePoll() {
        const sec = document.getElementById('poll-section');
        const btn = document.getElementById('poll-btn');
        const isHidden = sec.style.display === 'none';
        sec.style.display = isHidden ? 'block' : 'none';
        btn.classList.toggle('active-poll', isHidden);
    }

    async function submitBulletin() {
        alert("Bulletin Posted!");
        window.location.href = "dashboard.html";
    }
</script>
</body>
</html>
