<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Bulletin | OCARMY</title>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { font-family: sans-serif; background: var(--th-bg); padding: 20px; }
        .card { background: white; border: 1px solid var(--border); border-radius: 4px; max-width: 900px; margin: 0 auto 20px; }
        .card-header { background: #f9f9f9; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid var(--border); }
        .card-body { padding: 20px; }
        .toggle-btn { background: #eee; border: 1px solid #ccc; padding: 5px 10px; cursor: pointer; border-radius: 4px; margin-bottom: 15px; display: inline-block; }
        .active-toggle { background: var(--th-blue); color: white; border-color: var(--th-blue); }
        #poll-options { display: none; margin-top: 15px; border: 1px solid #eee; padding: 15px; }
    </style>
</head>
<body>
    <div class="card">
        <div class="card-header">Create Bulletin</div>
        <div class="card-body">
            <div class="toggle-btn" id="ooc-toggle" onclick="this.classList.toggle('active-toggle')">OOC</div>
            
            <input type="text" placeholder="Bulletin Subject" style="width:100%; padding:10px; margin-bottom:15px; border:1px solid #ccc; border-radius:4px;">
            
            <textarea id="bulletin-editor"></textarea>

            <div class="toggle-btn" onclick="togglePoll()">Add Poll</div>
            <div id="poll-options">
                <label>Poll Question</label>
                <input type="text" style="width:100%; padding:10px; margin-bottom:10px; border:1px solid #ccc; border-radius:4px;">
                <button style="width:100%; padding:10px; border:1px dashed #ccc; background:none; cursor:pointer;">+ Add Option</button>
            </div>

            <button style="background: var(--th-blue); color: white; border: none; padding: 15px; width: 100%; cursor: pointer; font-weight: bold; margin-top:15px;">Create Bulletin</button>
        </div>
    </div>
    <script>
        tinymce.init({ selector: '#bulletin-editor', height: 300, toolbar_mode: 'wrap', menubar: false });
        function togglePoll() {
            const p = document.getElementById('poll-options');
            p.style.display = (p.style.display === 'block') ? 'none' : 'block';
        }
    </script>
</body>
</html>
