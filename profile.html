<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }

        /* Navbar */
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 2000; }
        .nav-left { display: flex; gap: 5px; align-items: center; height: 100%; }
        .nav-left a, .nav-item-btn { color: #ccc; text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; border: none; background: none; }
        .nav-left a:hover, .nav-item-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        
        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }
        .dropdown-content { display: none; position: absolute; top: 50px; background: white; border: 1px solid var(--border); min-width: 160px; box-shadow: 0 6px 12px rgba(0,0,0,.175); z-index: 3000; padding: 5px 0; border-radius: 0 0 4px 4px; }
        .dropdown-content a { display: block; padding: 8px 20px; color: #333 !important; text-decoration: none; font-size: 13px; width: 100%; text-align: left; }
        .show { display: block !important; }

        /* Sidebar & Layout */
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-user-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .creator-crown { color: #ffd700; margin-left: 5px; }
        .main { flex: 1; padding: 30px; background: white; }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" style="font-weight: bold; color: white; font-size: 16px;">OCARMY</a>
        <a href="browse.html"><i class="fa fa-eye"></i> Browse</a>
        <div class="dropdown">
            <button class="nav-item-btn" onclick="toggleDrop('drop-submit')"><i class="fa fa-plus"></i> Submit <i class="fa fa-caret-down"></i></button>
            <div id="drop-submit" class="dropdown-content"><a href="create_character.html">Character</a><a href="create_folder.html">Folder</a></div>
        </div>
        <a href="search.html"><i class="fa fa-search"></i> Search</a>
    </div>
    <div class="dropdown">
        <button class="nav-item-btn" onclick="toggleDrop('drop-user')"><span id="nav-username">User</span> <i class="fa fa-caret-down"></i></button>
        <div id="drop-user" class="dropdown-content" style="right:0;"><a href="dashboard.html">Profile</a><a href="settings.html">Settings</a><a href="#" id="logout-btn">Logout</a></div>
    </div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar" id="side-pfp"></div>
            <div>
                <div id="side-name-container" style="font-weight: bold; display:flex; align-items:center;">
                    <span id="side-username">Loading...</span>
                </div>
                <div style="font-size: 11px; opacity: 0.8;" id="side-sub-count">0 subscribers</div>
            </div>
        </div>
        <div class="side-nav">
            <a id="link-profile"><i class="fa fa-user"></i> Profile</a>
            <a id="link-bulletins"><i class="fa fa-comment"></i> Bulletins</a>
            <a id="link-characters"><i class="fa fa-users"></i> Characters</a>
            <a href="#"><i class="fa fa-link"></i> Links</a>
            <a href="#"><i class="fa fa-globe"></i> Worlds</a>
            
            <div class="side-label">Portfolio</div>
            <a href="#"><i class="fa fa-paint-brush"></i> Designs</a>
            <a href="#"><i class="fa fa-image"></i> Art</a>
            
            <div class="side-label">Interaction</div>
            <a id="link-comments"><i class="fa fa-comments"></i> Comments</a>
            
            <div id="visitor-controls" style="display: none;">
                <a id="link-subscribe" style="font-weight: bold; background: rgba(255,255,255,0.1);"><i class="fa fa-plus"></i> Subscribe</a>
                <a id="link-message"><i class="fa fa-envelope"></i> Message</a>
            </div>
            
            <div id="owner-controls" style="display: none;">
                <a href="notifications.html"><i class="fa fa-bell"></i> Notifications</a>
                <a href="messages.html"><i class="fa fa-envelope"></i> Inbox</a>
            </div>
        </div>
    </aside>

    <main class="main">
        <div id="profile-content">Loading profile...</div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, onSnapshot, getDocs, collection } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    // Get Target User from URL (e.g. profile.html?id=USER_ID)
    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get('id');

    window.toggleDrop = (id) => {
        document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
        document.getElementById(id).classList.toggle('show');
    };

    onAuthStateChanged(auth, (currentUser) => {
        if (!targetUid) return;

        // Determine if we are looking at our own profile
        const isOwner = currentUser && currentUser.uid === targetUid;
        
        if (isOwner) {
            document.getElementById('owner-controls').style.display = 'block';
        } else {
            document.getElementById('visitor-controls').style.display = 'block';
            document.getElementById('link-subscribe').href = `subscribe.html?id=${targetUid}`;
            document.getElementById('link-message').href = `message_user.html?id=${targetUid}`;
        }

        // Set sidebar links correctly
        document.getElementById('link-profile').href = `profile.html?id=${targetUid}`;
        document.getElementById('link-bulletins').href = `bulletins.html?id=${targetUid}`;
        document.getElementById('link-characters').href = `characters.html?id=${targetUid}`;
        document.getElementById('link-comments').href = `profile_comments.html?id=${targetUid}`;

        // Fetch Target Profile Data
        onSnapshot(doc(db, "users", targetUid), async (snap) => {
            if (snap.exists()) {
                const data = snap.data();
                document.getElementById('side-username').innerText = data.username || "User";
                if (data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;

                // 👑 Creator Crown Logic
                if (data.username?.toLowerCase() === 'militarygrade' && !document.querySelector('.creator-crown')) {
                    document.getElementById('side-name-container').innerHTML += ` <i class="fa fa-crown creator-crown" title="OCARMY Creator"></i>`;
                }

                // 👥 Subscriber Count
                const subSnap = await getDocs(collection(db, "users", targetUid, "subscribers"));
                document.getElementById('side-sub-count').innerText = `${subSnap.size} subscribers`;

                document.getElementById('profile-content').innerHTML = data.profileHTML || "No profile content yet.";
            }
        });
    });
</script>
</body>
</html>
