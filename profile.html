<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>User Profile | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        
        /* Navbar Styles */
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; justify-content: space-between; padding: 0 20px; position: sticky; top: 0; z-index: 20; }
        .nav-left { display: flex; gap: 5px; align-items: center; height: 100%; }
        .nav-left a, .nav-item-btn { color: #ccc; text-decoration: none; font-size: 13px; cursor: pointer; display: flex; align-items: center; gap: 5px; height: 100%; padding: 0 10px; border: none; background: none; }
        .nav-left a:hover, .nav-item-btn:hover { color: white; background: rgba(255,255,255,0.1); }
        
        .nav-logo-link { display: flex; align-items: center; padding-right: 15px !important; }
        .nav-logo-img { height: 32px; width: auto; display: block; }
        
        .dropdown { position: relative; height: 100%; display: flex; align-items: center; }
        .dropdown-content { display: none; position: absolute; top: 50px; background: white; border: 1px solid var(--border); min-width: 160px; box-shadow: 0 6px 12px rgba(0,0,0,.175); z-index: 30; }
        .dropdown-content a { display: block; padding: 8px 20px; color: #333 !important; text-decoration: none; font-size: 13px; width: 100%; text-align: left; }
        .show { display: block !important; }
        
        .notif-bar { display: flex; align-items: center; gap: 4px; margin-right: 10px; }
        .notif-item { 
            padding: 4px 8px; 
            font-size: 11px; 
            border-radius: 3px; 
            color: #ccc; 
            display: flex; 
            align-items: center; 
            gap: 5px; 
            background: #3b5998; 
            text-decoration: none; 
            transition: 0.2s;
        }
        .notif-item:hover { color: white; }
        .notif-item.active-alert { background: #00ffff; color: #000; font-weight: bold; box-shadow: 0 0 5px rgba(0, 255, 255, 0.5); }
        
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-user-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar { width: 45px; height: 45px; background: #eee; border-radius: 2px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }
        .creator-crown { color: #ffd700; margin-left: 5px; }
        .main { flex: 1; padding: 30px; }
        .btn-sub { background: rgba(255,255,255,0.2); font-weight: bold; transition: 0.2s; cursor: pointer; }
        .btn-sub:hover { background: rgba(255,255,255,0.3); }
        .btn-sub.subscribed { background: rgba(255,255,255,0.4); }
    </style>
</head>
<body>

<nav class="navbar">
    <div class="nav-left">
        <a href="dashboard.html" class="nav-logo-link">
            <img src="Illustration226.png" alt="OCARMY" class="nav-logo-img">
        </a>
        <a href="browse.html"><i class="fa fa-eye"></i> Browse</a>
        <a href="search.html"><i class="fa fa-search"></i> Search</a>
    </div>
    
    <div style="display: flex; align-items: center;">
        <div class="notif-bar">
            <a href="notifications.html" class="notif-item" id="btn-worlds"><i class="fa fa-globe"></i> <span id="badge-worlds">0</span></a>
            <a href="notifications.html" class="notif-item" id="btn-social"><i class="fa fa-user"></i> <span id="badge-social">0</span></a>
            <a href="notifications.html" class="notif-item" id="btn-favs"><i class="fa fa-star"></i> <span id="badge-favs">0</span></a>
            <a href="notifications.html" class="notif-item" id="btn-messages"><i class="fa fa-envelope"></i> <span id="badge-messages">0</span></a>
        </div>

        <div class="dropdown">
            <button class="nav-item-btn" onclick="toggleDrop('drop-user')">
                <span id="nav-username">Loading...</span>
                <div id="nav-avatar" style="width:30px; height:30px; background:#eee; border-radius:2px; background-size:cover; margin-left:8px;"></div>
                <i class="fa fa-caret-down" style="margin-left:5px; font-size:10px;"></i>
            </button>
            <div id="drop-user" class="dropdown-content" style="right:0;">
                <a href="dashboard.html">Dashboard</a>
                <a id="nav-public-profile" href="#">Public Profile</a>
                <a href="settings.html">Settings</a>
                <div style="border-top:1px solid #eee; margin: 5px 0;"></div>
                <a href="#" id="logout-btn">Logout</a>
            </div>
        </div>
    </div>
</nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-header">
            <div class="side-avatar" id="side-pfp"></div>
            <div>
                <div id="side-name-container" style="font-weight: bold; display:flex; align-items:center;">
                    <span id="side-username">Loading...</span>
                </div>
                <div style="font-size: 11px; opacity: 0.8;" id="side-sub-count">0 subscribers</div>
            </div>
        </div>
        <div class="side-nav">
            <a id="lnk-profile"><i class="fa fa-user"></i> Profile</a>
            <a id="lnk-bulletins"><i class="fa fa-comment"></i> Bulletins</a>
            <a id="lnk-chars"><i class="fa fa-users"></i> Characters</a>
            <div class="side-label">Portfolio</div>
            <a id="lnk-designs"><i class="fa fa-paint-brush"></i> Designs</a>
            <a id="lnk-art"><i class="fa fa-image"></i> Art</a>
            <div class="side-label">Interaction</div>
            <a id="lnk-comments"><i class="fa fa-comments"></i> Comments</a>
            <a id="lnk-subscribe" class="btn-sub"><i class="fa fa-plus"></i> Subscribe</a>
            <a id="lnk-message"><i class="fa fa-envelope"></i> Message</a>
        </div>
    </aside>

    <main class="main">
        <div id="profile-content">Loading...</div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, doc, getDoc, getDocs, collection, setDoc, deleteDoc, serverTimestamp, query, where, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged, signOut } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();
    const urlParams = new URLSearchParams(window.location.search);
    const targetUid = urlParams.get('user');
    
    let currentUser = null;
    let currentUserData = null;
    let viewerUsername = "User";

    window.toggleDrop = (id) => {
        document.querySelectorAll('.dropdown-content').forEach(d => { if(d.id !== id) d.classList.remove('show'); });
        document.getElementById(id).classList.toggle('show');
    };

    document.getElementById('logout-btn').onclick = () => signOut(auth).then(() => window.location.href="login.html");

    if (!targetUid) {
        document.getElementById('profile-content').innerHTML = "No user ID specified.";
    } else {
        fetchUserData();
    }

    async function fetchUserData() {
        const userDoc = await getDoc(doc(db, "users", targetUid));
        if (userDoc.exists()) {
            const data = userDoc.data();
            document.getElementById('side-username').innerText = data.username || "User";
            if (data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
            if (data.username?.toLowerCase() === 'militarygrade') document.getElementById('side-name-container').innerHTML += ` <i class="fa fa-crown creator-crown"></i>`;
            
            const links = { 'lnk-profile': 'profile.html', 'lnk-bulletins': 'bulletins.html', 'lnk-chars': 'characters.html', 'lnk-designs': 'designs.html', 'lnk-art': 'art.html', 'lnk-comments': 'profile_comments.html', 'lnk-message': 'messages.html' };
            for (let id in links) { document.getElementById(id).href = `${links[id]}?user=${targetUid}`; }
            
            const subSnap = await getDocs(collection(db, "users", targetUid, "subscribers"));
            document.getElementById('side-sub-count').innerText = `${subSnap.size} subscribers`;
            document.getElementById('profile-content').innerHTML = data.profileHTML || "This user hasn't set up their profile yet.";
        }
    }

    async function checkSubStatus() {
        if(currentUser.uid === targetUid) return document.getElementById('lnk-subscribe').style.display = 'none';
        const subDoc = await getDoc(doc(db, "users", targetUid, "subscribers", currentUser.uid));
        const btn = document.getElementById('lnk-subscribe');
        if (subDoc.exists()) { btn.classList.add('subscribed'); btn.innerHTML = `<i class="fa fa-check"></i> Subscribed`; }
        btn.onclick = toggleSub;
    }

    async function toggleSub() {
        const btn = document.getElementById('lnk-subscribe');
        const subRef = doc(db, "users", targetUid, "subscribers", currentUser.uid);
        
        btn.style.pointerEvents = "none";
        const subDoc = await getDoc(subRef);
        
        if (subDoc.exists()) {
            await deleteDoc(subRef);
            btn.innerHTML = `<i class="fa fa-plus"></i> Subscribe`;
            btn.classList.remove('subscribed');
        } else {
            await setDoc(subRef, { at: serverTimestamp() });
            await setDoc(doc(collection(db, "notifications")), {
                toUserId: targetUid, fromUserId: currentUser.uid, fromUsername: currentUserData.username, type: "subscription", read: false, createdAt: serverTimestamp()
            });
            btn.innerHTML = `<i class="fa fa-check"></i> Subscribed`;
            btn.classList.add('subscribed');
        }
        btn.style.pointerEvents = "auto";
    }

    onAuthStateChanged(auth, async (user) => {
        if (user) { 
            currentUser = user;
            
            // Get viewer user data
            const emailQuery = query(collection(db, "users"), where("email", "==", user.email.toLowerCase()));
            const emailSnap = await getDocs(emailQuery);
            if (!emailSnap.empty) {
                currentUserData = emailSnap.docs[0].data();
            } else {
                const uidDoc = await getDoc(doc(db, "users", user.uid));
                if (uidDoc.exists()) currentUserData = uidDoc.data();
            }
            
            // Setup navbar user info
            if (currentUserData) {
                document.getElementById('nav-username').innerText = currentUserData.username || "User";
                document.getElementById('nav-public-profile').href = `profile.html?user=${user.uid}`;
                if (currentUserData.pfp) {
                    document.getElementById('nav-avatar').style.backgroundImage = `url('${currentUserData.pfp}')`;
                }
            }
            
            // Check subscription status if viewing another user
            if (targetUid && targetUid !== user.uid) {
                checkSubStatus();
                loadNotifications(user.uid);
            }
        }
    });

    function loadNotifications(userId) {
        // Watch Messages
        const messagesQuery = query(collection(db, "messages"), where("recipientId", "==", userId), where("isRead", "==", false));
        onSnapshot(messagesQuery, (snap) => {
            const unreadMessages = snap.size;
            document.getElementById('badge-messages').innerText = unreadMessages;
            if(unreadMessages > 0) document.getElementById('btn-messages').classList.add('active-alert');
            else document.getElementById('btn-messages').classList.remove('active-alert');
        });
        
        // Watch Notifications
        const notifQuery = query(collection(db, "notifications"), where("toUserId", "==", userId), where("read", "==", false));
        onSnapshot(notifQuery, (snap) => {
            let socialCount = 0;
            let favsCount = 0;
            snap.forEach(doc => {
                const type = doc.data().type;
                if(type === 'subscription' || type === 'comment') socialCount++;
                if(type === 'update' || type === 'favorite') favsCount++;
            });
            document.getElementById('badge-social').innerText = socialCount;
            if(socialCount > 0) document.getElementById('btn-social').classList.add('active-alert');
            else document.getElementById('btn-social').classList.remove('active-alert');
            document.getElementById('badge-favs').innerText = favsCount;
            if(favsCount > 0) document.getElementById('btn-favs').classList.add('active-alert');
            else document.getElementById('btn-favs').classList.remove('active-alert');
        });
        
        // Watch Transfers
        const transferQuery = query(collection(db, "transfers"), where("toUserId", "==", userId), where("status", "==", "pending"));
        onSnapshot(transferQuery, (snap) => {
            document.getElementById('badge-worlds').innerText = snap.size;
            if(snap.size > 0) document.getElementById('btn-worlds').classList.add('active-alert');
            else document.getElementById('btn-worlds').classList.remove('active-alert');
        });
    }
</script>
</body>
</html>
