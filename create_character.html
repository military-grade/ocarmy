<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    // Re-initialize TinyMCE for the bio
    tinymce.init({ selector: '#char-desc', height: 300, menubar: false, plugins: 'code link lists', toolbar: 'bold italic underline | bullist numlist | link code' });

    let currentTags = [], creditMode = 'self', isDragging = false, startX, startY, imgX = 0, imgY = 0, recipientId = null;

    // Keep Sidebar Updated
    onAuthStateChanged(auth, async (u) => {
        if(!u) return;
        const s = await getDoc(doc(db, "users", u.uid));
        if(s.exists()){
            document.getElementById('side-username').innerText = s.data().username;
            document.getElementById('side-pfp').style.backgroundImage = `url('${s.data().pfp}')`;
        }
    });

    // --- Original Avatar & Cropper Logic ---
    window.previewAvatar = (e) => {
        const reader = new FileReader();
        reader.onload = () => { document.getElementById('avatar-img').src = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    };
    window.applyZoom = () => { 
        document.getElementById('avatar-img').style.width = document.getElementById('zoom-slider').value + "%"; 
    };
    window.startDrag = (e) => { 
        isDragging = true; 
        startX = e.clientX - imgX; 
        startY = e.clientY - imgY; 
    };
    window.onmousemove = (e) => { 
        if(isDragging) { 
            imgX = e.clientX - startX; 
            imgY = e.clientY - startY; 
            document.getElementById('avatar-img').style.transform = `translate(${imgX}px, ${imgY}px)`; 
        } 
    };
    window.onmouseup = () => { isDragging = false; };

    // --- Original Tag Logic ---
    document.getElementById('tag-input').onkeydown = (e) => {
        if(e.key === 'Enter'){
            e.preventDefault();
            const v = e.target.value.trim();
            if(v && !currentTags.includes(v)){ currentTags.push(v); renderTags(); }
            e.target.value = '';
        }
    };
    function renderTags() { 
        document.getElementById('tag-container').innerHTML = currentTags.map(t => `<span class="tag-pill">${t} <i class="fa fa-times" onclick="removeTag('${t}')"></i></span>`).join(''); 
    }
    window.removeTag = (t) => { currentTags = currentTags.filter(x => x !== t); renderTags(); };

    // --- Original Credit UI Logic ---
    window.setCredit = (m) => {
        creditMode = m;
        document.getElementById('btn-self').classList.toggle('active', m==='self');
        document.getElementById('btn-onsite').classList.toggle('active', m==='onsite');
        document.getElementById('onsite-input-div').style.display = m === 'onsite' ? 'block' : 'none';
    };

    window.validateUser = async () => {
        const v = document.getElementById('designer-name').value.toLowerCase();
        const q = query(collection(db, "users"));
        const snap = await getDocs(q);
        const f = snap.docs.find(d => d.data().username.toLowerCase() === v);
        document.getElementById('user-success').style.display = f ? 'block' : 'none';
        document.getElementById('user-error').style.display = f ? 'none' : 'block';
        if(f) recipientId = f.id;
    };

    // --- Final Submission (With Security Hook) ---
    document.getElementById('submit-btn').onclick = async () => {
        const user = auth.currentUser;
        if(!user) return;
        
        // Finalize Avatar Crop
        const canvas = document.getElementById('crop-canvas');
        const ctx = canvas.getContext('2d');
        const img = document.getElementById('avatar-img');
        const zoom = document.getElementById('zoom-slider').value / 100;
        ctx.drawImage(img, imgX, imgY, img.naturalWidth * zoom, img.naturalHeight * zoom);
        
        // Prepare character data
        const charData = {
            ownerId: user.uid,
            name: document.getElementById('char-name').value,
            avatar: canvas.toDataURL("image/jpeg"),
            refSheet: document.getElementById('ref-sheet').value,
            tags: currentTags,
            worth: document.getElementById('char-worth').value,
            description: tinymce.get('char-desc').getContent(),
            createdAt: serverTimestamp(),
            // Only add credit data if on-site
            creditedTo: creditMode === 'onsite' ? recipientId : user.uid,
            isCreditPending: creditMode === 'onsite'
        };

        const charRef = await addDoc(collection(db, "characters"), charData);

        // Conditional notification: Only if credit is onsite and NOT to self
        if(creditMode === 'onsite' && recipientId && recipientId !== user.uid){
            await addDoc(collection(db, "notifications"), { 
                toUserId: recipientId, 
                fromUserId: user.uid,
                fromUsername: document.getElementById('side-username').innerText,
                type: "credit_request", 
                characterId: charRef.id, 
                characterName: charData.name,
                read: false,
                status: 'pending',
                createdAt: serverTimestamp() 
            });
            alert("Character created! Credit request sent to designer.");
        } else {
            alert("Character created successfully!");
        }
        
        window.location.href = `character.html?id=${charRef.id}`;
    };
</script>
