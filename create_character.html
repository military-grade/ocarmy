<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Character | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .wrapper { display: flex; max-width: 1200px; margin: 0 auto; background: white; border: 1px solid var(--border); min-height: 100vh; }
        
        /* Sidebar */
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-nav a { display: block; padding: 12px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main { flex: 1; padding: 30px; }

        /* Toyhouse Box Sections */
        .th-section { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 25px; }
        .th-section-header { background: #f9f9f9; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid var(--border); font-size: 14px; }
        .th-section-body { padding: 20px; }

        /* Avatar Cropper */
        #cropper-box { width: 200px; height: 200px; border: 1px solid #ccc; overflow: hidden; position: relative; background: #eee; cursor: move; }
        #avatar-img { position: absolute; width: 100%; top: 0; left: 0; user-select: none; pointer-events: none; }

        /* Tag system */
        .tag-pill { background: var(--th-blue); color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; margin-right: 5px; display: inline-flex; align-items: center; gap: 5px; }
        .tag-remove { cursor: pointer; opacity: 0.7; }
        
        .btn-credit.active { background-color: var(--th-blue); color: white; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <a href="dashboard.html" class="side-nav"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>
        <div style="padding: 15px; font-weight: bold; opacity: 0.8;">SUBMIT</div>
        <a href="#" class="side-nav" style="background: rgba(255,255,255,0.1);">Character</a>
    </aside>

    <main class="main">
        <h2 class="mb-4"><i class="fa fa-plus-circle"></i> Create Character</h2>

        <div class="th-section">
            <div class="th-section-header">Upload Avatar</div>
            <div class="th-section-body d-flex gap-4">
                <div id="cropper-box" onmousedown="startDrag(event)">
                    <img id="avatar-img" src="">
                </div>
                <div class="flex-grow-1">
                    <input type="file" id="char-file" class="form-control mb-3" accept="image/*" onchange="previewAvatar(event)">
                    <label class="form-label fw-bold small">Zoom</label>
                    <input type="range" id="zoom-slider" class="form-range" min="100" max="500" value="100" oninput="applyZoom()">
                    <p class="small text-muted mt-2">Drag the image inside the box to crop.</p>
                </div>
            </div>
        </div>

        <div class="th-section">
            <div class="th-section-header">Tags</div>
            <div class="th-section-body">
                <div id="tag-container" class="mb-2"></div>
                <input type="text" id="tag-input" class="form-control" placeholder="Type a tag and press Enter...">
            </div>
        </div>

        <div class="th-section">
            <div class="th-section-header">Designer Credit</div>
            <div class="th-section-body">
                <div class="btn-group w-100 mb-3">
                    <button class="btn btn-outline-secondary active btn-credit" id="btn-self" onclick="setCredit('self')">I am the creator</button>
                    <button class="btn btn-outline-secondary btn-credit" id="btn-onsite" onclick="setCredit('onsite')">On-Site Creator</button>
                </div>
                <div id="onsite-input-div" style="display:none;">
                    <input type="text" id="designer-name" class="form-control" placeholder="Enter username">
                </div>
            </div>
        </div>

        <button class="btn btn-primary w-100 p-3 fw-bold" onclick="submitCharacter()" style="background:var(--th-blue); border:none;">CREATE CHARACTER</button>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    let currentTags = [];
    let isDragging = false;
    let startX, startY, imgX = 0, imgY = 0;

    // --- AVATAR LOGIC ---
    window.previewAvatar = (e) => {
        const reader = new FileReader();
        reader.onload = () => { document.getElementById('avatar-img').src = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.applyZoom = () => {
        document.getElementById('avatar-img').style.width = document.getElementById('zoom-slider').value + "%";
    };

    window.startDrag = (e) => {
        isDragging = true;
        startX = e.clientX - imgX;
        startY = e.clientY - imgY;
    };

    window.onmousemove = (e) => {
        if (!isDragging) return;
        imgX = e.clientX - startX;
        imgY = e.clientY - startY;
        document.getElementById('avatar-img').style.transform = `translate(${imgX}px, ${imgY}px)`;
    };

    window.onmouseup = () => { isDragging = false; };

    // --- TAG LOGIC ---
    document.getElementById('tag-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            const tag = e.target.value.trim();
            if (!currentTags.includes(tag)) {
                currentTags.push(tag);
                renderTags();
            }
            e.target.value = '';
        }
    });

    function renderTags() {
        document.getElementById('tag-container').innerHTML = currentTags.map(t => `
            <span class="tag-pill">${t} <i class="fa fa-times tag-remove" onclick="removeTag('${t}')"></i></span>
        `).join('');
    }
    window.removeTag = (tag) => {
        currentTags = currentTags.filter(t => t !== tag);
        renderTags();
    };

    window.setCredit = (mode) => {
        document.querySelectorAll('.btn-credit').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-' + mode).classList.add('active');
        document.getElementById('onsite-input-div').style.display = mode === 'onsite' ? 'block' : 'none';
    };

    window.submitCharacter = async () => {
        const user = auth.currentUser;
        if (!user) return alert("Log in first!");

        const charData = {
            ownerId: user.uid,
            name: document.querySelector('h2').innerText, // Placeholder
            tags: currentTags,
            avatar: document.getElementById('avatar-img').src,
            createdAt: serverTimestamp()
        };
        await addDoc(collection(db, "characters"), charData);
        window.location.href = "characters.html";
    };
</script>
</body>
</html>
