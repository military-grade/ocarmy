<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Character | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .wrapper { display: flex; max-width: 1200px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; }
        
        /* Sidebar Restored */
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-user-info { padding: 12px 15px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-avatar { width: 35px; height: 35px; background: #eee; border-radius: 2px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 12px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .side-nav a:hover { background: rgba(0,0,0,0.1); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .main { flex: 1; padding: 30px; border-right: 1px solid #eee; }
        .th-section { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 25px; }
        .th-section-header { background: #f9f9f9; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid var(--border); font-size: 14px; }
        .th-section-body { padding: 20px; }

        /* Avatar Editor */
        #cropper-wrap { width: 220px; height: 220px; border: 1px solid #ccc; overflow: hidden; position: relative; background: #eee; cursor: move; }
        #avatar-img { position: absolute; width: 100%; top: 0; left: 0; pointer-events: none; }

        /* Tag system */
        .tag-pill { background: var(--th-blue); color: white; padding: 2px 10px; border-radius: 20px; font-size: 12px; margin: 2px; display: inline-flex; align-items: center; gap: 5px; }
        .tag-remove { cursor: pointer; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <div class="side-user-info">
            <div class="side-avatar" id="side-pfp"></div>
            <a href="dashboard.html" id="side-username" style="color:white; text-decoration:none; font-weight:bold; font-size:13px;">User</a>
        </div>
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-arrow-left"></i> Back to Dashboard</a>
            <div class="side-label">Submit</div>
            <a href="create_character.html" style="background: rgba(255,255,255,0.1);"><i class="fa fa-plus"></i> Character</a>
            <a href="create_folder.html"><i class="fa fa-folder"></i> Folder</a>
        </div>
    </aside>

    <main class="main">
        <h2 class="mb-4"><i class="fa fa-plus-circle"></i> Create Character</h2>

        <div class="th-section">
            <div class="th-section-header">Upload Avatar</div>
            <div class="th-section-body d-flex gap-4">
                <div id="cropper-wrap" onmousedown="startDrag(event)">
                    <img id="avatar-img" src="">
                </div>
                <div class="flex-grow-1">
                    <input type="file" id="char-file" class="form-control mb-3" accept="image/*" onchange="previewAvatar(event)">
                    <label class="form-label fw-bold small">Zoom</label>
                    <input type="range" id="zoom-slider" class="form-range" min="100" max="500" value="100" oninput="applyZoom()">
                    <p class="small text-muted mt-2">Drag the image inside the box to crop.</p>
                    <label class="form-label fw-bold small mt-2">Reference Sheet (Optional)</label>
                    <input type="file" id="ref-file" class="form-control" accept="image/*">
                </div>
            </div>
        </div>

        <div class="th-section">
            <div class="th-section-header">Basics</div>
            <div class="th-section-body row g-3">
                <div class="col-md-6">
                    <label class="form-label fw-bold small">Name</label>
                    <input type="text" id="char-name" class="form-control" required>
                </div>
                <div class="col-md-6">
                    <label class="form-label fw-bold small">Folder</label>
                    <select id="char-folder" class="form-select"><option value="">Unsorted</option></select>
                </div>
                <div class="col-md-12">
                    <label class="form-label fw-bold small">Tags (Press Enter to add)</label>
                    <div id="tag-container" class="mb-2"></div>
                    <input type="text" id="tag-input" class="form-control" placeholder="feline, warrior, etc...">
                </div>
                <div class="col-md-12">
                    <label class="form-label fw-bold small">Worth ($)</label>
                    <input type="number" id="char-worth" class="form-control" value="0.00">
                </div>
            </div>
        </div>

        <div class="th-section">
            <div class="th-section-header">Designer Credit</div>
            <div class="th-section-body">
                <div class="btn-group w-100 mb-3">
                    <button class="btn btn-outline-secondary active btn-credit" id="btn-self" onclick="setCredit('self')">I am the creator</button>
                    <button class="btn btn-outline-secondary btn-credit" id="btn-onsite" onclick="setCredit('onsite')">On-Site Creator</button>
                    <button class="btn btn-outline-secondary btn-credit" id="btn-offsite" onclick="setCredit('offsite')">Off-Site Creator</button>
                </div>
                <input type="text" id="credit-input" class="form-control" style="display:none;" placeholder="Username or Link...">
            </div>
        </div>

        <div class="th-section">
            <div class="th-section-header">Profile Content</div>
            <div class="th-section-body">
                <textarea id="char-desc"></textarea>
            </div>
        </div>

        <button class="btn btn-primary w-100 p-3 fw-bold" id="submit-btn" style="background:var(--th-blue); border:none;">CREATE CHARACTER</button>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp, doc, getDoc } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    tinymce.init({ selector: '#char-desc', height: 400, menubar: true, plugins: 'code link image lists table', toolbar: 'undo redo | bold italic underline | forecolor backcolor | bullist numlist | link image code' });

    let currentTags = [], creditMode = 'self', isDragging = false, startX, startY, imgX = 0, imgY = 0;

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        const uSnap = await getDoc(doc(db, "users", user.uid));
        if(uSnap.exists()) {
            document.getElementById('side-username').innerText = uSnap.data().username;
            if(uSnap.data().pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${uSnap.data().pfp}')`;
        }
        // Load Folders
        const q = query(collection(db, "folders"), where("ownerId", "==", user.uid));
        const fSnap = await getDocs(q);
        fSnap.forEach(d => { document.getElementById('char-folder').innerHTML += `<option value="${d.id}">${d.data().name}</option>`; });
    });

    window.previewAvatar = (e) => {
        const reader = new FileReader();
        reader.onload = () => { document.getElementById('avatar-img').src = reader.result; };
        reader.readAsDataURL(e.target.files[0]);
    };

    window.applyZoom = () => { document.getElementById('avatar-img').style.width = document.getElementById('zoom-slider').value + "%"; };

    window.startDrag = (e) => { isDragging = true; startX = e.clientX - imgX; startY = e.clientY - imgY; };
    window.onmousemove = (e) => {
        if (!isDragging) return;
        imgX = e.clientX - startX; imgY = e.clientY - startY;
        document.getElementById('avatar-img').style.transform = `translate(${imgX}px, ${imgY}px)`;
    };
    window.onmouseup = () => { isDragging = false; };

    document.getElementById('tag-input').addEventListener('keydown', (e) => {
        if (e.key === 'Enter' && e.target.value.trim()) {
            e.preventDefault();
            const tag = e.target.value.trim();
            if (!currentTags.includes(tag)) { currentTags.push(tag); renderTags(); }
            e.target.value = '';
        }
    });

    function renderTags() {
        document.getElementById('tag-container').innerHTML = currentTags.map(t => `<span class="tag-pill">${t} <i class="fa fa-times ms-1" onclick="removeTag('${t}')"></i></span>`).join('');
    }
    window.removeTag = (t) => { currentTags = currentTags.filter(tag => tag !== t); renderTags(); };

    window.setCredit = (m) => {
        creditMode = m;
        document.querySelectorAll('.btn-credit').forEach(b => b.classList.remove('active'));
        document.getElementById('btn-'+m).classList.add('active');
        document.getElementById('credit-input').style.display = m === 'self' ? 'none' : 'block';
    };

    document.getElementById('submit-btn').onclick = async () => {
        const user = auth.currentUser;
        if (!user) return;
        tinymce.triggerSave();
        const btn = document.getElementById('submit-btn');
        btn.disabled = true; btn.innerText = "Creating...";

        try {
            const docRef = await addDoc(collection(db, "characters"), {
                ownerId: user.uid,
                name: document.getElementById('char-name').value,
                folderId: document.getElementById('char-folder').value,
                avatar: document.getElementById('avatar-img').src,
                tags: currentTags,
                worth: document.getElementById('char-worth').value,
                designer: creditMode === 'self' ? user.displayName : document.getElementById('credit-input').value,
                description: tinymce.get('char-desc').getContent(),
                createdAt: serverTimestamp(),
                gallery: [], subscribers: []
            });
            window.location.href = `character.html?id=${docRef.id}`;
        } catch (e) { alert(e.message); btn.disabled = false; }
    };
</script>
</body>
</html>
