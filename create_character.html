<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Character | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .wrapper { display: flex; max-width: 1200px; margin: 0 auto; background: white; border: 1px solid var(--border); min-height: 100vh; }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-nav a { display: block; padding: 12px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.1); }
        .main { flex: 1; padding: 30px; }
        .card { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 25px; box-shadow: none; }
        .card-header { background: #f9f9f9; font-weight: bold; border-bottom: 1px solid var(--border); padding: 10px 15px; font-size: 14px; }
        
        /* Fixed Buggy Text / Layout */
        .form-label { font-weight: bold; font-size: 13px; margin-bottom: 5px; display: block; color: #555; }
        .credit-toggle { display: flex; border: 1px solid var(--th-blue); border-radius: 4px; overflow: hidden; width: fit-content; margin-bottom: 15px; }
        .credit-btn { padding: 8px 15px; font-size: 12px; cursor: pointer; border: none; background: #fff; color: var(--th-blue); }
        .credit-btn.active { background: var(--th-blue); color: #fff; }
        .invalid-user { color: #d9534f; font-size: 11px; font-weight: bold; margin-top: 5px; display: none; }

        /* Avatar Editor */
        #avatar-preview-wrap { width: 200px; height: 200px; border: 1px solid #ccc; overflow: hidden; position: relative; background: #eee; }
        #avatar-img { position: absolute; cursor: move; width: 100%; height: auto; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <a href="dashboard.html" class="side-nav"><i class="fa fa-arrow-left"></i> Back to Profile</a>
        <div style="padding: 15px; font-weight: bold; opacity: 0.8;">SUBMIT</div>
        <a href="create_character.html" class="side-nav" style="background: rgba(255,255,255,0.1);">Character</a>
        <a href="create_folder.html" class="side-nav">Folder</a>
    </aside>

    <main class="main">
        <h2 class="mb-4">Create Character</h2>

        <div class="card">
            <div class="card-header">Upload Avatar (Optional)</div>
            <div class="card-body d-flex gap-4">
                <div id="avatar-preview-wrap">
                    <img id="avatar-img" src="" style="display:none;">
                </div>
                <div>
                    <input type="file" id="char-file" class="form-control mb-2" accept="image/*" onchange="previewAvatar()">
                    <label class="form-label">Zoom</label>
                    <input type="range" id="zoom-slider" min="100" max="300" value="100" oninput="applyZoom()">
                    <p class="small text-muted mt-2">Drag image to center it.</p>
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Designer Credit</div>
            <div class="card-body">
                <div class="credit-toggle">
                    <button class="credit-btn active" id="btn-self" onclick="setCredit('self')">I am the creator</button>
                    <button class="credit-btn" id="btn-onsite" onclick="setCredit('onsite')">On-Site Creator</button>
                    <button class="credit-btn" id="btn-offsite" onclick="setCredit('offsite')">Off-Site Creator</button>
                </div>
                <div id="onsite-box" style="display:none;">
                    <label class="form-label">Username</label>
                    <input type="text" id="onsite-input" class="form-control" placeholder="Enter username..." onkeyup="validateUser()">
                    <div id="user-error" class="invalid-user">Invalid username! No user found on site.</div>
                </div>
                <div id="offsite-box" style="display:none;">
                    <label class="form-label">Artist Link/Name</label>
                    <input type="text" id="offsite-input" class="form-control" placeholder="Artist link...">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Basics</div>
            <div class="card-body row">
                <div class="col-md-6 mb-3">
                    <label class="form-label">Character Name</label>
                    <input type="text" id="char-name" class="form-control">
                </div>
                <div class="col-md-6 mb-3">
                    <label class="form-label">Total Worth ($)</label>
                    <input type="number" id="char-worth" class="form-control" placeholder="0.00">
                </div>
                <div class="col-md-12 mb-3">
                    <label class="form-label">Tags</label>
                    <input type="text" id="char-tags" class="form-control" placeholder="feline, warrior, custom...">
                </div>
            </div>
        </div>

        <div class="card">
            <div class="card-header">Profile Content</div>
            <div class="card-body">
                <textarea id="char-desc"></textarea>
            </div>
        </div>

        <button class="btn btn-primary w-100 p-3 fw-bold" id="submit-btn" style="background:var(--th-blue); border:none;">CREATE CHARACTER</button>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, getDocs, query, where, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const db = getFirestore(initializeApp({ apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" }));
    const auth = getAuth();

    tinymce.init({ selector: '#char-desc', height: 350, menubar: true, plugins: 'code link image lists table', toolbar: 'undo redo | bold italic underline | forecolor backcolor | bullist numlist | link image code' });

    let creditMode = 'self';
    let base64Avatar = "";

    // Avatar Logic
    window.previewAvatar = () => {
        const file = document.getElementById('char-file').files[0];
        const reader = new FileReader();
        reader.onload = (e) => {
            base64Avatar = e.target.result;
            const img = document.getElementById('avatar-img');
            img.src = e.target.result;
            img.style.display = "block";
        };
        if (file) reader.readAsDataURL(file);
    };

    window.applyZoom = () => {
        const val = document.getElementById('zoom-slider').value;
        document.getElementById('avatar-img').style.width = val + "%";
    };

    // Credit Logic (Case-Insensitive)
    window.setCredit = (mode) => {
        creditMode = mode;
        document.querySelectorAll('.credit-btn').forEach(b => b.classList.remove('active'));
        document.getElementById(`btn-${mode}`).classList.add('active');
        document.getElementById('onsite-box').style.display = (mode === 'onsite') ? 'block' : 'none';
        document.getElementById('offsite-box').style.display = (mode === 'offsite') ? 'block' : 'none';
    };

    window.validateUser = async () => {
        const val = document.getElementById('onsite-input').value.trim();
        const err = document.getElementById('user-error');
        if (!val) { err.style.display = "none"; return; }
        
        const q = query(collection(db, "users"));
        const snap = await getDocs(q);
        // Case-insensitive check
        const exists = snap.docs.some(d => d.data().username.toLowerCase() === val.toLowerCase());
        err.style.display = exists ? "none" : "block";
    };

    document.getElementById('submit-btn').onclick = async () => {
        const user = auth.currentUser;
        if (!user) return alert("Log in first.");
        tinymce.triggerSave();

        try {
            await addDoc(collection(db, "characters"), {
                ownerId: user.uid,
                name: document.getElementById('char-name').value,
                worth: document.getElementById('char-worth').value,
                tags: document.getElementById('char-tags').value.split(',').map(t => t.trim()),
                avatar: base64Avatar,
                designer: creditMode === 'self' ? user.displayName : (creditMode === 'onsite' ? document.getElementById('onsite-input').value : document.getElementById('offsite-input').value),
                description: tinymce.get('char-desc').getContent(),
                gallery: [],
                createdAt: serverTimestamp()
            });
            window.location.href = "characters.html";
        } catch (e) { alert(e.message); }
    };
</script>
</body>
</html>
