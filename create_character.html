<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Create Character | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <script src="https://cdnjs.cloudflare.com/ajax/libs/tinymce/6.8.3/tinymce.min.js"></script>
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; padding: 0 20px; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: 100vh; }
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .main { flex: 1; padding: 30px; }
        .card { border: 1px solid var(--border); border-radius: 4px; margin-bottom: 25px; }
        .card-header { background: #f9f9f9; padding: 10px 15px; font-weight: bold; border-bottom: 1px solid var(--border); }
        .card-body { padding: 20px; }
        label { display: block; font-weight: bold; font-size: 13px; margin-bottom: 5px; color: #555; }
        input, select, textarea { width: 100%; padding: 10px; border: 1px solid #ccc; border-radius: 4px; box-sizing: border-box; margin-bottom: 15px; }
        .btn-submit { background: var(--th-blue); color: white; border: none; padding: 15px; width: 100%; border-radius: 4px; font-weight: bold; cursor: pointer; font-size: 16px; }
    </style>
</head>
<body>

<nav class="navbar"><strong>OCARMY</strong></nav>

<div class="wrapper">
    <aside class="sidebar" style="padding:20px;">
        <div style="font-weight:bold; margin-bottom:10px;"><i class="fa fa-plus"></i> Submit</div>
        <a href="create_character.html" style="color:white; text-decoration:none; display:block; padding:5px 0;">Character</a>
        <a href="create_folder.html" style="color:rgba(255,255,255,0.7); text-decoration:none; display:block; padding:5px 0;">Folder</a>
    </aside>

    <main class="main">
        <h2>Create Character</h2>
        <div class="card">
            <div class="card-header">Character Details</div>
            <div class="card-body">
                <label>Name</label>
                <input type="text" id="char-name" placeholder="Character Name" required>

                <label>Reference Sheet (Main Image URL)</label>
                <input type="text" id="char-image" placeholder="Paste direct link to image...">

                <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
                    <div>
                        <label>Designer Credit</label>
                        <input type="text" id="char-designer" placeholder="Link or Username">
                    </div>
                    <div>
                        <label>Tradeability</label>
                        <select id="char-trade">
                            <option value="Not for Trade">Not for Trade</option>
                            <option value="Trading">Open for Trades</option>
                            <option value="Selling">For Sale</option>
                            <option value="Gifting">Gift Only</option>
                        </select>
                    </div>
                </div>

                <label>Description</label>
                <textarea id="char-desc"></textarea>
            </div>
        </div>
        <button class="btn-submit" id="btn-create">Create Character</button>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, addDoc, serverTimestamp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    tinymce.init({ selector: '#char-desc', height: 300, menubar: false });

    document.getElementById('btn-create').addEventListener('click', async () => {
        const user = auth.currentUser;
        if (!user) return alert("You must be logged in!");

        tinymce.triggerSave();
        const mainImg = document.getElementById('char-image').value;

        try {
            await addDoc(collection(db, "characters"), {
                ownerId: user.uid,
                name: document.getElementById('char-name').value,
                avatar: mainImg,
                designer: document.getElementById('char-designer').value,
                tradeability: document.getElementById('char-trade').value,
                description: document.getElementById('char-desc').value,
                gallery: mainImg ? [mainImg] : [], // Adds the ref sheet as the first gallery item
                createdAt: serverTimestamp()
            });
            alert("Character Created!");
            window.location.href = "characters.html";
        } catch (e) { alert(e.message); }
    });
</script>
</body>
</html>
