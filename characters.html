<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Characters | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/bootstrap/5.3.2/css/bootstrap.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: 'Helvetica Neue', Helvetica, Arial, sans-serif; background: var(--th-bg); color: #333; }
        .navbar { background: var(--th-dark); color: white; height: 50px; display: flex; align-items: center; padding: 0 20px; position: sticky; top: 0; z-index: 1000; }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border-left: 1px solid var(--border); border-right: 1px solid var(--border); min-height: calc(100vh - 50px); }

        /* Left Sidebar */
        .sidebar { width: 220px; background: var(--th-blue); color: white; flex-shrink: 0; display: flex; flex-direction: column; }
        .side-header { background: #427e95; padding: 10px 15px; font-weight: bold; font-size: 13px; border-bottom: 1px solid rgba(0,0,0,0.1); }
        .side-user-info { padding: 12px 15px; display: flex; align-items: center; gap: 10px; background: rgba(0,0,0,0.05); }
        .side-avatar { width: 35px; height: 35px; background: #eee; border-radius: 2px; background-size: cover; background-position: center; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); cursor: pointer; }
        .side-nav a:hover, .side-nav a.active { background: rgba(0,0,0,0.1); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        /* Main Content */
        .main { flex: 1; padding: 25px; }
        .folder-header { border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; display: flex; justify-content: space-between; align-items: center; }
        
        /* Character Grid */
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(160px, 1fr)); gap: 15px; }
        .char-card { border: 1px solid var(--border); border-radius: 4px; overflow: hidden; text-decoration: none; color: inherit; transition: 0.2s; background: #fff; }
        .char-card:hover { border-color: var(--th-blue); transform: translateY(-2px); box-shadow: 0 4px 8px rgba(0,0,0,0.05); }
        .char-thumb { width: 100%; aspect-ratio: 1/1; background: #eee; background-size: cover; background-position: center; }
        .char-name { padding: 10px; font-weight: bold; font-size: 13px; color: var(--th-blue); text-align: center; }
    </style>
</head>
<body>

<nav class="navbar"><div class="fw-bold px-2">OCARMY</div></nav>

<div class="wrapper">
    <aside class="sidebar">
        <div class="side-header"><i class="fa fa-users"></i> Characters</div>
        <div class="side-user-info">
            <div class="side-avatar" id="side-pfp"></div>
            <a href="#" id="side-username" style="color:white; text-decoration:none; font-weight:bold; font-size:13px;">User</a>
        </div>
        <div class="side-nav" id="folder-list">
            <a onclick="loadCharacters('all')" id="all-link"><i class="fa fa-folder"></i> All Characters</a>
            <a onclick="loadCharacters('unsorted')" id="unsorted-link"><i class="fa fa-folder-open"></i> Unsorted</a>
            <div class="side-label">Folders</div>
            </div>
    </aside>

    <main class="main">
        <div class="folder-header">
            <h3 id="folder-title">All Characters</h3>
            <div id="owner-tools" style="display:none;">
                <a href="create_character.html" class="btn btn-sm btn-primary" style="background:var(--th-blue); border:none;"><i class="fa fa-plus"></i> Create</a>
            </div>
        </div>
        
        <div class="char-grid" id="character-display">
            <div class="text-muted">Loading characters...</div>
        </div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs, doc, getDoc, onSnapshot } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    const urlParams = new URLSearchParams(window.location.search);
    let targetUserId = urlParams.get('user');
    let targetName = urlParams.get('name'); // This captures the name from your new 404 redirect

    onAuthStateChanged(auth, async (user) => {
        // 1. Resolve User ID from Name if needed
        if (!targetUserId && targetName) {
            const userQ = query(collection(db, "users"), where("username", "==", targetName));
            const userSnap = await getDocs(userQ);
            if (!userSnap.empty) {
                targetUserId = userSnap.docs[0].id;
            }
        }

        // 2. Default to logged in user if still no target
        if (!targetUserId && user) targetUserId = user.uid;
        
        if (targetUserId) {
            setupProfile(targetUserId);
            loadCharacters('all');
            loadFolders(targetUserId);
            
            if (user && user.uid === targetUserId) {
                document.getElementById('owner-tools').style.display = "block";
            }
        } else {
            document.getElementById('character-display').innerHTML = "<div class='p-3'>Please log in or specify a user profile.</div>";
        }
    });

    async function setupProfile(uid) {
        const snap = await getDoc(doc(db, "users", uid));
        if (snap.exists()) {
            const data = snap.data();
            document.getElementById('side-username').innerText = data.username;
            document.getElementById('side-username').href = `profile.html?user=${uid}`;
            if (data.pfp) document.getElementById('side-pfp').style.backgroundImage = `url('${data.pfp}')`;
        }
    }

    async function loadFolders(uid) {
        const q = query(collection(db, "folders"), where("ownerId", "==", uid));
        const snap = await getDocs(q);
        const list = document.getElementById('folder-list');
        snap.forEach(doc => {
            const folder = doc.data();
            list.innerHTML += `<a onclick="loadCharacters('${doc.id}', '${folder.name}')"><i class="fa fa-folder"></i> ${folder.name}</a>`;
        });
    }

    window.loadCharacters = async (folderId, folderName = "All Characters") => {
        // UI Handling
        document.getElementById('folder-title').innerText = folderId === "unsorted" ? "Unsorted" : folderName;
        document.querySelectorAll('.side-nav a').forEach(a => a.classList.remove('active'));
        
        const grid = document.getElementById('character-display');
        grid.innerHTML = "<div class='text-muted'>Loading characters...</div>";

        let q;
        if (folderId === 'all') {
            q = query(collection(db, "characters"), where("ownerId", "==", targetUserId));
        } else if (folderId === 'unsorted') {
            // FIX: Filters for characters with no folder set
            q = query(collection(db, "characters"), where("ownerId", "==", targetUserId), where("folderId", "==", ""));
        } else {
            q = query(collection(db, "characters"), where("ownerId", "==", targetUserId), where("folderId", "==", folderId));
        }

        try {
            const snap = await getDocs(q);
            grid.innerHTML = snap.empty ? "<div class='p-3 text-muted'>This folder is empty.</div>" : "";
            
            snap.forEach(doc => {
                const char = doc.data();
                grid.innerHTML += `
                    <a href="character.html?id=${doc.id}" class="char-card">
                        <div class="char-thumb" style="background-image: url('${char.avatar || ''}')"></div>
                        <div class="char-name">${char.name || 'Unnamed'}</div>
                    </a>`;
            });
        } catch (err) {
            console.error("Fetch Error:", err);
            grid.innerHTML = "<div class='text-danger'>Error loading characters.</div>";
        }
    };
</script>
</body>
</html>
