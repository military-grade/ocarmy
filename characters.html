<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>Characters | OCARMY</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        :root { --th-blue: #4e92ac; --th-dark: #222; --th-bg: #f7f7f7; --border: #ddd; }
        body { margin: 0; font-family: sans-serif; background: var(--th-bg); }
        .wrapper { display: flex; max-width: 1140px; margin: 0 auto; background: white; border: 1px solid var(--border); min-height: 100vh; align-items: stretch; }
        
        /* FULL SIDEBAR - REMAINS CONSTANT */
        .sidebar { width: 200px; background: var(--th-blue); color: white; flex-shrink: 0; }
        .side-header { background: #427e95; padding: 15px; display: flex; align-items: center; gap: 10px; }
        .side-nav a { display: block; padding: 10px 15px; color: white; text-decoration: none; font-size: 13px; border-bottom: 1px solid rgba(255,255,255,0.05); }
        .side-nav a:hover { background: rgba(0,0,0,0.1); }
        .side-label { font-size: 10px; font-weight: bold; padding: 15px 15px 5px; text-transform: uppercase; opacity: 0.7; }

        .main { flex: 1; padding: 30px; }
        .folder-header { display: flex; justify-content: space-between; border-bottom: 1px solid #eee; padding-bottom: 10px; margin-bottom: 20px; }
        
        /* GRID LOGIC */
        .char-grid { display: grid; grid-template-columns: repeat(auto-fill, minmax(140px, 1fr)); gap: 15px; }
        .char-card { text-align: center; text-decoration: none; color: inherit; }
        .char-thumb { width: 140px; height: 140px; background: #eee; border: 1px solid var(--border); border-radius: 4px; background-size: cover; background-position: center; margin-bottom: 5px; }
        .char-name-badge { background: var(--th-blue); color: white; padding: 4px 8px; font-size: 11px; font-weight: bold; border-radius: 4px; display: inline-block; max-width: 100%; }
    </style>
</head>
<body>
<div class="wrapper">
    <aside class="sidebar">
        <div class="side-header"><div id="side-pfp" style="width:40px; height:40px; background:#eee; border-radius:2px; background-size:cover;"></div><b id="side-username">militarygrade</b></div>
        <div class="side-nav">
            <a href="dashboard.html"><i class="fa fa-user"></i> Profile</a>
            <a href="bulletins.html"><i class="fa fa-comment"></i> Bulletins</a>
            <a href="characters.html" style="background:rgba(0,0,0,0.2);"><i class="fa fa-users"></i> Characters</a>
            <a href="#"><i class="fa fa-link"></i> Links</a>
            <a href="#"><i class="fa fa-globe"></i> Worlds</a>
            <a href="#"><i class="fa fa-star"></i> Favorites</a>
            <div class="side-label">Portfolio</div>
            <a href="designs.html"><i class="fa fa-paint-brush"></i> Designs</a>
            <a href="art.html"><i class="fa fa-image"></i> Art</a>
            <a href="#"><i class="fa fa-book"></i> Library</a>
            <div class="side-label">Interaction</div>
            <a href="profile_comments.html"><i class="fa fa-comments"></i> Comments</a>
            <a href="#"><i class="fa fa-envelope"></i> Inbox</a>
        </div>
    </aside>
    <main class="main">
        <div class="folder-header">
            <span style="font-size:18px; font-weight:bold;"><i class="fa fa-folder-open"></i> Unsorted</span>
            <button style="font-size:11px; cursor:pointer;">View All</button>
        </div>
        <div class="char-grid" id="char-list"></div>
    </main>
</div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getFirestore, collection, query, where, getDocs } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-firestore.js";
    import { getAuth, onAuthStateChanged } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = { apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k", authDomain: "ocarmy-db.firebaseapp.com", projectId: "ocarmy-db" };
    const app = initializeApp(firebaseConfig);
    const db = getFirestore(app);
    const auth = getAuth();

    onAuthStateChanged(auth, async (user) => {
        if (!user) return;
        const q = query(collection(db, "characters"), where("ownerId", "==", user.uid));
        const snap = await getDocs(q);
        const list = document.getElementById('char-list');
        snap.forEach(d => {
            const c = d.data();
            list.innerHTML += `
                <a href="character.html?id=${d.id}" class="char-card">
                    <div class="char-thumb" style="background-image:url('${c.avatar}')"></div>
                    <div class="char-name-badge">${c.name}</div>
                </a>`;
        });
    });
</script>
</body>
</html>
