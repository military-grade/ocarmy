<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <title>OCARMY | Reset Password</title>
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.0.0/css/all.min.css">
    <style>
        body { margin: 0; font-family: 'Helvetica Neue', Arial, sans-serif; background: #222; color: white; display: flex; align-items: center; justify-content: center; min-height: 100vh; }
        .reset-card { background: #333; padding: 40px; border-radius: 8px; width: 100%; max-width: 400px; box-shadow: 0 10px 30px rgba(0,0,0,0.5); border: 1px solid #444; text-align: center; }
        .mascot-logo { max-width: 180px; margin-bottom: 20px; filter: drop-shadow(0 0 10px rgba(255,255,255,0.1)); }
        h2 { margin-bottom: 10px; letter-spacing: 2px; text-transform: uppercase; font-size: 1.3rem; }
        p { color: #888; font-size: 13px; margin-bottom: 30px; }
        .form-group { text-align: left; margin-bottom: 20px; }
        label { display: block; font-size: 11px; text-transform: uppercase; color: #666; margin-bottom: 8px; font-weight: bold; letter-spacing: 1px; }
        input { width: 100%; padding: 12px; background: #1a1a1a; border: 1px solid #444; border-radius: 4px; color: white; box-sizing: border-box; outline: none; }
        input:focus { border-color: #3498db; }
        .btn-reset { width: 100%; padding: 15px; background: #3498db; border: none; border-radius: 4px; color: white; font-weight: bold; cursor: pointer; text-transform: uppercase; letter-spacing: 1px; }
    </style>
</head>
<body>

    <div class="reset-card">
        <img src="Illustration226.jpg" alt="OCARMY Mascot" class="mascot-logo">
        <h2>Reset Password</h2>
        <p>Choose a new secure password.</p>

        <form id="reset-form">
            <div class="form-group">
                <label>New Password</label>
                <input type="password" id="new-password" placeholder="••••••••" required>
            </div>
            <div class="form-group">
                <label>Confirm Password</label>
                <input type="password" id="confirm-password" placeholder="••••••••" required>
            </div>
            <button type="submit" class="btn-reset" id="reset-btn">Save New Password</button>
        </form>
    </div>

<script type="module">
    import { initializeApp } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-app.js";
    import { getAuth, confirmPasswordReset } from "https://www.gstatic.com/firebasejs/10.7.1/firebase-auth.js";

    const firebaseConfig = {
        apiKey: "AIzaSyDjlYDxJziqS2sHw46BkAl-PCRszDs1p4k",
        authDomain: "ocarmy-db.firebaseapp.com",
        projectId: "ocarmy-db"
    };

    const app = initializeApp(firebaseConfig);
    const auth = getAuth();

    // Get the code from the URL
    const urlParams = new URLSearchParams(window.location.search);
    const code = urlParams.get('oobCode');

    if (!code) {
        alert("Invalid link. Please try the forgot password process again.");
        window.location.href = "login.html";
    }

    document.getElementById('reset-form').onsubmit = async (e) => {
        e.preventDefault();
        const newPass = document.getElementById('new-password').value;
        const confirmPass = document.getElementById('confirm-password').value;

        if (newPass !== confirmPass) {
            alert("Passwords do not match!");
            return;
        }

        try {
            await confirmPasswordReset(auth, code, newPass);
            alert("Success! Your password has been updated.");
            window.location.href = "login.html";
        } catch (error) {
            alert(error.message);
        }
    };
</script>
</body>
</html>
